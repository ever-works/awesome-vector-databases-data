  Graph Neural Networks for enhancing vector retrieval and agent routing.

  ## Features

  - GNN-backed HNSW reranking
  - 8 graph transformer modules (physics, bio, temporal, etc.)
  - Node.js and WASM bindings
  - Real-time adaptation

