name: MTEB
description: Massive Text Embedding Benchmark (MTEB) - a comprehensive benchmark
  for evaluating text embedding models across 8 embedding tasks and 58 datasets
  in 112 languages. Provides a standardized leaderboard for comparing embedding
  quality across classification, clustering, retrieval, reranking, semantic
  textual similarity, and summarization tasks.
