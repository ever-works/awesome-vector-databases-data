name: Big-ANN Benchmarks
description: Evaluates ANN algorithms on billion-scale datasets with
  QPS/latency/recall metrics via NeurIPS tracks for out-of-distribution and
  streaming tests. Features standardized billion-point evaluation for throughput
  and memory. For production vector DB scalability assessment; contrasts
  ANN-Benchmarks million-scale libraries with billion-scale algorithm
  competitions.
