markdown: >-
  ## Overview


  Deep Lake is Activeloop's open-source database designed for complex,
  unstructured data. It combines the benefits of a traditional data lake with
  modern vector database capabilities and tensor storage.


  ## Features


  - **Multi-Modal Tensor Storage**: Images, audio, video, annotations, tables
  stored as tensors

  - **Columnar Storage**: Chunked compressed arrays for rapid streaming

  - **Time Travel**: Git-like versioning - see changes, roll back, branch off

  - **ACID Transactions**: Full transactional support

  - **Terabyte Visualization**: Visualize massive datasets

  - **Multi-Cloud Support**: S3, Azure, GCP, local, or Activeloop cloud

  - **ML Framework Integration**: Built-in dataloaders for PyTorch and
  TensorFlow

  - **Hybrid Search**: Embeddings and metadata search


  ## Managed Tensor Database (2026)


  Serverless managed service that eliminates self-hosting complexity and
  substantially lowers costs. Specify `runtime = {\"tensor_db\": True}` when
  creating Vector Store.


  ## Storage Architecture


  Deep Lake operates on columnar storage format, converting and storing data as
  chunked compressed arrays, enabling rapid streaming to ML models.


  ## Use Cases


  - Deep learning with multimodal data

  - Computer vision applications

  - Audio/video processing

  - Scientific data management

  - Large-scale ML training pipelines

  - Versioned dataset management


  ## Integration


  Works with LangChain, LlamaIndex, and major ML frameworks. Compatible with any
  S3-compatible storage including MinIO.


  ## Pricing


  Open-source for self-hosting. Managed Tensor Database offers serverless
  pricing with usage-based costs.
