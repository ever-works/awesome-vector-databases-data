name: VQKV
description: A training-free vector quantization method for KV cache compression
  in Large Language Models that achieves 82.8% compression ratio on LLaMA3.1-8B
  while retaining 98.6% baseline performance and enabling 4.3x longer generation
  length on the same memory footprint.
source_url: https://arxiv.org/abs/2603.16435
category: Research Papers & Surveys
tags:
  - compression
  - quantization
