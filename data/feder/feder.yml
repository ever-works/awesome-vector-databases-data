markdown: >-
  ## Overview


  Feder is a tool for visualizing ANNS (Approximate Nearest Neighbor Search)
  algorithms. It enables users to observe how different indexes are structured
  and how parameter configuration influences indexing structure.


  ## Key Features


  ### Index Visualization


  Helps visualize the whole process of vector similarity search with detailed
  data access records, allowing developers and researchers to understand how
  different ANNS algorithms work internally.


  ### Parameter Configuration


  Enables users to observe how parameter configuration influences indexing
  structure, helping optimize vector search performance.


  ## Current Support


  Currently only supports HNSW from hnswlib, with more indexes coming soon.


  ## Use Cases


  - Understanding ANNS algorithm behavior

  - Optimizing index parameters

  - Educational purposes for learning vector search

  - Debugging vector search implementations


  ## Pricing


  Free and open-source.
