name: RankZephyr
description: Open-source reranking model based on fine-tuned decoder-only LLMs
  (LLaMA family), designed for listwise document reranking in RAG pipelines.
  RankZephyr leverages supervised fine-tuning on ranking datasets to improve
  query-document relevance scoring beyond what zero-shot LLM prompts can
  achieve.
