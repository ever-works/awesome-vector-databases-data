name: BBANN
description: High-performance out-of-core vector index winner of NeurIPS'21
  billion-scale ANN competition, leveraging disk-based structures for massive
  datasets beyond RAM limits. Employs advanced approximate search algorithms for
  high QPS on limited hardware. Applicable to large-scale recommendations and
  search; competitive with DiskANN baseline, outperforms in benchmarks unlike
  pure in-memory like Qdrant.
