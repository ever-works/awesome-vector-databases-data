name: Coveo
description: Coveo offers cloud-hosted vector operations for enterprise AI
  search and discovery, with auto-scaling, hybrid semantic/keyword retrieval,
  and deep integrations with AWS, Azure for permissions and analytics. Tailored
  for enterprise RAG, global knowledge bases, and commerce search. Provides
  superior governance and analytics over Pinecone; more enterprise-focused than
  Zilliz Cloud.
