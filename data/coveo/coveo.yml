markdown: >-
  ## Overview


  Coveo focuses on enterprise AI search and discovery. It combines keyword,
  semantic, and personalized retrieval with analytics, permissions, and
  governance, abstracting the complexity of vector databases for enterprise use
  cases.


  ## Features


  - **Keyword + semantic + personalized retrieval**: unified search across
  multiple retrieval strategies

  - **Analytics**: built-in insights into search behavior and performance

  - **Permissions & governance**: access control and compliance features for
  enterprise environments

  - **Enterprise-ready**: designed for large knowledge bases and commerce
  catalogs

  - **Compliance support**: handles strict compliance requirements for regulated
  industries


  ## Best For


  Enterprises with large knowledge bases, commerce catalogs, and strict
  compliance needs.


  ## Pricing


  Enterprise pricing; contact sales for details.
