markdown: >-
  ## Overview


  Vectorsight is the world's first purpose-built observability layer for vector
  databases. It keeps RAG & AI workloads reliable, accurate, and cost-efficient
  with real-time insights, intelligent alerts, and performance monitoring.


  ## Key Features


  - **Multi-Database Support**: Monitors Pinecone, Qdrant, Milvus, Weaviate, and
  ChromaDB in real-time

  - **Performance Monitoring**: Tracks index health, resource utilization, and
  query performance

  - **Intelligent Alerts**: Smart, configurable alerts for performance
  degradation, anomalous behavior, or infrastructure issues

  - **ML-Powered Detection**: Leverages machine learning to detect unusual
  patterns, slow operations, or unexpected system behavior with zero manual
  tuning

  - **Enterprise-Grade Reliability**: Provides complete suite of tools to
  monitor, analyze, and optimize vector database performance


  ## Why Vector-Specific Observability?


  Traditional monitoring tools like Prometheus, Grafana, and Datadog aren't
  designed for vector-specific behaviors. When search recall drops due to index
  corruption or bad embeddings, there's no crash, just worse results.
  Vectorsight addresses these unique challenges with purpose-built monitoring
  for ANN algorithms, embedding drift, and index degradation.


  ## Status


  The platform is coming soon. Interested users can sign up to be notified when
  it launches.
