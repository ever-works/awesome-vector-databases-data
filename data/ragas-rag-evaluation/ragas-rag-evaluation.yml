name: RAGAS
description: Retrieval Augmented Generation Assessment framework for
  reference-free evaluation of RAG pipelines. RAGAS provides automated metrics
  for retrieval quality, context relevance, and generation faithfulness.
source_url: https://arxiv.org/abs/2309.15217
category: Tools
tags:
