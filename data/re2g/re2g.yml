name: Re2G
description: Retrieve, Rerank, Generate system from IBM Research that combines
  neural retrieval and reranking with BART-based generation, achieving 9-34%
  gains over previous SOTA on the KILT leaderboard.
source_url: https://arxiv.org/abs/2207.06300
category: Research Papers & Surveys
