markdown: >-
  ## Overview


  DIDS introduces a double-index approach with summarization techniques for fast
  high-dimensional similarity search.


  ## Key Contributions


  - Double index structure for improved search

  - Double summarization for query pruning

  - Fast similarity search on high-dimensional data

  - Published in VLDB 2024


  ## Publication


  - **Venue**: VLDB 2024

  - **Authors**: Hu et al.

  - **Abbreviation**: DIDS
