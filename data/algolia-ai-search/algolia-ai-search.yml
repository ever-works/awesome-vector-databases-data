name: Algolia AI Search
description: Algolia AI Search provides managed vector storage and search
  optimized for AI applications, evolving from keyword search to include
  semantic vector retrieval. Key features include serverless scaling, hybrid
  search combining keywords and vectors, and integrations with
  developer-friendly APIs. Ideal for RAG pipelines and enterprise AI use cases,
  it offers simpler operations and no infrastructure management compared to
  self-hosted solutions like Milvus.
