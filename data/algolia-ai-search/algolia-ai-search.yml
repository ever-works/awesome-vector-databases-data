markdown: >-
  ## Overview


  Algolia started as a keyword search engine and now offers AI-powered search
  with vector embeddings. It provides semantic retrieval, federated indexing,
  and developer-friendly APIs without requiring a separate vector database.


  ## Features


  - **Semantic retrieval**: vector-based search that understands query intent
  beyond keyword matching

  - **Federated indexing**: consolidate data from multiple sources into unified
  search

  - **Developer-friendly APIs**: drop-in upgrade for existing Algolia
  implementations

  - **Low-latency search**: real-time search with millisecond response times

  - **AI search add-on**: semantic capabilities layered on top of existing
  keyword search infrastructure


  ## Best For


  Startups and mid-market teams already invested in Algolia Search who want
  semantic retrieval as an add-on.


  ## Pricing


  Usage-based pricing; contact sales for AI Search add-on details.
