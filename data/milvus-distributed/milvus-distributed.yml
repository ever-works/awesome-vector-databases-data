name: Milvus Distributed
description: Horizontally scalable distributed vector database with sharding
  across nodes for high QPS (10k+ qps), low-latency queries on billions of
  vectors. Provides high availability (HA) via replication, Kubernetes
  auto-scaling, and fault tolerance for enterprise production workloads.
  Optimized for use cases like enterprise RAG; Milvus offers extensive ecosystem
  and multi-index support compared to Qdrant's Rust-efficient distributed
  clusters.
