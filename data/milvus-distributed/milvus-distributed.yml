name: Milvus Distributed
description: Milvus Distributed deployment enables horizontal scaling across
  clusters for production workloads handling petabyte-scale vector data.
  Features leaderless architecture, sharding, and fault-tolerance via
  etcd/Pulsar. Suited for enterprise AI apps needing high availability;
  contrasts with serverless options like Pinecone by offering full control.
