name: Milvus Distributed
description: Milvus Distributed is the scalable cluster deployment of Milvus,
  enabling horizontal scaling across multiple nodes for handling petabyte-scale
  vector data. It features fault-tolerant architecture with etcd coordination,
  dynamic sharding, and load balancing for high availability. Use for enterprise
  AI at massive scale like multimodal search; extends standalone Milvus for
  production.
