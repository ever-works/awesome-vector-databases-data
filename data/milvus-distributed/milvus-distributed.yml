name: Milvus Distributed
description: Milvus Distributed is the cluster mode of the scalable open-source
  vector database for AI embeddings search, supporting HNSW, IVF, and NGT
  indexes in high-availability distributed setups. It provides GPU support,
  billion-scale capacity, real-time upsert/query capabilities, and multi-modal
  vector handling. Suited for RAG, recommendations, and image/video search at
  enterprise scale. Self-hosted unlike Pinecone's managed offering, and more
  ANN-centric than Weaviate.
