name: Amazon ElastiCache Vector Search
description: Vector search extension for Amazon ElastiCache for Redis, featuring
  HNSW indexing for k-NN similarity, hybrid lexical+vector search with BM25
  fusion capabilities. Used for enterprise semantic caching, real-time
  recommendations, and RAG applications. Integrated Redis module offers
  sub-microsecond latency vs standalone like Weaviate, optimized for hot data
  workloads.
source_url: https://aws.amazon.com/blogs/database/announcing-vector-search-for-amazon-elasticache/
category: Full-Text Vector Search Engines
tags:
  - aws
  - caching
  - cloud
  - managed
  - knn-plugin
  - hybrid-lexical-vector
markdown: >-
  ## Overview


  Amazon ElastiCache now supports vector indexing, searching, and updating
  billions of high-dimensional vectors with microsecond latencies and up to 99%
  recall.


  ## Key Features


  **Performance**:

  - Microsecond latencies

  - Up to 99% recall

  - HNSW algorithm support

  - O(log N) time complexity


  **Scale**:

  - Billions of vectors

  - High-throughput scenarios

  - Sub-millisecond response times


  **Integration**:

  - Amazon Bedrock

  - Amazon SageMaker

  - Anthropic

  - OpenAI


  ## Use Cases


  **Semantic Caching**:

  - 92% cache hit ratios

  - Reduce LLM costs and latency

  - Reuse responses for similar queries


  **Real-Time Search**:

  - Sub-millisecond similarity search

  - In-memory performance

  - High-throughput applications


  ## Benefits


  - Managed service (no infrastructure)

  - AWS ecosystem integration

  - High availability

  - Cost-effective for caching


  ## Availability


  Available in AWS ElastiCache for Redis
