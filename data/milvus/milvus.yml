name: Milvus
description: "Milvus is a popular open-source vector database designed for
  efficient similarity search on massive embedding vectors, supporting billions
  of vectors with low-latency queries. Key features include distributed
  architecture, multiple index types like HNSW and IVF, hybrid search (vector +
  scalar), and integrations with PyTorch/TensorFlow. Use cases: RAG pipelines,
  recommendation engines, anomaly detection. Compared to Pinecone (serverless
  managed), Milvus is self-hostable and cost-effective for large-scale on-prem;
  outperforms pgvector in distributed scalability."
