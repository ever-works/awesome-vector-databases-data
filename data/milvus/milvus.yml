name: Milvus
description: Milvus is an open-source vector database built for scalable
  similarity search on massive embedding datasets, supporting billions of
  vectors with high performance. It uses advanced ANN indexes like HNSW, IVF,
  and DiskANN for fast queries, featuring distributed architecture, SQL-like
  queries, dynamic data support, multi-tenancy, GPU acceleration, and
  integrations with LangChain/PyTorch. Ideal for RAG, recommendation systems,
  multimodal search, AI image search, and chatbots; it offers self-hosted
  flexibility and lower costs compared to managed services like Pinecone.
