description: Milvus is an open-source vector database designed for scalable
  similarity search on massive datasets, supporting billions of vectors with
  high performance. Key features include distributed architecture, support for
  multiple indexes like HNSW, IVF, and ANNOY, hybrid search combining vector and
  scalar filtering, and integrations with popular ML frameworks. Ideal for RAG
  applications, recommendation systems, and multimodal search; compares
  favorably to Pinecone for open-source scale but requires self-management
  unlike managed services.
