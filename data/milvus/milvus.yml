name: Milvus
description: Milvus is a cloud-native, distributed vector database engine
  designed for billion-scale vector similarity search with support for HNSW,
  IVF, and other advanced index types. It features a decoupled compute-storage
  architecture that scales elastically on Kubernetes, enabling efficient hybrid
  search that combines vector embeddings with traditional metadata filtering.
  Primary use cases include Retrieval-Augmented Generation (RAG), multimodal
  search, recommendation systems, and large-scale AI applications requiring
  high-throughput vector retrieval.
