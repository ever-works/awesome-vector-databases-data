name: Milvus
description: Open-source vector database designed for handling massive-scale
  vector data. It offers excellent performance with GPU acceleration,
  distributed querying, and efficient indexing methods such as IVF, HNSW, and
  PQ. Highly configurable, scalable, with native support for multiple languages
  and integration with data pipelines like Kafka.
