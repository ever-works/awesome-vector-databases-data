name: Milvus
description: "Milvus is an open-source vector database for massive-scale
  similarity search on embedding vectors, built for AI workloads. Supports
  distributed architecture, multiple indexes (HNSW, IVF, etc.), GPU
  acceleration, and multimodal data. Use cases: large-scale RAG, image/video
  search; compares to Pinecone by being free/self-hosted but requires more ops,
  outperforming in billion-scale benchmarks."
source_url: https://milvus.io/
