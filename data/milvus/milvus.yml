name: Milvus
description: Milvus is an open-source, cloud-native vector database designed for
  scalable similarity search on massive embedding datasets, supporting billions
  of vectors with high QPS. Key features include HNSW, IVF, PQ indexing, hybrid
  search (dense+sparse), metadata filtering, multi-tenancy, and integrations
  with PyTorch/TensorFlow. Ideal for RAG, recommendation systems, and AI search;
  compares to Pinecone (managed) by being self-hosted and more customizable,
  outperforming in cost for large-scale deployments.
source_url: https://milvus.io/
