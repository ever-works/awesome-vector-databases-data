name: Milvus
description: Milvus is a high-performance, open-source vector database designed
  for scalable similarity search on massive embedding datasets in AI
  applications. It supports distributed deployment, advanced indexing like HNSW
  and IVF, GPU acceleration, and hybrid search combining vector and scalar
  filtering. Key use cases include RAG pipelines, recommendation engines, and
  image/video search; it outperforms Faiss in production scalability but
  requires more setup than managed options like Pinecone.
