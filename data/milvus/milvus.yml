name: Milvus
description: Milvus is an open-source, cloud-native vector database built for
  handling billions of vectors with high performance and scalability. It
  supports advanced indexing techniques like HNSW, IVF, PQ, and offers features
  such as real-time ingestion, hybrid search (vector + scalar), and distributed
  architecture for horizontal scaling. Use cases include recommendation systems,
  image/video search, and RAG pipelines; it outperforms single-node DBs like
  Faiss in production due to clustering and fault-tolerance, and competes with
  managed services like Pinecone but with self-hosting flexibility.
