markdown: |-
  # Milvus

  Milvus is a mature, open-source vector database maintained by Zilliz.

  ## Features

  - Open Source
  - Multiple Deployment Options: Lite, Standalone, Distributed
  - Scalability to billions of vectors
  - GPU acceleration
  - Metadata filtering, hybrid search

  ## Pricing

  Free open-source.
