  indexing, hybrid search (vector + scalar filtering), and multi-vector support.
  Ideal for RAG pipelines, recommendation systems, and multimodal search;
  compares to Pinecone for managed scalability but offers self-hosted
  flexibility superior to Chroma for production-scale deployments.
