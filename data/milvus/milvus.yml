name: Milvus
description: Milvus is an open-source vector database designed for scalable
  similarity search on massive datasets, supporting billions of vectors with
  high performance. Key features include distributed architecture, support for
  multiple indexes like HNSW and IVF, hybrid search, and integrations with
  popular ML frameworks. Ideal for RAG pipelines, recommendation systems, and AI
  agents; self-hosted alternative to managed services like Pinecone with better
  cost control for large-scale deployments.
source_url: https://milvus.io/
category: Multimodal Vector DBs
tags:
