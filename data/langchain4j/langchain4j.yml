name: LangChain4j
description: LangChain4j is a Java library providing vector search and embedding
  capabilities for LLM applications via integrations with ANN indexes like HNSW
  and FAISS, without needing full vector databases. Features include support for
  quantization, tool calling, and seamless embedding in JVM environments like
  Spring Boot and Quarkus. Suited for prototyping RAG agents and embedded apps;
  lighter and more JVM-native than Milvus, easier integration vs hnswlib.
