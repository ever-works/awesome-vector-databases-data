markdown: >-
  ## Overview


  LangChain4j is an idiomatic, open-source Java library for building LLM-powered
  applications on the JVM.


  ## Features


  - Unified API over popular LLM providers and vector stores

  - Easy implementation of tool calling (including MCP support), agents, and RAG

  - Seamless integration with enterprise Java frameworks like Quarkus and Spring
  Boot


  ## Pricing


  Free and open-source.
