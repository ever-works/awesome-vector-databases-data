name: pgvector-dotnet
description: Official .NET SDK/client (C#/F#) for pgvector, supporting async
  vector insert/query with HNSW/IVF indexes over Postgres. Integrates with
  Npgsql, Dapper, Entity Framework for type-safe operations. Suited for
  enterprise .NET app integration in RAG/semantic search; official bindings vs.
  community or direct SQL.
