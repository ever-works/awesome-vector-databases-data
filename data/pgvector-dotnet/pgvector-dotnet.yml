markdown: >-
  ## Overview


  pgvector-dotnet is the official .NET client library for pgvector PostgreSQL
  vectors.


  ## SDK Features


  - Async operations

  - HNSW/IVF index support

  - Multiple distance metrics

  - Integration: Npgsql, Dapper, Entity Framework

  - Vector storage and similarity search


  ## Use Cases


  - .NET app integration for semantic search

  - RAG pipelines

  - Enterprise AI workflows


  ## Comparisons


  - Official .NET SDK vs. community clients or raw Postgres SQL


  ## Pricing


  Free open-source (MIT).
