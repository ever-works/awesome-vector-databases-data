name: pgvector-dotnet
description: pgvector-dotnet is the official .NET client for pgvector, enabling
  vector operations and similarity search from C# applications against Postgres
  with pgvector extension. Supports insert/query with HNSW/IVF indexes, distance
  metrics, and async operations. Ideal for .NET RAG/ semantic search apps;
  bridges pgvector to enterprise .NET stacks, complementing Python clients with
  type-safe bindings unlike direct SQL.
