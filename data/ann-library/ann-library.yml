markdown: >-
  ## Overview


  ANN (Approximate Nearest Neighbors) is a library written in C++, which
  supports data structures and algorithms for both exact and approximate nearest
  neighbor searching in arbitrarily high dimensions.


  ## Features


  - Supports both exact and approximate nearest neighbor searching

  - Optimized for arbitrarily high dimensions

  - Provides kd-tree and bd-tree data structures

  - Priority search for approximate searching

  - Fixed-radius and k-nearest neighbor queries

  - Written in C++ for high performance

  - Portable across multiple platforms


  ## Applications


  Used in machine learning tasks including image recognition, natural language
  processing, and recommendation systems.


  ## Pricing


  Free and open-source.
