markdown: >-
  ## Overview


  DSPy is a programming framework that offers cutting-edge optimization for
  teams willing to adopt a programmatic approach to building RAG and LLM
  applications, with automatic system improvement capabilities.


  ## Features


  - Lowest framework overhead (~3.53 ms)

  - Automatic optimization based on example data

  - Clear programming model with signatures and modules

  - Programmatic approach to RAG systems

  - Self-improving systems

  - Research-backed optimization techniques


  ## Performance


  - ~3.53 ms framework overhead (lowest among major frameworks)

  - ~2.03k token usage per operation

  - Efficient execution for production workloads


  ## Getting Started


  - Simple installation: `pip install dspy-ai`

  - Clear programming model for defining RAG components

  - Extensive documentation and examples

  - Active research community


  ## Use Cases


  - Optimized RAG pipelines

  - Self-improving AI systems

  - Research and experimentation

  - Production systems requiring optimization

  - Complex reasoning applications


  ## Future Outlook


  Expected to drive more robust, reproducible, and high-performing RAG systems
  as optimizers evolve in 2026.


  ## Pricing


  Free and open-source
