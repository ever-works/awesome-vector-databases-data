name: Qdrant Vector Search Benchmarks
description: Open-source comparative benchmarks evaluating vector search
  performance of engines like Qdrant, Elasticsearch, Milvus, Redis, and
  Weaviate. Covers single-node upload/search, filtered search across various
  datasets and configurations, focusing on RPS, latency, precision, and indexing
  time using affordable hardware.
