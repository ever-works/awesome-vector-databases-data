name: IVF
description: Inverted File Index vector search algorithm that partitions
  high-dimensional vectors into clusters using k-means, enabling efficient
  nearest neighbor search by restricting searches to relevant clusters and
  dramatically reducing search space.
source_url: https://zilliz.com/learn/inverted-file-index
category: Concepts & Definitions
tags:
  - algorithm
