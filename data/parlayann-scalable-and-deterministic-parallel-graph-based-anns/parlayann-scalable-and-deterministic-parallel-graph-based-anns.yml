markdown: >-
  ## Overview


  ParlayANN introduces a scalable and deterministic parallel framework for
  graph-based approximate nearest neighbor search.


  ## Key Contributions


  - Deterministic parallel algorithms for graph-based ANNS

  - Scalable to large core counts

  - Maintains result quality under parallelization

  - Published in PPoPP 2024


  ## Publication


  - **Venue**: PPoPP 2024

  - **Authors**: Manohar et al.

  - **Abbreviation**: ParlayANN
