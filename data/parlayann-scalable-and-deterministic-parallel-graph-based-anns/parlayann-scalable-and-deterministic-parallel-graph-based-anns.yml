name: ParlayANN — Scalable and Deterministic Parallel Graph-Based ANNS
description: PPoPP 2024 paper presenting ParlayANN, a scalable and deterministic
  parallel framework for graph-based approximate nearest neighbor search
  algorithms, achieving high parallelism with deterministic results.
source_url: https://arxiv.org/abs/2309.09365
category: Research Papers & Surveys
tags:
