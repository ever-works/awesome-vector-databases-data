name: HugeGraph
description: Graph-enhanced vector database enabling hybrid graph+vector search
  for KG RAG applications. Supports graph queries with HNSW/DiskANN vector
  indexes for efficient multi-hop retrieval over knowledge graphs. Unlike pure
  vector databases like Pinecone, it natively models relationships for superior
  connected data reasoning and traversal.
source_url: https://hugegraph.apache.org
