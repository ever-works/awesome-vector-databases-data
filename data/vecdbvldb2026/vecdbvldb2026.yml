name: VecDB@VLDB2026
description: Academic workshop on vector databases at VLDB 2026, fostering
  discussions on topics from mathematical theories and ANN algorithms to
  implementation optimizations, database interactions, RAG, query languages, and
  embedding models. Provides a platform for researchers and companies to present
  technical details and exchange ideas. Scheduled for September 4, 2026, at The
  Westin Boston Seaport District, Boston, MA, USA.
