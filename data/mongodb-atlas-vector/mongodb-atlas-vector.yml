markdown: >-
  ## Overview


  MongoDB Atlas Vector Search provides native vector similarity search within
  MongoDB.


  ## Features


  - Store vectors with documents

  - HNSW indexing

  - Filtered search

  - LangChain/LlamaIndex integration


  ## Use Cases


  - RAG with MongoDB backend

  - Product semantic search

  - Content recommendations


  ## Availability


  MongoDB Atlas
