name: RedisVL
description: RedisVL is a Python library and framework for building RAG and AI
  search apps on Redis, providing vector search with HNSW/Flat indexes, semantic
  caching, and pipeline orchestration for embeddings/metadata. Integrates Redis
  Stack modules for hybrid search, auto-embedding, and eval tools. Ideal for
  real-time RAG, chatbots on Redis; combines vector DB with caching/key-value
  strengths vs. pure vector like Chroma, with lower latency for hot data but
  requires Redis cluster for scale.
source_url: https://redis.io/docs/latest/integrate/redisvl/
