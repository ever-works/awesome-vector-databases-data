name: RedisVL
description: RedisVL is a Python client library simplifying vector search
  workflows on Redis, with pipeline abstractions for ingestion, search, and
  eval. Integrates with OpenAI/HuggingFace embeddings. For RAG/agents;
  streamlines Redis vector usage vs raw commands.
source_url: https://redis.io/docs/latest/integrate/redisvl/
