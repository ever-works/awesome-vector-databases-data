featured: false
markdown: >-
  ## Overview


  RedisVL (Redis Vector Library) provides sub-millisecond latency for vector
  lookups, evolving Redis beyond caching into a vector store.


  ## Best For


  - Real-time AI agents

  - High-traffic applications


  ## Key Edge


  - Fastest retrieval speeds for smaller to mid-sized vector sets.
