name: Swirl
description: Open-source federated search platform for privacy-preserving vector
  similarity search across distributed enterprise data sources without data
  migration or central storage, unlike centralized vector DBs like Pinecone that
  require uploading all data to a single service. Enables multi-node federation
  querying 100+ heterogeneous sources simultaneously, using LLM embeddings for
  re-ranking unified results while keeping data local for enhanced privacy and
  compliance. Ideal for federated learning scenarios and data-sovereign AI
  applications.
