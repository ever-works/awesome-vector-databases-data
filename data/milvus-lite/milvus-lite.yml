name: Milvus Lite
description: Milvus Lite is the lightweight, embeddable version of Milvus for
  local development and edge AI applications, running in-process with zero
  dependencies beyond Python. It supports core vector search features like HNSW
  indexing and persistence via SQLite, ideal for prototyping RAG apps or
  on-device inference without server setup. Unlike full Milvus, it's single-node
  only but excels in simplicity vs. Chroma for production readiness path.
