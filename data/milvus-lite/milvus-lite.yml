name: Milvus Lite
description: Milvus Lite is a lightweight, embedded version of Milvus for
  Python, enabling local vector search without deployment overhead using the
  same core engine for HNSW/IVF indexes. Supports up to millions of vectors on
  laptop hardware, real-time inserts/queries, and LangChain integration; no
  Kubernetes needed. Perfect for prototyping, edge devices, mobile AI; lighter
  than full Milvus cluster but inherits scalability path, vs. Chroma for easier
  setup.
