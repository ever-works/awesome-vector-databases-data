name: Milvus Lite
description: Lightweight, in-process Python library for vector similarity search
  using Milvus engine (HNSW/IVF), zero deps beyond pip, optional disk, no
  server/K8s. Supports millions of vectors locally; for mobile/edge AI
  prototyping, LangChain integration; faster startup than Qdrant client, easier
  than full Milvus vs Chroma.
source_url: https://milvus.io/
