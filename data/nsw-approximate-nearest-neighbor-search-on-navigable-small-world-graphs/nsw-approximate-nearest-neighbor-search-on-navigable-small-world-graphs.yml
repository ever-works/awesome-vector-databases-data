markdown: >-
  ## Overview


  Approximate nearest neighbor algorithm based on navigable small world graphs
  (NSW) introduced graph-based approaches to ANN search using navigable small
  world network properties.


  ## Key Contributions


  - Proposed graph-based ANN search using navigable small world network topology

  - Established foundation for hierarchical variants like HNSW

  - Demonstrates that greedy routing on small-world graphs yields logarithmic
  search complexity

  - Influential IS2014 publication by Malkov et al.


  ## Publication


  - **Venue**: IS 2014

  - **Authors**: Malkov et al.

  - **Abbreviation**: NSW


  ## Impact


  NSW laid the groundwork for subsequent graph-based ANN methods, most notably
  HNSW, which became one of the most widely deployed ANN algorithms in
  production vector databases.
