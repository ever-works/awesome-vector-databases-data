name: Qdrant Cloud
description: Qdrant Cloud is a serverless, cloud-hosted managed vector database
  with auto-sharding, scaling, pay-per-use pricing, automated backups, advanced
  filtering, and multi-region deployments. Tailored for enterprise RAG and
  high-scale production AI applications. Delivers easier operations than
  self-hosted Milvus or Qdrant, with superior performance vs Zilliz in complex
  queries.
