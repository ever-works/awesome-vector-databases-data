name: GraphRAG-Bench
description: GraphRAG-Bench benchmarks vector DB-enhanced GraphRAG vs vanilla
  RAG on multi-hop queries, measuring perf metrics like QPS/latency for
  reasoning tasks across domains. Key features include standardized eval for
  graph vs vector retrieval in 2025 release. Helps select hybrid prod vector DB
  setups; graph-focused unlike pure ANN-Benchmarks or VectorDBBench.
source_url: https://graphrag-bench.github.io/
category: Benchmarks & Evaluation
tags:
  - Perf Metrics
  - ANN Benchmarks
  - QPS Testing
markdown: >-
  ## Overview


  GraphRAG-Bench is a rigorous evaluation framework benchmarking GraphRAG
  against vanilla RAG across reasoning tasks, multi-hop queries, and domain
  challenges.


  ## Key Features


  - Standardized metrics for graph-enhanced retrieval

  - Multi-hop query evaluation

  - Domain-specific challenges

  - Comparison with traditional vector RAG


  ## Use Cases


  - Hybrid retrieval system selection

  - GraphRAG vs vector DB performance

  - Production RAG optimization


  ## Pricing


  Free and open-source.
