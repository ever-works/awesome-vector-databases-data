markdown: >-
  ## Overview


  Qdrant Edge is a lightweight, embedded vector search engine for AI on devices
  like robots, kiosks, home assistants, and mobile phones. Designed for
  real-time vector search on edge devices with limited computational resources.


  ## Key Features


  ### Offline Functionality


  Qdrant Edge allows applications to use Qdrant's functionality even with
  intermittent or no internet connectivity, making it ideal for edge deployment
  scenarios.


  ### Resource Optimization


  Optimized for devices with limited:

  - Computational power

  - Memory

  - Storage

  - Network connectivity


  ### Real-Time Search


  Provides real-time vector search capabilities directly on edge devices,
  eliminating network latency and cloud dependencies.


  ## Use Cases


  - Robotics applications requiring local AI decision-making

  - Kiosk systems with offline semantic search

  - Home assistants with privacy-focused local processing

  - Mobile applications needing offline vector search

  - IoT devices with intermittent connectivity

  - Industrial automation systems


  ## Edge AI Benefits


  - **Privacy**: Data stays on device

  - **Latency**: No network round-trips

  - **Reliability**: Works without internet

  - **Cost**: Reduced cloud infrastructure costs


  ## Integration


  Integrates with Qdrant's ecosystem while providing edge-optimized performance
  characteristics.


  ## Pricing


  Part of Qdrant's product offerings - check Qdrant pricing page for details.
