name: RuVector
description: A self-learning, self-optimizing vector database with graph
  intelligence, local AI runtime, and PostgreSQL integration. It improves search
  quality over time using GNNs that learn from queries and feedback, supports
  hybrid search, Graph RAG, DiskANN, and deploys as a single file anywhere
  including browsers and edge devices. Open-source under MIT license, free
  forever.
