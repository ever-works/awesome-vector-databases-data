markdown: |-
  ## Overview
  RuVector enables low-latency on-device vector/graph search.

  ## Features
  - HNSW + hyperbolic indexing
  - Self-learning GNN
  - WASM/edge deployment
  - Hybrid RAG

  ## Use Cases
  - IoT real-time AI
  - Mobile CV inference
  - Browser edge agents

  ## Comparisons
  - Offline edge vs cloud Qdrant
  - Graph-enhanced retrieval

  ## Pricing
  Free open-source (MIT).
