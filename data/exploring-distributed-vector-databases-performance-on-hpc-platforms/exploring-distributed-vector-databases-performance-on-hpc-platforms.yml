name: Exploring Distributed Vector Databases Performance on HPC Platforms
description: SC'25 Workshop paper characterizing Qdrant vector database
  performance on high-performance computing platforms, bridging AI and HPC
  workloads.
source_url: https://arxiv.org/abs/2509.12384
category: Research Papers & Surveys
tags:
