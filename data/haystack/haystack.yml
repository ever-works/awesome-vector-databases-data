name: Haystack
description: Haystack is a Python library for building vector search and
  embedding-based retrieval pipelines, integrating ANN indexes without requiring
  full databases. Key features include support for HNSW, FAISS indexes,
  quantization options, and multi-language embeddings. Perfect for prototyping
  RAG systems and embedded AI apps; more flexible than hnswlib, lighter than
  Milvus for development workflows.
