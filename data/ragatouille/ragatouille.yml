name: RAGatouille
description: Retrieval library for RAG pipelines in LLM apps, specializing in
  ColBERT-style late-interaction models for state-of-the-art dense retrieval and
  reranking performance.
source_url: https://github.com/AnswerDotAI/RAGatouille
category: RAG Frameworks & Pipelines
tags:
  - RAG Pipeline
  - Retrieval Augmentation
  - Hybrid RAG
markdown: >-
  ## RAG Integration


  RAGatouille slots into RAG workflows as retriever/reranker: index docs with
  ColBERT tokenizer, retrieve top-k via late-interaction scoring, or rerank
  BM25/embedding results for better precision.


  ## Features


  - **Chunking**: Compatible with any preprocessor

  - **Retrieval**: ColBERTv2 (zero-shot strong), multi-token matching

  - **Rerank**: Token-level alignment scoring

  - **Training**: Fine-tune on domain data


  ## Use Cases


  - High-accuracy RAG apps

  - Reranking layer in pipelines

  - Zero-shot domain adaptation


  ## LlamaIndex vs Haystack


  RAGatouille complements both as advanced retriever; LlamaIndex integrates
  easily, Haystack via custom retriever node.


  ## Pricing


  Free open-source (MIT).
