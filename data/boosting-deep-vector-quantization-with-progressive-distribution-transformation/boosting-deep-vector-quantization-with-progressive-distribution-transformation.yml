name: Boosting Deep Vector Quantization with Progressive Distribution Transformation
description: SIGKDD 2025 paper proposing a progressive distribution
  transformation approach for boosting deep vector quantization, improving
  quantization accuracy by progressively adapting data distributions during
  training.
source_url: https://arxiv.org/abs/2502.01713
category: Research Papers & Surveys
tags:
  - quantization
  - deep-learning
  - distribution-transformation
markdown: >-
  ## Overview


  Introduces progressive distribution transformation to boost deep vector
  quantization for approximate nearest neighbor search.


  ## Key Contributions


  - Progressive distribution transformation during quantization

  - Improved quantization accuracy for high-dimensional vectors

  - Deep learning-based codebook optimization

  - Published in SIGKDD 2025


  ## Publication


  - **Venue**: SIGKDD 2025

  - **Authors**: Wang et al.
