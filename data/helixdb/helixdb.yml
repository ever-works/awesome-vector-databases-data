name: HelixDB
description: Open-source graph-enhanced vector database built in Rust enabling
  hybrid graph+vector search for KG-RAG applications. Supports graph queries for
  knowledge graph traversal combined with vector similarity search. Unlike pure
  vector databases, it natively models relationships for multi-hop reasoning and
  connected data retrieval.
source_url: https://github.com/HelixDB/helix-db
category: Graph-Enhanced Vector DBs
tags:
  - graph-database
  - kg-rag
  - rust
markdown: |-
  ## Overview

  Graph-vector database in Rust for RAG and AI apps.

  ## Features
  - Graph + vector search
  - High performance Rust implementation
  - Open-source (AGPL-3.0)

  ## Use Cases
  - Knowledge graphs
  - KG-RAG
  - AI/ML workflows with relational data

  ## Comparisons
  Vs pure vector DBs: Built-in graph capabilities for relationship traversal.

  ## Pricing
  Free open-source.
