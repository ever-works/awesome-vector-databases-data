markdown: >-
  ## Overview


  BGE-reranker-v2-m3 from BAAI (Beijing Academy of Artificial Intelligence)
  supports 100+ languages with Apache 2.0 licensing, making it a popular choice
  for production deployments where control and cost matter.


  ## Key Features


  ### Multilingual Support


  Supports over 100 languages, making it ideal for international applications
  and cross-lingual retrieval scenarios.


  ### Open-Source Licensing


  Released under Apache 2.0 license, which means:

  - No legal concerns for commercial use

  - Can be self-hosted

  - Full control over the model

  - No vendor lock-in


  ### Performance


  BGE-v2-m3 on GPU matched Cohere's latency for zero ongoing cost, with 50-100ms
  GPU latency that beats API options.


  ## Deployment Options


  ### Self-Hosted


  bge-reranker is open-source and can be self-hosted, reducing costs while
  maintaining high accuracy. It is suitable for teams that prefer full control
  over their models.


  ### Multilingual Production with GPU


  Recommended for multilingual production environments with GPU availability.
  The 50-100ms GPU latency beats API options, and you avoid ongoing costs.
  Apache 2.0 licensing means no legal concerns.


  ## Use Cases


  - Multilingual search reranking

  - Cross-lingual information retrieval

  - Enterprise RAG systems

  - International e-commerce search

  - Document retrieval across languages


  ## Integration


  Can be integrated with:

  - LangChain

  - Haystack

  - Custom RAG pipelines

  - Vector databases


  ## Pricing


  Free and open-source under Apache 2.0 license.
