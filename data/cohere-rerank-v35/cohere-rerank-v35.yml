markdown: >-
  ## Overview


  Cohere Rerank 3.5 is Cohere's newest and most performant foundational model
  for ranking, with a context length of 4096 and state-of-the-art performance on
  multilingual retrieval tasks and reasoning capabilities.


  ## Multilingual Support


  The model can comprehend and analyze enterprise data and user questions across
  over 100 languages including Arabic, Chinese, English, French, German, Hindi,
  Japanese, Korean, Portuguese, Russian, and Spanish. It offers state-of-the-art
  accuracy on these 10 global business languages.


  ## Key Features


  - Context length of 4096 tokens

  - SOTA performance on BEIR and domains such as Finance, E-commerce,
  Hospitality, Project Management, and Email/Messaging Retrieval tasks

  - Single multilingual model (rerank-v3.5), unlike version 3.0 which had
  separate English-only and multilingual models

  - V2 API with enhanced capabilities


  ## Performance


  Achieves state-of-the-art results on standard benchmarks:

  - Best performance on multilingual retrieval tasks

  - Superior reasoning capabilities for complex queries

  - Specialized optimization for enterprise domains


  ## API and Availability


  Along with the model, Cohere released V2 of the Rerank API. The model is
  available on multiple platforms:

  - Amazon Bedrock

  - Azure AI Foundry

  - Oracle Cloud

  - Heroku

  - Cohere Platform


  ## Use Cases


  - Enterprise search across multilingual content

  - E-commerce product ranking

  - Financial document retrieval

  - Customer support systems

  - Email and messaging search

  - RAG (Retrieval Augmented Generation) applications


  ## Pricing (2026)


  Rerank 3.5 costs $2.00 per 1,000 searches, where a single search counts as one
  query with up to 100 documents to rank.


  ## Integration


  Easy integration with popular frameworks including LangChain, LlamaIndex, and
  Haystack.
