markdown: >-
  ## Overview


  LangChain is the leading Python framework for building LLM-powered
  applications. It provides extensive vector store integrations, chain
  orchestration capabilities, and comprehensive support for RAG pipelines.


  ## Features


  - **Composable Framework**: Modular approach for constructing context-aware,
  reasoning applications powered by LLMs

  - **Extensive Vector Store Integrations**: Native support for Pinecone,
  Chroma, FAISS, Weaviate, and many others

  - **Chain Orchestration**: Build complex LLM workflows by chaining prompts,
  retrievers, and output parsers

  - **RAG Pipeline Support**: End-to-end tooling for retrieval-augmented
  generation patterns

  - **Multi-Language Support**: SDKs and documentation for both Python and
  JavaScript/TypeScript

  - **Vendor Optionality**: Designed to allow flexibility by making it easy to
  swap or add new LLM providers

  - **Ecosystem Integration**: Works alongside LangGraph for orchestration and
  LangSmith for observability and evaluation

  - **Developer Tools**: Extensive documentation, tutorials, and community
  resources


  ## Pricing


  LangChain is open-source and free to use. Related products LangSmith and
  LangGraph Platform have separate pricing.
