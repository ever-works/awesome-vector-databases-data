markdown: |-
  ## Overview

  Havenask is a high-performance distributed search engine with vector support.

  ## Features

  - Scales to billions of records
  - Millions QPS/TPS
  - Vector search
  - SQL-like queries
  - C++ core for efficiency

  ## Pricing

  Free open-source.
