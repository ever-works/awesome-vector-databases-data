name: Havenask
description: Havenask is an open-source, self-hosted distributed search engine
  from Alibaba with vector search for large-scale AI applications. Key features
  include high QPS/TPS, millisecond latency, SQL queries, and free use. Suited
  for production RAG and search, self-hosted for cost efficiency vs managed like
  Pinecone.
source_url: https://github.com/alibaba/havenask
category: Open Source Vector Databases
tags:
  - open-source
