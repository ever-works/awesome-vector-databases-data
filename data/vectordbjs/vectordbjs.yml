name: VectorDB.js
description: Simple in-memory vector database for Node.js that works 100%
  locally and in-memory by default. Uses hnswlib-node for simple vector search
  and Embeddings.js for simple text embeddings with support for OpenAI, Mistral
  and local embeddings.
