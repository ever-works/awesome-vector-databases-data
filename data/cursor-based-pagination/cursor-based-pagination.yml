name: Cursor-Based Pagination
description: A pagination technique for efficiently scrolling through large
  vector database result sets using cursors instead of offsets. Essential for
  retrieving all vectors in a collection or iterating through search results
  without performance degradation.
source_url: https://qdrant.tech/documentation/concepts/points/#scroll-points
category: Concepts & Definitions
tags:
