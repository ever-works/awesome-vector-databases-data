markdown: >-
  ## Overview


  Optimizely is an experience optimization platform that provides
  recommendations, targeting, and testing without requiring a separate vector
  database infrastructure. It delivers personalization and experimentation at
  the application level.


  ## Features


  - **A/B testing**: rigorous experimentation framework for digital experiences

  - **Recommendations**: personalized content and product suggestions

  - **Targeting**: rule-based and AI-driven audience segmentation

  - **Full-stack experimentation**: client-side and server-side testing

  - **Minimal infrastructure setup**: operates at the application layer,
  avoiding DB management


  ## Best For


  Marketing and growth teams that want turnkey personalization and
  experimentation with minimal engineering overhead.


  ## Pricing


  Usage-based and enterprise pricing tiers available; contact sales for details.
