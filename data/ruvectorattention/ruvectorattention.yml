name: "@ruvector/attention"
description: Library implementing 46 attention mechanisms including dot-product,
  multi-head, Flash, linear, hyperbolic, graph, and sheaf attention. Supports
  SIMD optimization, streaming, caching, hard negative mining, and hyperbolic
  math functions for transformers and GNNs.
