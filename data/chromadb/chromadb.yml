name: ChromaDB
description: ChromaDB (Chroma) is an open-source embedding database for AI apps,
  lightweight and embeddable with in-memory/persistent storage using HNSW.
  Features auto-embedding, multi-modal support, and easy Python integration for
  local dev. Great for prototyping RAG/agents; simpler than Weaviate but less
  enterprise-ready, similar to LanceDB for embedded use but in-memory focused vs
  LanceDB's disk-optimized columnar storage with SQL support.
