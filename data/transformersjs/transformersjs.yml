name: Transformers.js
description: JavaScript library from Hugging Face for running transformer models
  directly in the browser with no server required, providing embeddings,
  classification, and multimodal capabilities using ONNX Runtime.
source_url: https://huggingface.co/docs/transformers.js/
category: SDKs & Libraries
