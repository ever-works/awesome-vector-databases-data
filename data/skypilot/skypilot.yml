name: SkyPilot
description: SkyPilot orchestrates cloud-hosted distributed GPU clusters for
  vector embedding generation and batch workloads across AWS, GCP, Azure with
  auto-scaling and spot instance optimization. Enables enterprise RAG
  preprocessing at global scale by accessing GPUs across regions for maximum
  throughput. More cost-efficient than Pinecone for batch jobs via spot pricing;
  flexible multi-cloud vs Zilliz Cloud single-provider.
