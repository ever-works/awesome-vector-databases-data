name: NMSLIB
description: NMSLIB (Non-Metric Space Library) is a pure ANN index library for
  similarity search in metric and non-metric spaces, implementing HNSW,
  SW-graph, VPTree. Features Python/C++/Java bindings, custom distance metrics,
  no built-in quantization/GPU. Ideal for custom vector engines, benchmarks
  across spaces; versatile building block vs full DBs like Qdrant.
source_url: https://github.com/nmslib/nmslib
category: ANN Indexing Libraries
tags:
  - Pure ANN
  - Index Only
  - Benchmark Tool
featured: false
markdown: >-
  ## Features


  - Indexing methods: HNSW, SW-graph, VPTree, and more

  - Custom distance metrics: Euclidean, Cosine, Jaccard, and more

  - Efficient index construction and query processing

  - Python, C++, and Java bindings


  ## Installation and Usage


  NMSLIB can be installed using pip or built from source, and it offers a Python
  API with examples and documentation.
