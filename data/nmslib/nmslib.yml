name: NMSLIB
description: Non-Metric Space Library (NMSLIB) is an open-source, highly
  efficient library for similarity search and nearest neighbor search in generic
  metric and non-metric spaces. It supports various similarity search algorithms
  and distance functions for a wide range of applications.
source_url: https://github.com/nmslib/nmslib
category: ANN Indexing Libraries
tags:
  - open-source
  - non-metric
  - efficient
featured: false
markdown: >-
  ## Features


  - Indexing methods: HNSW, SW-graph, VPTree, and more

  - Custom distance metrics: Euclidean, Cosine, Jaccard, and more

  - Efficient index construction and query processing

  - Python, C++, and Java bindings


  ## Installation and Usage


  NMSLIB can be installed using pip or built from source, and it offers a Python
  API with examples and documentation.
