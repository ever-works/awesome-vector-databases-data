name: FINGER — Fast Inference for Graph-based ANNS
description: FINGER provides a fast inference framework for graph-based
  approximate nearest neighbor search, optimizing search path traversal to
  reduce query latency while maintaining high recall. Published at Web 2023.
source_url: https://arxiv.org/abs/2206.05402
