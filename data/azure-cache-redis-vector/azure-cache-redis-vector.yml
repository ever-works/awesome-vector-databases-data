name: Azure Cache for Redis Vector Search
description: Vector search plugin for Azure Cache for Redis via RediSearch
  module, supporting HNSW/Flat indexes, hybrid lexical+vector with BM25 fusion,
  metadata filtering. Suited for enterprise semantic caching, real-time RAG, and
  recommendations. Integrated caching layer provides sub-ms latency vs
  standalone vector DBs like Weaviate.
