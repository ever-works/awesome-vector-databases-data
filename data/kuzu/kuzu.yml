name: Kuzu
description: Graph-enhanced vector database enabling hybrid graph+vector search
  for KG RAG applications. Supports Cypher queries with HNSW vector indexes for
  efficient multi-hop retrieval over knowledge graphs. Unlike pure vector
  databases like Pinecone, it natively models relationships for superior
  connected data reasoning and traversal.
