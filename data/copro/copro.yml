markdown: >-
  ## Overview


  COPRO (Coordinate Optimization for Prompts) is an optimizer in DSPy that
  automatically generates and refines new instructions for each step in your
  language model pipeline. It uses coordinate ascent to systematically improve
  prompt quality.


  ## How COPRO Works


  COPRO generates and refines new instructions for each step, optimizing them
  with coordinate ascent. The process involves:


  1. Starting with initial instructions

  2. Generating alternative instruction candidates

  3. Evaluating each candidate against metrics

  4. Selecting the best performing instructions

  5. Iteratively refining through multiple rounds


  ## Key Features


  - **Automatic Instruction Generation**: Uses LLMs to generate their own
  instruction variations

  - **Coordinate Ascent**: Optimizes one module at a time while keeping others
  fixed

  - **Systematic Search**: Explores the instruction space methodically

  - **Evaluation-Driven**: Uses metrics to guide optimization


  ## Advantages


  - Eliminates manual prompt engineering

  - Finds non-obvious instruction formulations

  - Works across different LLM providers

  - Can be combined with other DSPy optimizers


  ## Integration


  COPRO integrates seamlessly with the DSPy framework's modular architecture,
  allowing developers to focus on building systems rather than manually tweaking
  prompts.


  ## Use Cases


  - Complex reasoning tasks

  - Multi-step information processing

  - Question answering pipelines

  - Document processing workflows

  - Any application where prompt quality significantly impacts results


  ## Pricing


  Free and open-source as part of the DSPy framework.
