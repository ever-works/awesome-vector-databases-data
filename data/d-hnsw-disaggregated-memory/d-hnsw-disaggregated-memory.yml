name: d-HNSW
description: An efficient vector search system designed for disaggregated memory
  architectures. d-HNSW optimizes HNSW for environments where compute and memory
  are separated, typical in modern cloud and distributed systems.
source_url: https://arxiv.org/abs/2505.11783
category: Research Papers & Surveys
tags:
