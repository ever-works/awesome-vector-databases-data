markdown: >-
  ## Overview

  Couchbase Lite Vector supports on-device low-latency semantic queries for edge
  AI.


  ## Features

  - ANN vector search

  - ACID transactions

  - Multi-platform (iOS/Android/web)

  - Offline-first with sync


  ## Use Cases

  - Mobile/IoT real-time AI

  - Personalized recs on edge

  - CV inference offline


  ## Comparisons

  - On-device vs cloud Qdrant

  - Embedded unlike server-based alternatives


  ## Pricing

  Contact Couchbase for details.
