name: Couchbase Lite Vector
description: Embedded NoSQL document database with vector search capabilities
  for offline GenAI on mobile, IoT, and browsers, using ANN indexing for
  low-latency semantic queries. Provides ACID compliance, sync replication, and
  multi-platform deployment with no cloud reliance. Suited for edge RAG and
  personalized recommendations; more mobile-focused than Milvus, embedded unlike
  Qdrant's server model.
