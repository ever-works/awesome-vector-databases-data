markdown: >-
  ## Overview


  Couchbase Lite is a developer-friendly, full-featured embedded NoSQL database
  with vector search for offline-first GenAI apps that run on mobile, IoT
  devices, and web browsers. It enables vector search on-device for semantic
  search and RAG with no internet dependencies.


  ## Key Features


  ### Offline-First Architecture


  Enables vector search on-device for:

  - Semantic search

  - Retrieval-Augmented Generation (RAG)

  - No internet dependencies required


  ### Multi-Platform Support


  Runs on:

  - Mobile devices (iOS, Android)

  - IoT devices

  - Web browsers

  - Embedded systems


  ### Full NoSQL Capabilities


  Combines traditional NoSQL database features with modern vector search:

  - Document storage

  - Query capabilities

  - ACID transactions

  - Vector similarity search


  ## Edge Computing Benefits


  Ideal for edge computing scenarios where applications run directly on devices
  such as:

  - Laptops

  - Embedded systems

  - IoT devices


  Since everything runs locally, vector search can be performed without network
  latency or cloud dependencies, allowing the system to function even when
  offline.


  ## Use Cases


  - Mobile apps with offline semantic search

  - Field service applications

  - Industrial IoT with local AI processing

  - Healthcare devices requiring data privacy

  - Retail kiosks with intermittent connectivity


  ## Synchronization


  When connectivity is available, Couchbase Lite can sync with Couchbase Server
  for data backup and multi-device coordination.


  ## Pricing


  Part of Couchbase product suite - contact Couchbase for licensing details.
