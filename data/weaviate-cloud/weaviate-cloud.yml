name: Weaviate Cloud
description: "Weaviate Cloud is the managed SaaS offering for Weaviate,
  providing serverless or dedicated clusters with auto-scaling, backups, and
  monitoring for production vector search. Includes authentication,
  multi-tenancy, and seamless upgrade from open-source. Use cases: enterprise
  RAG, semantic apps; simplifies ops vs. self-hosted Weaviate like Pinecone does
  for its core, with added GraphQL/modules."
