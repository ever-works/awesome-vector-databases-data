name: Weaviate Cloud
description: "Managed cloud service for Weaviate open-source vector DB,
  providing GraphQL API, hybrid search (vector+keyword), ML modules,
  multi-tenancy, auto-classification, auto-scaling clusters. Use cases:
  Knowledge graphs, semantic search at production scale. Vs self-hosted Milvus:
  easier ops and schema-aware; vs managed pgvector: full-featured vector DB."
