markdown: >-
  ## Overview


  Fully managed platform for Weaviate vector database, handling infrastructure,
  scaling, backups, and security.


  ## Features


  - Serverless and dedicated clusters with auto-scaling

  - Same core features as open-source: GraphQL, hybrid search, ML modules,
  multi-tenancy

  - Automated backups, disaster recovery

  - Multi-region deployment

  - Integrated monitoring and security


  ## Use Cases


  - Production semantic search and RAG

  - Enterprise knowledge graphs


  ## Pricing


  Pay-as-you-go pricing with free sandbox tier.
