markdown: >-
  ## Overview


  Weaviate Cloud (WCD) is the fully managed cloud platform for Weaviate vector
  database, handling scaling, backups, security, and updates.


  ## Features


  - Auto-scaling clusters

  - Multi-tenancy support

  - Disaster recovery

  - Module integrations (e.g., transformers, Q&A)

  - Security & compliance

  - Global regions


  ## Pricing


  Pay-as-you-go with free tier available.
