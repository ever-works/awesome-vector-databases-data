name: StreamingDiskANN
description: Disk-based vector indexing algorithm from Timescale that extends
  Microsoft's DiskANN for dynamically updating datasets, enabling terabyte-scale
  vector search with streaming post-filtering capabilities.
source_url: https://github.com/timescale/pgvectorscale
category: Concepts & Definitions
