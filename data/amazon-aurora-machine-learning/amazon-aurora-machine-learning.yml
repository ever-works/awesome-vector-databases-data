name: Amazon Aurora Machine Learning
description: Amazon Aurora Machine Learning provides managed vector storage and
  search capabilities integrated into Aurora PostgreSQL for AI workloads on AWS.
  Key features include serverless scaling, direct ML model calls via SQL for
  embeddings, and seamless integrations with Bedrock and SageMaker. Perfect for
  RAG pipelines and enterprise AI applications, it simplifies vectorization and
  abstracts infrastructure compared to self-hosted options like Milvus.
