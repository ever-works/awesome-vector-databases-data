markdown: >-
  ## Overview


  DocArray is Jina AI's data type library for multi-modal data handling. It
  provides Document types for images, text, audio, and embeddings with built-in
  serialization and transport capabilities.


  ## Features


  - **Multi-modal Data Representation**: Define and work with documents
  containing various data types (images, text, audio, video) using Python
  classes

  - **Document Types**: Typed schemas via `BaseDoc` for different modalities and
  data structures

  - **Pydantic Compatibility**: Built on Pydantic for type validation and
  integration with the broader Python ecosystem

  - **Tensor Shape Specification**: Support for tensor shapes with PyTorch,
  NumPy, and TensorFlow

  - **Serialization**: Built-in serialization formats for data persistence and
  exchange

  - **Transport Capabilities**: Efficient transport of multi-modal documents
  across services

  - **Batch Processing**: `DocVec` and `DocList` collections for bulk operations

  - **Flexible Embedding Storage**: Store and manage vector embeddings from any
  model

  - **Open Source**: Distributed under Apache License 2.0, part of the LF AI &
  Data Foundation


  ## Pricing


  DocArray is open-source software and free to use under the Apache License 2.0.
