name: SQLite VSS
description: SQLite extension using FAISS for vector similarity search, enabling
  hybrid SQL+vector queries with ACID transactions on lightweight embedded SQL
  infrastructure. Cost-effective for local/edge apps vs dedicated VDBs.
source_url: https://github.com/asg017/sqlite-vss
category: Relational Vector Extensions
tags:
  - sql-hybrid
  - sqlite-ext
  - faiss
markdown: >-
  ## Overview


  SQLite extension bringing FAISS-based vector search to SQLite. Note:
  Development shifted to sqlite-vec.


  ## Features


  - FAISS ANN search

  - FTS5-like API


  ## Use Cases


  - Semantic search in SQLite

  - Edge RAG


  ## Comparisons


  Embedded ACID SQL vs separate VDBs; no sync needed.


  ## Pricing


  Free OSS.
