name: pgvector-crystal
description: Crystal SDK/client for pgvector PostgreSQL extension, providing
  idiomatic bindings for vector storage and similarity search. Supports
  embeddings workflows (OpenAI/Cohere), hybrid/sparse search via crystal-pg
  driver. For integrating Postgres vector ops into Crystal apps; official
  community client vs. direct SQL or other lang bindings.
