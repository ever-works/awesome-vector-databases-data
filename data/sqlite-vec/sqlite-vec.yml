name: sqlite-vec
description: sqlite-vec is a Rust-based SQLite extension library for vector
  similarity search using diskANN indexes on embeddings, enabling lightweight
  ANN without separate databases. Features HNSW-like graphs, quantization
  support, and hybrid full-text+vector queries in embedded SQLite environments.
  Perfect for prototyping and on-device apps; extremely lightweight compared to
  Milvus, more persistent than pure hnswlib.
source_url: https://github.com/asg017/sqlite-vec
