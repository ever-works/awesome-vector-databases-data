name: Matryoshka Representation Learning
description: Training technique enabling flexible embedding dimensions by
  learning representations where truncated vectors maintain good performance,
  achieving 75% cost savings when using smaller dimensions.
source_url: https://arxiv.org/abs/2205.13147
category: Concepts & Definitions
tags:
