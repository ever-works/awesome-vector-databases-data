name: RVF
description: RuVector Format (RVF) is a universal binary file format that
  combines database, model, graph engine, kernel, and attestation into a single
  deployable cognitive container. Supports storing vector embeddings, LoRA
  adapters, GNN state, self-booting Linux microkernel, WASM runtime, eBPF
  acceleration, Git-like COW branching, tamper-evident witness chains, and
  post-quantum signatures.
