markdown: >-
  ## Overview


  Cursor IDE, developed by Anysphere, a Y Combinator-backed startup founded in
  2022, has emerged as the leading AI-powered code editor in 2026, fundamentally
  changing how developers write, review, and ship code. Cursor is an AI-assisted
  integrated development environment for Windows, macOS, and Linux that is a
  fork of Visual Studio Code with additional AI features.


  ## Recent Major Updates (Early 2026)


  ### JetBrains Integration (March 2026)

  Cursor is now available in IntelliJ IDEA, PyCharm, WebStorm, and other
  JetBrains IDEs through the Agent Client Protocol (ACP), allowing developers
  who rely on JetBrains for Java and multilanguage support to use any frontier
  model from OpenAI, Anthropic, Google, and Cursor for agent-driven development.


  ### Version 2.6 Features (March 2026)

  This release introduces interactive UIs in agent chats, a way for teams to
  share private plugins, and improvements to core capabilities like Debug mode,
  with MCP Apps supporting interactive user interfaces like charts from
  Amplitude, diagrams from Figma, and whiteboards from tldraw directly inside
  Cursor.


  ## Key Features


  ### AI Capabilities

  Composer 1.5 offers multi-file AI editing with 20x scaled reinforcement
  learning, self-summarization for long contexts, and 60% latency reduction.


  Background Agents launch AI coding tasks that run autonomously while you
  continue working on other files, while BugBot provides automated bug detection
  that scans your codebase and identifies potential issues before they reach
  production.


  ### Model Support

  Users can choose freely between frontier models from OpenAI, Anthropic,
  Gemini, and xAI.


  ## Market Position


  What began as an experimental fork of Visual Studio Code has evolved into a
  platform trusted by some of the world's most influential technology companies,
  from Stripe and NVIDIA to Salesforce and Shopify.


  ## Pricing


  - Free plan available

  - Pro plan at $20/month

  - Business plan with enterprise features
