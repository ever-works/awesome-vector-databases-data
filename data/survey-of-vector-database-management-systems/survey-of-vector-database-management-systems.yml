name: Survey of Vector Database Management Systems
description: VLDB 2024 paper presenting a comprehensive survey of vector
  database management systems, covering architecture, indexing techniques, query
  processing, and emerging trends in the rapidly evolving field of vector
  databases.
source_url: https://arxiv.org/abs/2308.11858
category: Research Papers & Surveys
tags:
  - survey
  - vector-database
  - systematic-review
markdown: >-
  ## Overview


  A comprehensive academic survey covering the landscape of vector database
  management systems.


  ## Key Contributions


  - Systematic classification of VDBMS architectures

  - Survey of indexing techniques (graph, tree, hash, quantization)

  - Coverage of query processing and optimization

  - Discussion of emerging trends and open challenges


  ## Publication


  - **Venue**: VLDB 2024

  - **Authors**: Pan et al.
