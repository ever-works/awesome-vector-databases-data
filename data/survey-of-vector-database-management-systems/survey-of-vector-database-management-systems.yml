name: Survey of Vector Database Management Systems
description: VLDB 2024 comprehensive survey on vector database management
  systems detailing architectures, ANN indexing techniques
  (graph/tree/hash/quantization), query processing, and emerging trends.
  Highlights theory/practice gaps in scaling ANN methods to distributed systems
  and dynamic workloads. Essential for academic literature selection and
  research; contrasts full-system analysis (VLDB) with algorithm benchmarks
  (NeurIPS BigANN).
source_url: https://arxiv.org/abs/2308.11858
category: Research Papers Surveys
tags:
  - ANN Theory
  - Index Survey
  - Academic Review
featured: true
markdown: >-
  ## Overview


  VLDB 2024 paper providing systematic survey of vector DB management systems
  (VDBMS).


  ## Features


  - Architecture classification (storage engines, query processors)

  - ANN indexing review: graph (HNSW), tree, hash, quantization

  - Query processing & optimization techniques

  - Distributed systems and concurrency handling


  ## Theory/Practice Gaps


  - Theoretical ANN recall vs practical trade-offs under filtering/updates

  - Memory-centric theory vs disk/persistent indexes in practice

  - Single-node prototypes vs production-scale distribution


  ## Use Cases


  - Academic paper selection for literature reviews

  - Identifying research gaps in VDBMS

  - Guidance for building new vector databases


  ## Comparisons


  | Aspect | VLDB Survey (this paper) | NeurIPS BigANN |

  |--------|--------------------------|----------------|

  | Focus | Full VDBMS systems | Pure ANN algorithms |

  | Scale | System-level | Billion-scale datasets |

  | Metrics | Architecture completeness | QPS/recall |


  ## Publication


  **Venue**: VLDB 2024 (Pan et al.)
