markdown: >-
  ## Overview


  jina-embeddings-v5-text-small was released on February 18, 2026, achieving
  state-of-the-art multilingual performance with 677M parameters—the highest
  among embedding models under 1B parameters.


  ## Features


  - 71.7 average score on MTEB English v2

  - 67.7 score on MMTEB (Multilingual)

  - 677M parameters for efficient deployment

  - API compatibility with OpenAI's text-embedding-3-large

  - Drop-in replacement for OpenAI embeddings

  - Open-source under Apache 2.0 license


  ## Performance


  - Highest multilingual performance under 1B parameters

  - Excellent semantic understanding across languages

  - Efficient inference on consumer hardware


  ## API Compatibility


  The API endpoint matches OpenAI's JSON schemas, allowing users to easily
  replace OpenAI models with Jina embeddings without code changes.


  ## Pricing


  Generous free tier with millions of tokens included, competitive paid tiers
  for production use
