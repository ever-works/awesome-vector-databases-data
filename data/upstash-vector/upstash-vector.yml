markdown: >-
  ## Overview


  Upstash Vector is a serverless vector database designed for AI and LLM
  applications. Fully managed and purpose-built for AI workloads, it scales to
  over a billion vectors with transparent, scale-to-zero pricing.


  ## Key Features


  - **Fully Serverless**: No infrastructure management required

  - **Scale to Zero**: Pay only for actual usage

  - **High Scalability**: Handles over 1 billion vectors

  - **Simple Pricing**: Per-request model with no hidden costs

  - **Fully Managed**: Automatic updates and maintenance

  - **Global Availability**: Deployed across multiple regions


  ## Pricing


  ### Free Tier

  - Available for development and testing

  - Limited requests and storage


  ### Pay-As-You-Go

  - **$0.4 per 100K requests**

  - **$0.25 per 1GB storage**

  - No minimum commitment

  - Pay only for what you use


  ### Fixed Plan

  - **$60 per month**

  - Consistent usage with flat pricing

  - Predictable costs for production workloads


  ### Pro Plan

  - Enterprise features and support

  - Custom pricing based on requirements

  - Dedicated support team


  ## Deployment Options


  - Upstash Cloud (managed)

  - AWS Marketplace: Pay-as-you-go or contract options

  - Vercel Marketplace integration


  ## Integration


  - REST API for language-agnostic access

  - SDKs for popular languages

  - LangChain integration

  - Compatible with major LLM frameworks


  ## Use Cases


  - LLM-powered applications

  - Semantic search at scale

  - Recommendation systems

  - AI agents with memory

  - RAG pipelines


  ## Performance


  - Low latency queries

  - Automatic scaling based on demand

  - Global edge deployment for reduced latency


  ## Comparison to Traditional Databases


  - No capacity planning required

  - No servers to maintain

  - Automatic scaling up and down

  - Pay for actual usage, not provisioned capacity


  ## Recent Milestones


  Reached $1M ARR within two years of seed funding, demonstrating strong market
  adoption and product-market fit.
