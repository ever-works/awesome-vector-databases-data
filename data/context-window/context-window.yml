name: Context Window
description: Maximum number of tokens an embedding model or LLM can process in a
  single input. Critical parameter for vector databases affecting chunk sizes,
  with modern models supporting 512 to 32,000+ tokens for long-document
  understanding.
source_url: https://www.anthropic.com/index/claude-2-1
category: Concepts & Definitions
tags:
