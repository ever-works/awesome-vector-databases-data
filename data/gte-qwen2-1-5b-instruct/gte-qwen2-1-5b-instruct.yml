name: gte-Qwen2-1.5B-instruct
description: A state-of-the-art multilingual text embedding model from Alibaba's
  GTE (General Text Embedding) series, built on the Qwen2-1.5B LLM. The model
  supports up to 8192 tokens and incorporates bidirectional attention mechanisms
  for enhanced contextual understanding across diverse domains.
