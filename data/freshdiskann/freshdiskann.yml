markdown: >-
  ## Overview


  FreshDiskANN is a fast and accurate graph-based ANN (Approximate Nearest
  Neighbor) index designed for streaming similarity search, aiming to serve and
  update an index over a billion points with real-time freshness using just one
  machine.


  ## Key Features


  - Billion-scale index support on single machine

  - Real-time index updates

  - Graph-based indexing approach

  - Disk-based storage for large datasets

  - Streaming data ingestion

  - High accuracy with fast queries


  ## Technical Approach


  - Graph-based nearest neighbor search

  - Optimized for disk-resident data

  - Efficient update mechanisms

  - Balances accuracy and speed

  - Single-machine scalability


  ## Use Cases


  - Real-time recommendation systems

  - Streaming data applications

  - Large-scale similarity search

  - Dynamic vector collections

  - Continuous data ingestion scenarios


  ## Performance


  - Handles billion-point datasets

  - Real-time freshness guarantees

  - Fast query response times

  - Efficient update operations

  - Single-machine deployment


  ## Research Context


  Part of the DiskANN family of algorithms from Microsoft Research, focused on
  making large-scale vector search practical on commodity hardware with
  disk-based storage.
