name: FusionANNS
description: An efficient CPU/GPU cooperative processing architecture for
  billion-scale approximate nearest neighbor search. FusionANNS achieves up to
  13.1× higher QPS compared to SPANN and can handle billion-vector datasets with
  over 12,000 QPS while maintaining 15ms latency using only one entry-level GPU.
source_url: https://arxiv.org/abs/2409.16576
category: research-papers-surveys
