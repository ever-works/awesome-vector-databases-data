markdown: |-
  ## Overview

  Proof-carrying vector ops with dependent types.

  ## Features

  - ~500ns proofs
  - 82-byte attestations
  - 3-tier gated proof routing (Reflex <10ns, Standard <1us, Deep <100us)
  - FastTermArena O(1) dedup

  ## Pricing

  Free and open-source.
