name: REAPER
description: REAPER (Reasoning based Retrieval Planning for Complex RAG Systems)
  is a research framework that addresses multi-step retrieval planning in
  complex Retrieval-Augmented Generation scenarios. It enables retrieval systems
  to plan and execute reasoning-aware retrieval strategies rather than relying
  on simple similarity-based matching.
source_url: https://arxiv.org/abs/2407.18553
category: Research Papers & Surveys
