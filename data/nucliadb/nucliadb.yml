name: NucliaDB
description: NucliaDB is a versatile vector database designed for data
  scientists and machine learning experts working with HuggingFace and other
  data pipeline platforms. Built on Tantivy in Rust and Python, it efficiently
  indexes large datasets with multi-tenant support.
source_url: https://nucliadb.com/
category: Vector Databases
tags:
  - open-source
  - rust
  - multi-tenant
featured: false
markdown: >-
  ## Features


  - Compare vectors from different models

  - Store text, files, vectors, labels, and annotations

  - Annotation and semantic search capabilities

  - Integration with popular NLP pipelines (HuggingFace, PyTorch, etc)

  - Indexing and storage of fields, paragraphs, and semantic sentences

  - Support for multiple fields and metadata, including text, HTML, Markdown,
  and more

  - Distributed storage layer support with TiKV and Redis

  - PostgreSQL storage layer support for standalone installs

  - Blob support with S3-compatible API, GCS, and PG drivers

  - Replication of index storage and distributed search


  ## Pricing


  Check NucliaDB's website for pricing details.
