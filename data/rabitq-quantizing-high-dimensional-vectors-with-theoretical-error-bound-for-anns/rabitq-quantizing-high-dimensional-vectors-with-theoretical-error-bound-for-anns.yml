name: RaBitQ — Quantizing High-Dimensional Vectors with Theoretical Error Bound
  for ANNS
description: SIGMOD 2024 paper introducing RaBitQ, a quantization method for
  high-dimensional vectors with provable theoretical error bounds for
  approximate nearest neighbor search in Euclidean space.
source_url: https://arxiv.org/abs/2306.12628
category: Research Papers & Surveys
tags:
  - quantization
  - theoretical-guarantees
  - high-dimensional
markdown: >-
  ## Overview


  RaBitQ presents a quantization approach with theoretical error bounds for
  efficient approximate nearest neighbor search on high-dimensional vectors in
  Euclidean space.


  ## Key Contributions


  - Theoretical error bounds for product quantization in Euclidean space

  - Practical and asymptotically optimal quantization strategy

  - Significant improvement in search accuracy with reduced memory overhead

  - Published at SIGMOD 2024


  ## Publication


  - **Venue**: SIGMOD 2024

  - **Authors**: Gao et al.

  - **Abbreviation**: RaBitQ


  ## Features


  - Provably bounded quantization error

  - Compatible with various search frameworks

  - Memory-efficient storage of high-dimensional vectors
