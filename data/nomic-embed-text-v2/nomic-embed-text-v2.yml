markdown: >-
  ## Overview


  Nomic Embed Text V2 is an open-source, multilingual embeddings model that uses
  the Mixture-of-Experts (MoE) architecture, achieving excellent semantic
  performance while maintaining efficient inference.


  ## Features


  - Open-source and fully auditable

  - Mixture-of-Experts (MoE) architecture

  - Multilingual support

  - Can run completely offline via Ollama

  - Efficient inference on consumer hardware

  - No external API dependencies required


  ## Deployment Options


  - Cloud API access through Nomic

  - Self-hosted deployment

  - Offline execution with Ollama

  - Integration with popular frameworks


  ## Use Cases


  - Privacy-sensitive applications

  - Offline semantic search

  - Edge deployment scenarios

  - Research and development

  - Cost-conscious production deployments


  ## Pricing


  Free and open-source for self-hosting, API access with competitive pricing
