markdown: >-
  ## Overview


  USD Code NIM is an NVIDIA NIM microservice announced in January 2026 that
  answers general knowledge OpenUSD questions and automatically generates
  OpenUSD-Python code based on text prompts.


  ## Capabilities


  - Answers OpenUSD technical questions

  - Generates OpenUSD Python code from natural language

  - Assists with 3D workflow automation

  - Integrates with digital twin development pipelines


  ## Use Cases


  - Accelerating 3D asset creation

  - Automating OpenUSD workflows

  - Digital twin development

  - Industrial metaverse applications

  - 3D content generation


  ## Technical Details


  The microservice is optimized for NVIDIA GPUs and provides:

  - Low-latency inference

  - High-quality code generation

  - OpenUSD best practices

  - Integration with NVIDIA Omniverse


  ## Industry Adoption


  Foxconn and other manufacturing leaders are using NVIDIA's USD-focused NIM
  microservices for factory digital twins and operational optimization.


  ## Pricing


  Enterprise licensing through NVIDIA NIM.
