name: AnythingLLM
description: AnythingLLM is an open-source, self-hosted AI application with
  integrated vector storage and retrieval for embeddings, enabling RAG and LLM
  workflows. Key features include built-in RAG, AI agent support, Docker
  deployment, and free MIT license. Ideal for RAG prototypes and local
  deployments, providing cost savings and full control compared to managed
  services like Pinecone.
source_url: https://github.com/Mintplex-Labs/anything-llm
category: Open Source Vector Databases
tags:
  - open-source
  - self-hosted
  - rag
  - llm
markdown: >-
  ## Overview


  AnythingLLM is an open-source all-in-one AI app with vector database
  integration for embedding storage and retrieval.


  ## Features


  - Built-in Retrieval-Augmented Generation (RAG)

  - Support for AI agents

  - No-code agent builder

  - MCP compatibility

  - Desktop and Docker deployment options


  ## Pricing


  Free and open-source under the MIT license.
