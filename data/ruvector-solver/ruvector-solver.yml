name: ruvector-solver
description: Library providing sublinear-time solvers for large-scale math
  problems like PageRank, graph Laplacians, and AI attention using 8 algorithms
  including Neumann Series, Conjugate Gradient, Forward/Backward Push, and more.
  Optimized for scale with SIMD SpMV, fused kernels, and arena allocators;
  supports WASM and NAPI bindings.
