name: tinyvector
description: Pure Rust embedding database as lightweight Axum server for
  low-latency on-device vector search scaling to 100M+ vectors in memory. High
  accuracy/speed for edge RAG; simpler than Qdrant edge.
source_url: https://github.com/m1guelpf/tinyvector
category: Embedded & Edge Vector Databases
tags:
  - open-source
  - rust
  - lightweight
