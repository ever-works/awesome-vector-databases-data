name: Probabilistic Routing for Graph-Based ANNS
description: Paper from 2024 proposing a probabilistic routing approach for
  graph-based approximate nearest neighbor search, introducing probability
  models to guide search traversal on proximity graphs.
source_url: https://arxiv.org/abs/2401.09410
category: Research Papers & Surveys
tags:
  - graph-index
