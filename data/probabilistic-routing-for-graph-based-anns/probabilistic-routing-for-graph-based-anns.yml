markdown: >-
  ## Overview


  Introduces probabilistic routing strategies for graph-based approximate
  nearest neighbor search.


  ## Key Contributions


  - Probabilistic models for graph traversal

  - Improved search accuracy through statistical guidance

  - Generalizable to various graph-based indexes

  - Published in 2024


  ## Publication


  - **Authors**: Lu et al.
