name: HVS (Hierarchical Graph Structure)
description: HVS is an open-source, self-hosted graph-based ANN index using
  Voronoi diagrams for high-dimensional vector similarity search. Key features
  include hierarchical graphs, efficient large-scale queries, and free use.
  Suited for RAG embedding storage/search prototypes, cost-free self-hosting vs
  Pinecone.
source_url: https://github.com/chuanxiao1983/HVS
category: Open Source Vector Databases
tags:
  - open-source
  - self-hosted
  - ann
  - graph-based
markdown: |-
  ## Overview

  HVS leverages Voronoi for ANN search in vector spaces.

  ## Features

  - Hierarchical graph indexing
  - Voronoi partitioning
  - Command-line tools
  - ImageNet examples

  ## Pricing

  Free open-source.
