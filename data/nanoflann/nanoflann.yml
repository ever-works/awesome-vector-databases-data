markdown: >-
  ## Overview


  nanoflann is a C++11 header-only library for Nearest Neighbor (NN) search with
  KD-trees. It is mostly optimized for 2D or 3D point clouds.


  ## Key Features


  ### Header-Only Design

  nanoflann does not require compiling or installing. You just need to #include
  <nanoflann.hpp> in your code.


  ### Efficient Implementation

  The most time-consuming part of many point cloud algorithms (like ICP) is
  querying a KD-Tree for nearest neighbors. Although there are no explicit
  SSE2/SSE3 optimizations in nanoflann, the intensive usage of inline and
  templates in practice turns into automatically SSE-optimized code generated by
  the compiler.


  ### Optimized for Spatial Data

  Specifically designed for efficient nearest neighbor searches in 2D or 3D
  spatial data structures.


  ## Origin and License


  This library is a fork (and a subset) of the FLANN library by Marius Muja and
  David G. Lowe, and born as a child project of MRPT. Following the original
  license terms, nanoflann is distributed under the BSD license.


  ## Use Cases


  - Robotics applications requiring spatial queries

  - Computer vision algorithms

  - Point cloud processing

  - ICP (Iterative Closest Point) algorithms

  - 2D/3D nearest neighbor search


  ## Availability


  Available on GitHub, Conan package manager, and Conda-forge.


  ## Pricing


  Free and open-source under BSD license.
