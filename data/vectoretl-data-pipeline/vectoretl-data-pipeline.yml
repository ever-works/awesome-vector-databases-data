name: VectorETL
description: An open-source ETL tool for building data pipelines for vector
  databases and AI applications. Simplifies ingestion, transformation, and
  loading of data into vector stores with support for multiple databases.
source_url: https://github.com/ContextData/VectorETL
category: Tools
tags:
