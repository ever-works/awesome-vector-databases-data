name: RankT5
description: Open-source reranking model that uses an encoder-decoder (T5)
  architecture, fine-tuned to generate classification tokens indicating whether
  query-document pairs are relevant or irrelevant. Formulates document ranking
  as a generation task.
source_url: https://github.com/castorini/RankT5
category: Vector Database Engines
tags:
  - open-source
