markdown: >-
  ## Overview


  FLANN (Fast Library for Approximate Nearest Neighbors) is a library for
  performing fast approximate nearest neighbor searches in high dimensional
  spaces. It contains a collection of algorithms found to work best for nearest
  neighbor search and a system for automatically choosing the best algorithm and
  optimum parameters depending on the dataset.


  ## Programming Language Support


  FLANN is written in C++ and contains bindings for:

  - C

  - MATLAB

  - Python

  - Ruby


  ## Key Features


  ### Automatic Algorithm Selection


  The library automatically chooses the best algorithm and optimum parameters
  depending on the dataset characteristics, making it easy to use for various
  applications.


  ### Multiple Algorithms


  Contains a collection of algorithms that have been found to work best for
  nearest neighbor search across different types of high-dimensional data.


  ## Use Cases


  - Computer vision applications

  - Machine learning workflows

  - High-dimensional data analysis

  - Image and pattern recognition


  ## Documentation


  Documentation on how to use the library can be found in the doc/manual.pdf
  file included in the release archives.


  ## Pricing


  Free and open-source under LGPL license.
