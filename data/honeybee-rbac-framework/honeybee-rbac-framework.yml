name: HONEYBEE RBAC Framework
description: Dynamic partitioning-based RBAC for vector databases with
  encryption support and compliance features, achieving 13.5X lower latency than
  row-level security. Suited for enterprise data privacy in multi-tenant RAG
  systems. Significantly reduces memory (90.4%) compared to open-source
  dedicated per-role indexes.
source_url: https://arxiv.org/abs/2505.01538
category: Security & Governance
tags:
