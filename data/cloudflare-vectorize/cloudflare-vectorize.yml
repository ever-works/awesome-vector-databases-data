  ## Overview

  Cloudflare Vectorize is a vector database running at the edge.

  ## Key Features

  - Edge-native for Workers apps
  - 50k namespaces, 5M vector cap per index
  - No hybrid search

  ## Pricing

  Usage-based, ~$47/mo.
