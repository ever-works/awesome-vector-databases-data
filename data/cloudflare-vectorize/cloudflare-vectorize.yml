name: Cloudflare Vectorize
description: Cloudflare Vectorize is a globally distributed, serverless vector
  database integrated with Workers AI for low-latency similarity search. Key
  features include automatic index optimization, support for cosine/euclidean
  metrics, and seamless scaling without infrastructure management. Ideal for RAG
  and real-time AI apps; offers edge performance advantages over centralized
  services like Pinecone.
