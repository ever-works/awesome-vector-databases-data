name: ruvector-core
description: Core Rust crate for the RuVector vector database engine featuring
  HNSW indexing, SIMD acceleration, and adaptive compression for
  high-performance similarity search. Supports multi-threaded queries achieving
  up to 3,597 QPS with 100% recall on 50K vectors. Ideal for AI applications
  requiring low-latency retrieval in RAG pipelines and agent memory systems.
