markdown: >-
  ## Overview


  Qdrant Hybrid Cloud is the industry's first managed vector database that can
  be deployed in any environment - cloud, on-premise, or edge. It integrates
  Kubernetes clusters from any setting into a unified, enterprise-grade managed
  service.


  ## Key Innovation


  Bring Your Own Cloud (BYOC) approach:

  - Deploy Qdrant as a managed service on your infrastructure

  - Maintain complete data sovereignty

  - Benefit from managed service convenience

  - No vendor lock-in for infrastructure


  ## Deployment Flexibility


  ### Supported Platforms


  **Cloud Providers**:

  - Amazon Web Services (AWS)

  - Google Cloud Platform (GCP)

  - Microsoft Azure

  - Oracle Cloud Infrastructure (OCI)

  - Vultr

  - DigitalOcean

  - Scaleway

  - STACKIT

  - Civo

  - OVHcloud


  **On-Premise & Edge**:

  - Red Hat OpenShift

  - VMware vSphere

  - Custom Kubernetes clusters

  - Edge environments


  **Architectures**:

  - x86_64 (Intel/AMD)

  - ARM64 (Apple Silicon, Graviton)


  ## Pricing


  Available as part of Qdrant Enterprise plan.
