name: frugal
description: frugal is an open-source, self-hosted platform for AI/ML operations
  with vector database support, focusing on cost optimization and transparency.
  Key features include model-agnostic tracking, alerting, caching, and free use.
  Useful for RAG prototypes monitoring costs, self-hosted alternative to managed
  services like Pinecone for reduced expenses.
