markdown: >-
  ## Overview


  frugal optimizes AI/ML ops with vector DB integration for cost and resource
  management.


  ## Features


  - Model-agnostic request logging

  - Cost/latency tracking

  - Alerting and notifications

  - Caching and rate limits


  ## Pricing


  Free open-source.
