markdown: >-
  ## Overview


  Hybrid search combines vector and keyword search for better accuracy than
  either alone.


  ## Fusion Methods


  - Reciprocal Rank Fusion (RRF)

  - Weighted combination

  - Reranking


  ## Best Practices


  - Start with RRF

  - 60-40 vector-keyword weight

  - Apply reranking


  ## Performance


  10-30% recall improvement
