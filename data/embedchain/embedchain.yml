markdown: >-
  ## Overview


  Embedchain is an Open Source RAG Framework that makes it easy to create and
  deploy AI apps, following the design principle of being "Conventional but
  Configurable" to serve both software engineers and machine learning engineers.


  ## Key Features


  Embedchain streamlines the creation of Retrieval-Augmented Generation (RAG)
  applications, offering a seamless process for managing various types of
  unstructured data. It efficiently:

  - Segments data into manageable chunks

  - Generates relevant embeddings

  - Stores them in a vector database for optimized retrieval


  ## APIs and Capabilities


  With a suite of diverse APIs, it enables users to:

  - Extract contextual information

  - Find precise answers

  - Engage in interactive chat conversations tailored to their own data


  ## Customization Options


  Users can tailor the system to meet specific needs, whether for simple
  projects or complex AI applications. The framework accepts a yaml_path
  parameter for configuration - if not provided, a default configuration is
  used. Browse the documentation to explore various customization options.


  ## Integrations


  - Can be used as a retriever integrated with LangChain

  - Supports integration with OpenAI API

  - Flask-based chatbot implementations


  ## Pricing


  Free and open-source.
