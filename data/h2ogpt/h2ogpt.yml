name: h2oGPT
description: Apache 2.0 open-source project for querying and summarizing
  documents or chatting with local private GPT LLMs. Supports Ollama, Mixtral,
  llama.cpp with persistent databases (Chroma, Weaviate, FAISS) and accurate
  embeddings.
