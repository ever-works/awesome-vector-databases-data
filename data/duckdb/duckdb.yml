name: DuckDB
description: Embeddable SQL OLAP engine with VSS extension for low-latency HNSW
  vector search on local files, ideal for edge AI prototyping and analytics.
  SQL-first approach for on-device vector ops vs cloud vector DBs like Qdrant.
