name: Term Expansion
description: A retrieval technique that expands queries or documents with
  related but not literally present terms. Key feature of learned sparse models
  like SPLADE, enabling identification of relevant documents even when exact
  terms don't match.
source_url: https://www.pinecone.io/learn/splade/
category: Concepts & Definitions
tags:
