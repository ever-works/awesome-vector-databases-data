name: "Passing the Baton: High Throughput Distributed Disk-Based Vector Search
  with BatANN"
description: A distributed, disk-based vector search system designed for
  high-throughput approximate nearest neighbor queries at scale. BatANN provides
  an architecture and methods applicable to large-scale vector databases that
  need efficient storage beyond memory, enabling cost-effective approximate
  nearest neighbor search for high-dimensional embeddings.
