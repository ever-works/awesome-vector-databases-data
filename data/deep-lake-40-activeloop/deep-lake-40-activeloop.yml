markdown: >-
  ## Overview


  Deep Lake 4.0 by Activeloop is an open-source database designed for complex,
  unstructured multimodal data with index-on-the-lake technology.


  ## Key Innovation


  Index-on-the-lake enables sub-second queries from object storage with 10x cost
  efficiency vs in-memory databases and 2x faster performance than alternatives.


  ## Multimodal Support


  Handles vectors, text, JSON, images, audio, video, PDFs, DICOM, and
  annotations in one platform.


  ## Pricing


  Open source and Activeloop Cloud managed options available.
