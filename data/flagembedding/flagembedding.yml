name: FlagEmbedding
description: Open-source retrieval and RAG framework from BAAI featuring the BGE
  embedding model series. BGE-M3 supports multi-functionality (dense, sparse,
  multi-vector), multi-linguality (100+ languages), and multi-granularity (up to
  8192 tokens).
