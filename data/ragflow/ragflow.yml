markdown: >-
  ## Overview


  RAGFlow is an open-source Retrieval-Augmented Generation (RAG) engine that
  fuses cutting-edge RAG capabilities with Agent functionality. It offers a
  streamlined RAG workflow for deep document understanding and citation-backed
  responses.


  ## Key Features


  - **Deep Document Understanding**: Advanced parsing of complex document
  formats

  - **Multi-Format Support**: Processes PDFs, Word docs, CSVs, Excel,
  PowerPoint, and more

  - **Table & Image Extraction**: Intelligently extracts structured data and
  visual elements

  - **Citation-Backed Responses**: Every answer includes references to source
  documents

  - **Advanced Chunking**: Employs sophisticated chunking strategies for optimal
  retrieval

  - **Knowledge Base Management**: Organizes parsed data for efficient search
  and retrieval

  - **Fused Re-ranking**: Combines multiple recall strategies with re-ranking
  for accuracy

  - **Agent Capabilities**: Integrates agentic workflows with RAG pipelines


  ## How It Works


  ### 1. Document Processing


  - Parse uploaded files using structure recognition models

  - Extract tables, images, and metadata

  - Break documents into optimally-sized chunks


  ### 2. Knowledge Base Creation


  - Convert chunks into vector embeddings

  - Store in knowledge base with advanced indexing

  - Maintain document structure and citations


  ### 3. Query Processing


  - Receive user query and convert to embeddings

  - Search knowledge base using hybrid retrieval

  - Apply fused re-ranking to prioritize results

  - Generate response with LLM and citations


  ## Applications


  - **Customer Support**: Citation-backed chatbots with accurate responses

  - **Research & Education**: Academic research assistants with source
  attribution

  - **Financial Analysis**: Document-grounded financial insights

  - **Healthcare**: Medical decision support with evidence-based answers

  - **Legal Tech**: Contract analysis with precise citations

  - **Enterprise Search**: Internal knowledge bases with traceable answers


  ## Integration


  RAGFlow integrates with:

  - Major LLM providers (OpenAI, Anthropic, etc.)

  - Popular vector databases

  - Document management systems

  - Custom embedding models


  ## Pricing


  Free and open-source with self-hosting options.
