markdown: >-
  ## Overview


  Cloudflare Vectorize provides globally-distributed vector search on
  Cloudflare's edge network with serverless pricing and automatic worldwide
  replication.


  ## Features


  - 300+ city global distribution

  - Edge computing integration

  - Cloudflare Workers compatible

  - Automatic scaling


  ## Pricing


  $0.31/month for 10K vectors + 30K queries


  ## Availability


  Cloudflare dashboard
