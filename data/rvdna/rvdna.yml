name: rvDNA
description: AI-native genomic diagnostics library enabling instant genomic
  analysis on any device, including phones and browsers, in milliseconds without
  cloud, GPU, or subscription. Supports mutation detection with Bayesian
  calling, DNA-to-protein translation using GNNs, biological age prediction,
  drug dosing, health risk scoring, biomarker streaming with anomaly detection,
  genome similarity search via HNSW k-mer vectors, and .rvdna feature storage.
