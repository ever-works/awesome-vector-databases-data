markdown: >-
  ## Overview


  LlamaHub is an open-source repository containing data loaders that can easily
  plug and play into any LlamaIndex application, with over 160 data connectors
  created by the community.


  ## Features


  - 160+ data connectors

  - Community-driven contributions

  - Easy plug-and-play integration

  - Wide format support (PDFs, databases, APIs)

  - Comprehensive documentation

  - Active development


  ## Connector Types


  ### Document Formats

  - PDF documents

  - Word documents

  - Markdown files

  - HTML pages

  - Text files


  ### Data Sources

  - Notion databases

  - Google Drive

  - Confluence

  - Slack

  - GitHub repositories

  - SQL databases

  - APIs and webhooks


  ## Integration


  - Native LlamaIndex support

  - Compatible with LangChain

  - Simple pip install

  - Minimal configuration required

  - Standardized interfaces


  ## Use Cases


  - RAG pipeline data ingestion

  - Multi-source data integration

  - Document processing workflows

  - Knowledge base construction

  - Data migration


  ## Community


  - Open-source contributions

  - Active GitHub repository

  - Community-maintained loaders

  - Regular updates and improvements

  - Growing connector library


  ## Technical Details


  - Python-based loaders

  - Asynchronous support

  - Batch processing capabilities

  - Error handling and retry logic

  - Metadata extraction


  ## Pricing


  Free and open-source
