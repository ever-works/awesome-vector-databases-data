name: DB-LSH — Locality-Sensitive Hashing with Query-based Dynamic Bucketing
description: ICDE 2023 and TKDE 2023 papers introducing DB-LSH, a
  locality-sensitive hashing approach with query-based dynamic bucketing for
  efficient approximate nearest neighbor search.
source_url: https://ieeexplore.ieee.org/document/10165997
category: Research Papers & Surveys
tags:
  - hash-based
  - locality-sensitive
  - dynamic-bucketing
markdown: >-
  ## Overview


  DB-LSH introduces dynamic bucketing in LSH based on query characteristics for
  improved retrieval accuracy.


  ## Key Contributions


  - Query-aware dynamic bucketing strategy

  - Improved accuracy over static LSH

  - Extended to DB-LSH 2.0 with optimizations

  - Published in ICDE 2023 and TKDE 2023


  ## Publication


  - **Venue**: ICDE 2023, TKDE 2023

  - **Authors**: Tian et al.

  - **Abbreviation**: DB-LSH
