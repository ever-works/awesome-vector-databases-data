name: Qdrant
description: Qdrant is a high-performance vector search engine with Rust-based
  core for speed and safety. Supports filtered ANN search, payloads, and on-disk
  storage with HNSW indexing. Great for edge deployments and real-time apps;
  faster than Faiss in filtered queries and offers cloud managed service.
