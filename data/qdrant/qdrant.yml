name: Qdrant
description: Qdrant is a vector similarity search engine with Rust-based core
  for high performance, supporting filtered search, payloads, and binary
  quantization. It features NGT/HNSW indexing and multi-modal support. Suited
  for real-time AI apps and edge; compares to Milvus by being lighter/more
  embeddable.
source_url: https://qdrant.tech/
category: Core Vector Databases
tags:
