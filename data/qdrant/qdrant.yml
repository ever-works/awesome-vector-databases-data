name: Qdrant
description: "Qdrant is a high-performance vector database and search engine
  with Rust core for massive-scale AI apps, supporting filtered ANN, payload
  storage, and multi-modal search. Features: HNSW/DiskANN indexes, quantization,
  cloud/edge/self-hosted, gRPC/REST APIs. Use cases: recommendation, neural
  search, RAG. Vs Milvus: Rust safety/perf; vs Weaviate: stronger filtering
  speed."
