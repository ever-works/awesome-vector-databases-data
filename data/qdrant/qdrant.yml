  - quantization
featured: false
markdown: |-
  ## Features

  - Filtered ANN (HNSW)
  - Payload filtering
  - Multi-modal support
  - Disk-persistent storage
  - Cloud/edge/self-hosted
  - High QPS

  ## Use Cases

  - Real-time recommendations
  - Semantic search

  ## Comparisons

  - Lighter, Rust perf vs Weaviate
  - Open-source alt vs Pinecone

  ## Pricing

  Free open-source (Apache 2.0).
