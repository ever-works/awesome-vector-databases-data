name: Qdrant
description: "Qdrant is a vector similarity search engine and vector database
  written in Rust, optimized for production-scale deployments with filtered
  search and payload storage. Key features: HNSW indexing, on-disk storage,
  multi-vector support, and easy Docker deployment. Excels in real-time AI apps
  like semantic search and RAG; more memory-efficient than Milvus for edge use
  cases and offers superior filtering vs. basic Faiss."
source_url: https://qdrant.tech/
