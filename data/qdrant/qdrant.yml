name: Qdrant
description: Qdrant is a high-performance vector search engine and database
  written in Rust, supporting filtered ANN search with HNSW and custom payloads.
  It excels in real-time updates, multi-tenancy, and quantization for memory
  efficiency. Ideal for recommendation systems and RAG; outperforms Faiss in
  filtering speed while being production-ready unlike pure libraries.
source_url: https://qdrant.tech/
category: Core Vector Databases
tags:
