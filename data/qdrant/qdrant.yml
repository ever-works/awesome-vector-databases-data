name: Qdrant
description: Qdrant is a high-performance open-source vector database optimized
  for production-scale similarity search with advanced filtering on payloads. It
  supports HNSW indexing, on-disk storage, multi-vector search, and quantization
  for efficiency, making it suitable for recommendation systems, fraud
  detection, and RAG workflows. Compared to Milvus, Qdrant excels in filtered
  ANN queries and Rust-based reliability; vs. Pinecone, it offers self-hosting
  with Kubernetes support.
