name: Qdrant
description: "Qdrant is a high-performance vector database with Rust core for
  speed, supporting filtered ANN search, payloads, and multi-modal data.
  Features: HNSW/DISKANN, quantization, cloud/edge/self-hosted options, binary
  quantization. Great for real-time apps, recommendations; compares to Weaviate
  by being faster/lighter, to Milvus by easier filtering."
