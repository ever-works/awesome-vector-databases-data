name: Qdrant
description: Qdrant is a Rust-native, open-source vector database with on-disk
  storage, HNSW indexing, and advanced filtering for production workloads.
  Supports payloads, quantization, and binary quantization for efficiency, with
  cloud and edge deployments. Suited for recommendation systems and neural
  search; more disk-efficient than in-memory Faiss, with strong Rust performance
  over Python alternatives like Chroma.
