name: Qdrant
description: Qdrant is a high-performance vector search engine and database with
  Rust-based core for speed and safety, supporting filtered searches, payload
  storage, and custom HNSW configurations. Offers on-prem, cloud, and edge
  deployments with binary quantization for efficiency. Great for real-time
  recommendation, anomaly detection, and neural search; more lightweight than
  Milvus for edge computing.
