name: Qdrant
description: "Qdrant is a high-performance vector similarity search engine with
  Rust-based core for production workloads, supporting filtered ANN search via
  HNSW/NGT-PANNS, payload filtering, and multi-vector collections. Offers
  on-prem, cloud, and edge deployments with quantization for memory efficiency
  and real-time recommendations. Use cases: semantic search, fraud detection;
  outperforms Faiss in filtering speed and scales better than Chroma for large
  datasets while remaining open-source and lightweight compared to managed
  services like Pinecone."
