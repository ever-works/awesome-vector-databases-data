markdown: >-
  ## Overview


  Qdrant is an open-source vector database and similarity search engine,
  purpose-built for handling high-dimensional vectors and powering large-scale
  AI applications.


  ## Features


  - High-Performance Vector Search: Optimized for fast and scalable similarity
  searches on billions of vectors.

  - Open Source: Freely available and supported by a growing community.

  - Cloud-Native Scalability: Managed cloud offering with vertical and
  horizontal scaling.

  - Self-Hosted & Easy Deployment: Deploy locally with Docker.

  - Rust-Powered: Built in Rust for reliability and high-speed performance.

  - Efficient Storage: Built-in compression and disk offload.

  - Advanced Search: Semantic understanding, multimodal data.

  - Integrations: Compatible with leading embedding models.


  ## Pricing


  Free and open-source.
