name: Qdrant
description: Qdrant is a vector search engine and database optimized for
  production workloads, with Rust-based core for speed, payload filtering, and
  advanced quantization. Supports cloud, on-prem, and edge deployments with HNSW
  indexing and binary quantization. Great for recommendation engines, fraud
  detection, and neural search; faster than Weaviate in filtered queries and
  more lightweight than Milvus.
