name: Qdrant
description: Qdrant is an open-source vector storage and search engine
  implemented in Rust, supporting HNSW and DiskANN indexes for efficient
  approximate nearest neighbor search on high-dimensional embeddings. It offers
  payload storage, filtering, quantization, and real-time updates, ideal for
  local RAG prototyping, self-hosted AI applications, and edge deployments.
  Compared to Milvus (Go/C++), Qdrant provides superior memory safety and
  single-node performance, while Milvus scales better for distributed
  billion-vector workloads.
