name: Qdrant
description: "Rust-based vector search engine with filtered ANN (HNSW), payload
  filtering, multi-modal support. Disk-persistent, supports
  cloud/edge/self-hosted deployments, high QPS. Use cases: real-time
  recommendations, semantic search. Lighter than Weaviate with Rust performance;
  open-source alternative to Pinecone."
