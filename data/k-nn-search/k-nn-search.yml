name: k-NN Search
description: k-Nearest Neighbors search finds the k closest vectors to a query
  vector in high-dimensional space. A fundamental operation in vector databases
  and machine learning, k-NN can be exact (brute force) or approximate (ANN)
  depending on performance requirements and dataset size.
source_url: https://en.wikipedia.org/wiki/K-nearest_neighbors_algorithm
category: Concepts & Definitions
