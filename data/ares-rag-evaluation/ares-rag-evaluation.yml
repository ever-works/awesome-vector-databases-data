markdown: >-
  ## Overview


  ARES (Automatic RAG Evaluation System) provides automated evaluation of RAG
  pipelines without requiring human-labeled test data.


  ## Features


  **Automated Evaluation**:

  - Context relevance scoring

  - Answer faithfulness detection

  - Generation quality assessment

  - No manual labels needed


  **Components**:

  - Synthetic data generation

  - Automated judging

  - Confidence scoring

  - Comparative analysis


  ## Metrics


  - Context Relevance

  - Answer Relevance

  - Faithfulness

  - Overall RAG Quality


  ## Use Cases


  - Continuous RAG monitoring

  - System comparison

  - Configuration optimization

  - Quality regression testing


  ## Integration


  Works with popular RAG frameworks


  ## Availability


  Open-source: Stanford FutureData Lab
