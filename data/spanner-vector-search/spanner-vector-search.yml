name: Spanner Vector Search
description: Google Cloud Spanner provides transactional cloud-hosted vector
  search with auto-scaling nodes, GPU integration via Vertex AI, and
  multi-region global distribution compatible with AWS/Azure hybrid setups.
  Excels in enterprise RAG requiring ACID guarantees and global low-latency
  search. Combines transactions better than Pinecone; more scalable globally
  than Zilliz Cloud.
