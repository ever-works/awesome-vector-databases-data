name: Long-Context LLMs Meet RAG
description: A research paper examining the intersection of long-context LLMs
  and Retrieval-Augmented Generation, focusing on the challenges of combining
  long-context windows with RAG pipelines, including the 'hard negatives'
  problem where irrelevant retrieved documents can degrade LLM output quality.
