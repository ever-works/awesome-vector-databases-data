name: Learning Balanced Tree Indexes for Large-Scale Vector Retrieval
description: SIGKDD 2023 paper proposing learned balanced tree indexing for
  large-scale vector retrieval, using machine learning to construct balanced
  tree structures optimized for vector similarity search at scale.
source_url: https://dl.acm.org/doi/10.1145/3580305.3599436
category: Research Papers & Surveys
tags:
  - tree-index
  - learning-based
  - large-scale
markdown: >-
  ## Overview


  Introduces learned balanced tree indexes for large-scale vector retrieval,
  combining machine learning with traditional tree structures.


  ## Key Contributions


  - Machine learning-guided balanced tree construction

  - Optimized tree structure for vector similarity search

  - Scales to large vector datasets

  - Published in SIGKDD 2023


  ## Publication


  - **Venue**: SIGKDD 2023

  - **Authors**: Li et al.
