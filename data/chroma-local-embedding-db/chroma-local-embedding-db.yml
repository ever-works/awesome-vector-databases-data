name: Chroma Local Embedding Database
description: Lightweight embedded vector store for low-latency on-device vector
  operations in prototyping AI apps, using HNSW for fast ANN search with
  built-in embeddings and metadata filtering. Enables quick local RAG on edge
  devices; simpler and lower-latency than cloud Qdrant for developer workflows.
source_url: https://www.trychroma.com/
category: Embedded & Edge Vector Databases
