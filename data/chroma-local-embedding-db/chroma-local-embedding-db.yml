name: Chroma Local Embedding Database
description: Lightweight in-process vector store for prototyping AI apps,
  featuring HNSW indexing, built-in embeddings, and metadata filtering for quick
  local RAG setups. Offers persistence and simple APIs in Python/JS, handling up
  to 1M vectors efficiently on single nodes. Best for developer workflows and
  notebooks; simpler setup than Milvus, less distributed than Qdrant clusters.
