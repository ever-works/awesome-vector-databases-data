markdown: >-
  ## Overview


  Chroma is an AI-native open-source embedding database designed for simplicity
  and developer experience, particularly popular for local development and
  prototyping.


  ## Key Features


  **Developer-Friendly**:

  - Runs in-process or as a server

  - Simple Python/JavaScript API

  - No complex configuration

  - Quick setup


  **Batteries Included**:

  - Built-in embedding functions

  - Multiple distance metrics

  - Filtering and metadata

  - Persistence options


  **Deployment Options**:

  - In-memory (notebooks)

  - Persistent local storage

  - Client-server mode

  - Cloud hosted


  ## Use Cases


  - Rapid prototyping

  - Local RAG development

  - Jupyter notebooks

  - Small to medium datasets

  - Education and learning


  ## Integration


  - LangChain (first-class support)

  - LlamaIndex

  - OpenAI

  - HuggingFace


  ## Limitations


  - Best for < 1M vectors

  - Single-node only (local)

  - Not for production scale


  ## Availability


  Open-source with managed cloud option
