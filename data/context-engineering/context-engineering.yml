name: Context Engineering
description: Context Engineering is an emerging discipline encompassing the
  systematic design, construction, and management of the entire information
  payload provided to an LLM at inference time. It moves beyond crafting single
  prompts to architecting the complete environment a model uses to reason and
  respond, including instructions, retrieved knowledge, tools, memory, state,
  and the user query as structured components.
