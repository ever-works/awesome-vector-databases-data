markdown: >-
  ## Overview


  Wren AI is a GenBI (Generative BI) platform that queries any database in
  natural language, generates accurate SQL (Text-to-SQL), charts
  (Text-to-Chart), and AI-powered business intelligence in seconds.


  ## Key Features


  Wren AI is an AI pipeline application that translates natural language user
  queries to SQL also known as Text-to-SQL, allowing users to chat with their
  databases. It features both a UI and an API, allowing you to generate SQL
  queries based on user prompts and retrieve data using those queries.


  ## Recent Updates (2026)


  The platform continues to be actively developed. Wren AI's last publication
  was January 6, 2026, and it receives weekly updates with over 1,500 active
  community members worldwide.


  ## Technical Capabilities


  - Text-to-SQL is a breakthrough powered by LLMs that allows anyone to query
  databases using everyday language by translating plain English questions into
  SQL queries.

  - Wren AI uses RAG architecture to leverage your schema and context,
  generating SQL queries without requiring you to expose or upload your data to
  LLM models.

  - It works with OpenAI, Anthropic, Google Gemini, and private enterprise LLMs.


  ## Data Sources


  Wren AI supports a wide range of data sources such as BigQuery, PostgreSQL,
  MySQL, Snowflake, and more.


  ## Pricing


  Open-source with commercial versions available.
