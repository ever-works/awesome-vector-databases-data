name: IVF-SQ8 Index
description: A quantization-based vector indexing algorithm that combines
  Inverted File Index (IVF) with 8-bit scalar quantization (SQ8). Designed to
  tackle large-scale similarity search challenges, achieving faster searches
  with a much smaller memory footprint compared to exhaustive search methods by
  using 8-bit integers instead of 32-bit floats.
