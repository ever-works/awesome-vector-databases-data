name: ruvector-scipix
description: Rust OCR engine for scientific documents, extracting text and
  mathematical equations to LaTeX, MathML, or plain text. Supports batch
  processing, content detection for equations/tables/diagrams, confidence
  scoring, and PDF support. Includes TypeScript client (@ruvector/scipix) and
  CLI (scipix-cli).
source_url: https://crates.io/crates/ruvector-scipix
category: Data Processing
tags:
