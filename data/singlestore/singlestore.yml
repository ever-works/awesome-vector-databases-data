markdown: >-
  ## Overview


  SingleStore (formerly MemSQL) is a distributed SQL database with built-in
  vector database capabilities via SingleStore-V integrated system.


  ## Pricing


  - **Compute**: $3.96 per credit (on-demand)

  - **Storage**: Monthly, usage-based

  - **Data Egress**: Varies by region


  ## Features


  - SQL + vector queries

  - Distributed architecture

  - Real-time analytics

  - ACID transactions


  ## Pricing


  Commercial with credit-based model. Start on-demand, move to commitment
  pricing for production with volume discounts.
