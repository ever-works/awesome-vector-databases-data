name: Bleve
description: Bleve is an open-source, self-hosted full-text search and indexing
  library in Go with experimental vector search support for hybrid retrieval.
  Key features include full-text, numeric, geo-spatial indexing, flexible
  mappings, and free Apache 2.0 license. Suitable for RAG prototypes needing
  hybrid search, offering self-hosted cost savings vs managed services like
  Pinecone.
source_url: https://github.com/blevesearch/bleve
category: Open Source Vector Databases
tags:
  - open-source
  - self-hosted
  - hybrid-search
  - search-library
markdown: >-
  ## Overview


  Bleve is a Go search library with modern indexing for text, numeric, geo, and
  experimental vector data.


  ## Features


  - Full-text search

  - Numeric and geo-spatial indexing

  - Experimental vector search

  - Hybrid search capabilities

  - Custom indexing configurations


  ## Pricing


  Free and open-source (Apache 2.0).
