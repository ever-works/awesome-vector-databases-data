markdown: >-
  ## Overview


  PISA is a research-oriented inverted index library designed for efficient
  semantic search using sparse and dense vectors.


  ## Features


  - Support for sparse/dense vectors

  - Advanced compression techniques

  - Multi-threaded query processing

  - Learned indexes


  ## Pricing


  Open-source under Apache 2.0 license.
