name: ClickHouse Vector Search
description: ClickHouse extension for vector similarity search using HNSW
  indexes, combining analytical SQL queries with ANN in a columnar relational
  database. Features ACID-like consistency for hybrid workloads on existing
  ClickHouse infrastructure. More efficient than dedicated VDBs for
  analytics+vector use cases.
