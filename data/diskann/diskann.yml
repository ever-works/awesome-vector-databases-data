name: DiskANN
description: DiskANN is a pure ANN index library implementing Vamana graphs for
  disk-based billion-scale approximate nearest neighbor search with low memory
  footprint. Features GPU acceleration, dynamic updates, cached SSD search,
  C++/Python bindings. Suited for custom vector engines handling large cold
  datasets in search/recommendations, benchmarks; more disk-efficient than
  HNSWLib vs full DBs like Qdrant.
source_url: https://github.com/microsoft/DiskANN
category: ANN Indexing Libraries
tags:
