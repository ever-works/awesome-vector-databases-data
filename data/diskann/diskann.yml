name: DiskANN
description: "DiskANN is a disk-based approximate nearest neighbor index from
  Microsoft Research, optimized for billion-scale vector search with low memory
  footprint via Vamana graphs and cached search. Supports GPU acceleration,
  dynamic updates, and high-recall QPS on SSDs without full RAM loading. Key
  features: offline graph construction, online queries with caching; ideal for
  cold-start large datasets in search/recommendations. Compares to HNSWLib with
  better disk efficiency for >1B vectors, basis for LibDiskANN but more
  research-oriented than production Faiss."
source_url: https://arxiv.org/abs/2105.09613
category: ANN Indexing Libraries
