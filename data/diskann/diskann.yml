name: DiskANN
description: DiskANN is a Microsoft Research disk-based ANN index for
  billion-scale recall@10 with Vamana graphs and pruning, supporting dynamic
  updates. Excels in out-of-core scenarios without GPU. Better recall than HNSW
  on large disks vs in-memory like Qdrant; basis for some production systems.
source_url: https://arxiv.org/abs/2105.09613
