markdown: >
  # DiskANN


  - **Description:** DiskANN is a graph-based approximate nearest neighbor
  search (ANNS) system designed for fast and accurate billion-point nearest
  neighbor search on a single node, utilizing SSD storage. It is suitable for
  large-scale vector database applications that require efficient and scalable
  vector search.

  - **Source:** [arXiv:2105.09613](https://arxiv.org/abs/2105.09613)


  ## Features

  - Graph-based ANNS algorithm

  - Optimized for billion-point nearest neighbor search

  - Efficient operation on a single node

  - Leverages SSD storage for scalability and performance

  - Suitable for large-scale vector database and similarity search applications


  ## Pricing

  - No pricing information provided.
