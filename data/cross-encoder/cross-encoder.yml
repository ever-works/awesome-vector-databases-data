name: Cross-Encoder
description: Neural reranking architecture that examines full query-document
  pairs simultaneously for deeper semantic understanding, achieving higher
  accuracy than bi-encoders at the cost of computational efficiency.
source_url: https://www.sbert.net/examples/applications/cross-encoder/README.html
