name: BigVectorBench
description: Tests vector DBs on multimodal QPS/latency for heterogeneous
  embeddings and compound queries including GPU setups. Features Docker-based
  eval for Milvus etc. on cross-modal retrieval. For selecting multimodal vector
  DBs; differs from ANN-Benchmarks text-only by adding hybrid workloads vs
  custom single-DB tests.
