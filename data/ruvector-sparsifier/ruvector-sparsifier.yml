name: ruvector-sparsifier
description: Incremental graph sparsifier that compresses large graphs into a
  'shadow graph' preserving key properties like connectivity, cuts, and flow.
  Uses random walks for importance scoring, spectral sampling, union-find
  backbone, and periodic auditing to maintain accuracy without full rebuilds.
source_url: https://crates.io/crates/ruvector-sparsifier
category: Sdks Libraries
