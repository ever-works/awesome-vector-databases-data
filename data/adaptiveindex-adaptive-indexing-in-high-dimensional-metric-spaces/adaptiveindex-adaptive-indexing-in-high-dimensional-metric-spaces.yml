name: AdaptiveIndex — Adaptive Indexing in High-Dimensional Metric Spaces
description: VLDB 2023 paper introducing an adaptive indexing approach for
  high-dimensional metric spaces that dynamically adjusts its structure based on
  query workloads to improve search performance over time.
source_url: https://www.vldb.org/pvldb/vol16/p1368-lampropoulos.pdf
category: Research Papers & Surveys
tags:
  - adaptive-index
  - metric-spaces
  - dynamic
markdown: >-
  ## Overview


  AdaptiveIndex proposes a self-adjusting index for high-dimensional metric
  spaces that evolves based on query workload patterns.


  ## Key Contributions


  - Adaptive index structure that learns from queries

  - Dynamic restructuring for workload optimization

  - Improved performance over static indexes

  - Published in VLDB 2023


  ## Publication


  - **Venue**: VLDB 2023

  - **Authors**: Lampropoulos et al.
