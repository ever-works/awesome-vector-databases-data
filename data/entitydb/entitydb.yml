name: EntityDB
description: JavaScript SDK for browser-based vector DB using IndexedDB and
  Transformers.js (WASM), with batch insert/query via async promises, cosine
  similarity. For JS app integration, LangChain browser agents; fully
  client-side vs server APIs.
