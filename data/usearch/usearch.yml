name: USearch
description: USearch is a fast, lightweight C++ library for ANN search with
  product quantization and scalar quantization support, optimized for low RAM
  and high speed. Single-file embeddable, bindings for 10+ languages. Perfect
  for edge devices and browser; outperforms Faiss on low-resource setups with
  simpler API.
