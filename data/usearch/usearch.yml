name: USearch
description: USearch is a lightweight, header-only C++ library for ANN search
  with HNSW and scalar quantization, optimized for low RAM and high-speed on
  CPU. It supports binary and custom metrics for edge devices. Compared to
  Faiss, USearch is simpler, faster on small datasets, and embeddable without
  deps.
source_url: https://github.com/unum-cloud/usearch
