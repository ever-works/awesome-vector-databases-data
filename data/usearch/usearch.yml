name: USearch
description: USearch is a pure ANN index library implementing HNSW with product
  and scalar quantization for fast, low-RAM approximate nearest neighbor search.
  Features single-header C++, bindings for 10+ languages, edge-device
  optimization, no GPU needed. Perfect for custom vector engines on
  resource-constrained setups, benchmarks; outperforms Faiss on low resources vs
  full Qdrant.
source_url: https://github.com/unum-cloud/usearch
