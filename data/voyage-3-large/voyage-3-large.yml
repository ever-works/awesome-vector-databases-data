markdown: >-
  ## Overview


  voyage-3-large is a state-of-the-art general-purpose and multilingual
  embedding model released in January 2025 that ranks first across eight
  evaluated domains spanning 100 datasets, including law, finance, and code.


  ## Features


  - Outperforms OpenAI-v3-large by an average of 9.74%

  - Outperforms Cohere-v3-English by an average of 20.71%

  - Domain-specific excellence across law, finance, code, and more

  - Multilingual support for global applications

  - Long text support for processing extensive documents

  - Flexible output sizes (2048, 1024, 512, 256 dimensions)


  ## Performance


  - Top ranking across 100 datasets in 8 domains

  - Partnership with Anthropic as their preferred embedding provider

  - Advanced technology reduces storage costs by up to 200 times


  ## Pricing


  Competitive pricing with generous free tiers available
