markdown: >-
  ## Overview


  ARKGraph constructs a versatile graph structure for all-range approximate
  k-nearest neighbor search, supporting flexible recall-accuracy trade-offs.


  ## Key Contributions


  - Graph construction supporting multiple search ranges

  - Flexible recall control through parameterization

  - Single graph adapts to different query requirements

  - Published in VLDB 2023


  ## Publication


  - **Venue**: VLDB 2023

  - **Authors**: Zuo et al.

  - **Abbreviation**: ARKGraph
