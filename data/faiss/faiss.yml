name: Faiss
description: "Faiss (Facebook AI Similarity Search) is a library for efficient
  similarity search and clustering of dense vectors, supporting GPU
  acceleration, multiple indexes like IVF, HNSW, PQ. Ideal for large-scale ANN
  in research/prototyping; compares to Milvus by being a lightweight library vs
  full DB, faster for static indexes but lacks persistence. Use cases:
  recommendation systems, image retrieval."
source_url: https://faiss.ai/
