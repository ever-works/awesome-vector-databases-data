name: Faiss
description: "Faiss (Facebook AI Similarity Search) is a library for efficient
  similarity search and clustering of dense vectors, supporting GPU/CPU indexes
  like IVF, PQ, HNSW. Used standalone or integrated into DBs; excels at
  billion-scale ANN. Features: quantization, exact search fallback, GPU
  acceleration via CUDA. Use cases: recommendation, dedup, image retrieval. Vs
  full DBs like Milvus: lightweight lib for custom builds; vs NMSLIB: superior
  GPU perf."
source_url: https://faiss.ai/
