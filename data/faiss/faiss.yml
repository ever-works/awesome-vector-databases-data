name: FAISS
description: FAISS (Facebook AI Similarity Search) is an open-source library for
  efficient similarity search and clustering of dense vectors, developed by Meta
  AI. It supports multiple index types like IVF, HNSW, and PQ with GPU
  acceleration for billion-scale datasets. Primarily a library for advanced
  users building custom systems; integrates with Milvus/Qdrant but lacks full DB
  features like persistence or distributed querying.
