name: FAISS
description: FAISS is an open-source C++ library from Meta for efficient dense
  vector similarity search and clustering, supporting FAISS indexes (IVF, PQ,
  HNSW), GPU acceleration for billion-scale ANN. Integrates with
  PyTorch/HuggingFace for prototyping/research. Not a full DB like Qdrant (adds
  persistence), but faster raw indexing than pure Rust/Go impls; core for many
  OSS vector stores.
source_url: https://faiss.ai/
