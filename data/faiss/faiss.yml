name: Faiss
description: Faiss (Facebook AI Similarity Search) is a library for efficient
  similarity search and clustering of dense vectors, supporting GPU
  acceleration, IVF, PQ, HNSW indexes for billion-scale datasets. Primarily a
  library not full DB, excels in speed/accuracy tradeoffs for ML pipelines vs.
  full DBs like Milvus.
source_url: https://faiss.ai/
category: Vector Search Libraries
tags:
