markdown: >-
  ## Overview


  FAISS (Facebook AI Similarity Search) is an open-source library for efficient
  similarity search and clustering of dense vectors at billion-scale.


  ## Features


  - Multiple index types: Flat, IVF, PQ, HNSW, and more

  - GPU/CPU support with CUDA acceleration

  - Quantization (PQ, SQ) for memory efficiency

  - C++ core with Python bindings

  - Built-in clustering (k-means, etc.)


  ## Use Cases


  - Embedding search prototypes

  - Recommendation systems

  - Large-scale image/video retrieval


  ## Comparisons


  Lower-level than complete vector DBs like Qdrant or Milvus; powers indexing in
  many production vector stores.


  ## Pricing


  Free, open-source (MIT license).
