name: FAISS
description: FAISS (Facebook AI Similarity Search) is a library for efficient
  similarity search and clustering of dense vectors, with CPU/GPU support for
  IVF, PQ, HNSW. Not a full DB but foundational for indexing billions of
  vectors. Basis for many DBs; raw speed outperforms full DBs like Milvus for
  offline indexing but requires custom persistence.
