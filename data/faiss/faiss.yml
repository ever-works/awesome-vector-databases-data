name: Faiss
description: "Faiss (Facebook AI Similarity Search) is a library for efficient
  similarity search and clustering of dense vectors, supporting GPU/CPU indexes
  like IVF, HNSW, PQ for billion-scale datasets with quantization. Integrates
  with PyTorch/HuggingFace for embedding search; no built-in
  persistence/filtering but excels in raw ANN speed. Use cases: duplicate
  detection, recommendation candidates; faster than Annoy on GPU but
  library-only (needs wrapping for DB features) vs. full DBs like Milvus."
source_url: https://faiss.ai/
