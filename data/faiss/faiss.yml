name: Faiss
description: Faiss is a library developed by Facebook AI Research that provides
  efficient similarity search and clustering of dense vectors. It is designed
  for use with large-scale, high-dimensional data and supports several index
  types and algorithms for various use cases.
source_url: https://faiss.ai/
category: Vector Databases
tags:
  - open-source
  - similarity-search
  - GPU
featured: false
markdown: >-
  ## Features


  - GPU and CPU support

  - Indexing methods: LSH, PQ, HNSW, and more

  - Clustering algorithms: k-means, PCA

  - Python and C++ interfaces


  ## Installation and Usage


  Faiss can be installed using pip or conda, and its API is well-documented with
  examples available in the official repository.
