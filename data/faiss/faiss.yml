name: FAISS
description: FAISS (Facebook/Meta AI Similarity Search) is an open-source
  library for efficient similarity search and clustering of dense vectors,
  serving as a foundational component for many vector database engines and
  search systems. It provides extensive GPU acceleration support and a wide
  range of index types including IVF, PQ, and HNSW, enabling flexible trade-offs
  between search accuracy, speed, and memory usage. Primary use cases include
  powering large-scale recommendation systems, image and audio retrieval,
  embedding-based search pipelines, and serving as the similarity search
  backbone for custom AI infrastructure.
