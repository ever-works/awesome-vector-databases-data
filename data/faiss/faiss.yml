name: Faiss
description: Faiss (Facebook AI Similarity Search) is a library for efficient
  similarity search and clustering of dense vectors, supporting GPU acceleration
  and indexes like IVF, HNSW, and PQ quantization. It powers large-scale ANN at
  Meta and is ideal for offline indexing in ML pipelines. Unlike full DBs like
  Milvus, Faiss is header-only C++ lib without persistence or filtering, best
  paired with a storage layer for production.
