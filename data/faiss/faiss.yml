name: Faiss
description: FAISS is Meta's library for efficient similarity search and
  clustering of dense vectors, supporting GPU/CPU indexes (IVF, HNSW, PQ). It
  features billion-scale approximate nearest neighbor (ANN) search and
  quantization for memory efficiency. Ideal for embedding search prototypes and
  recommendation systems. Lower-level than full vector DBs like Qdrant; basis
  for many vector DB indexes.
