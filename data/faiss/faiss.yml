name: Faiss
description: Faiss (Facebook AI Similarity Search) is a C++ library for
  efficient similarity search and clustering of dense vectors, supporting GPU
  acceleration, IVF, PQ quantization, and HNSW indexes. Used standalone or
  integrated into pipelines; excels in billion-scale ANN with low latency. Ideal
  for research and production ML; often paired with vector DBs like LanceDB for
  storage.
source_url: https://faiss.ai/
