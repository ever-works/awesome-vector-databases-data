name: Faiss
description: Faiss (Facebook AI Similarity Search) is a library for efficient
  similarity search and clustering of dense vectors, supporting GPU acceleration
  and advanced indexes like IVF, PQ, HNSW. CPU/GPU optimized for billion-scale
  datasets. Core building block for many vector DBs; use directly for custom
  pipelines or via wrappers like LangChain – faster on GPU than CPU-only
  hnswlib.
source_url: https://faiss.ai/
category: Libraries
tags:
