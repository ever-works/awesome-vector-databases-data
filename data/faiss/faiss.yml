name: Faiss
description: Faiss (Facebook AI Similarity Search) is a pure ANN index library
  for efficient dense vector similarity search and clustering at billion-scale.
  Features GPU/CPU support, quantization (PQ), IVF/HNSW indexes, C++/Python
  bindings. Used in custom vector engines, benchmarks, recommendations;
  high-throughput GPU performer vs lighter Annoy or full DBs like Qdrant.
source_url: https://faiss.ai/
category: ANN Indexing Libraries
tags:
  - Pure ANN
  - Index Only
  - Benchmark Tool
featured: false
markdown: >-
  ## Features


  - GPU and CPU support

  - Indexing methods: LSH, PQ, HNSW, and more

  - Clustering algorithms: k-means, PCA

  - Python and C++ interfaces


  ## Installation and Usage


  Faiss can be installed using pip or conda, and its API is well-documented with
  examples available in the official repository.
