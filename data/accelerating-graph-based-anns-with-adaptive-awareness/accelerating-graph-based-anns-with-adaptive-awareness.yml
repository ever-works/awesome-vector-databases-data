name: Accelerating Graph-based ANNS with Adaptive Awareness
description: SIGKDD 2025 paper proposing adaptive awareness capabilities for
  graph-based approximate nearest neighbor search, enabling the search algorithm
  to dynamically adjust its strategy based on local graph characteristics and
  query properties.
source_url: https://kdd.org/kdd2025/
category: Research Papers & Surveys
tags:
  - graph-index
  - adaptive-search
  - ann
markdown: >-
  ## Overview


  Proposes adaptive awareness mechanisms for graph-based ANNS that adjust search
  behavior based on local structure.


  ## Key Contributions


  - Adaptive awareness for graph-based search

  - Dynamic adjustment of traversal parameters

  - Improved accuracy and efficiency

  - Published in SIGKDD 2025


  ## Publication


  - **Venue**: SIGKDD 2025

  - **Authors**: Ruan et al.
