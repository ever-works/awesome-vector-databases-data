name: Late Interaction
description: Retrieval paradigm where query and document tokens are encoded
  separately and interactions computed at search time, combining efficiency of
  bi-encoders with expressiveness of cross-encoders.
source_url: https://arxiv.org/abs/2004.12832
category: Concepts & Definitions
