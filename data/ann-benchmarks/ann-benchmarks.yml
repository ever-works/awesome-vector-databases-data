name: ANN-Benchmarks
description: Benchmark survey reviewing ANN algorithms performance on standard
  datasets (SIFT1M, Deep1B), detailing QPS/recall trade-offs. Features
  theory/practice gaps in index selection; academic use for algorithm
  comparison. Compares algorithm review with VLDB system surveys and NeurIPS
  billion-scale benchmarks.
source_url: https://ann-benchmarks.com/
category: Benchmark & Evaluation Tools
tags:
  - ANN Theory
  - Index Survey
  - Academic Review
featured: true
markdown: |-
  ## Overview

  Standardized benchmark surveying ANN libraries performance.

  ## Features

  - Datasets: SIFT1M, GIST1M, GloVe, Deep1B
  - Metrics: recall, QPS, build time
  - Algorithms: HNSW, FAISS, ScaNN, etc.

  ## Theory/Practice Gaps

  - Theoretical optimality vs hardware perf
  - Static benchmarks vs dynamic workloads

  ## Use Cases

  - Academic index selection
  - Production algorithm choice

  ## Comparisons

  | Aspect | ANN-Benchmarks | VLDB Survey | NeurIPS BigANN |
  |--------|----------------|-------------|----------------|
  | Scale | Million-scale | Systems | Billion-scale |

  ## Pricing
  Free open-source.
