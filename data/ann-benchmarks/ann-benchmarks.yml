name: ANN-Benchmarks
description: Standardized benchmark for QPS/latency/recall tests on ANN
  libraries using datasets like SIFT1M and Deep1B to compare throughput and
  accuracy. Features metrics for build time, memory usage across HNSW, FAISS,
  ScaNN. Used for vector DB index selection during development; contrasts with
  BigANN billion-scale competitions by focusing on million-scale library
  performance vs full-system custom benchmarks.
source_url: https://ann-benchmarks.com/
category: Benchmarks & Evaluation
tags:
  - benchmarking
  - performance-evaluation
  - ann-libraries
featured: true
markdown: |-
  ## Overview

  Standardized benchmark surveying ANN libraries performance.

  ## Features

  - Datasets: SIFT1M, GIST1M, GloVe, Deep1B
  - Metrics: recall, QPS, build time
  - Algorithms: HNSW, FAISS, ScaNN, etc.

  ## Theory/Practice Gaps

  - Theoretical optimality vs hardware perf
  - Static benchmarks vs dynamic workloads

  ## Use Cases

  - Academic index selection
  - Production algorithm choice

  ## Comparisons

  | Aspect | ANN-Benchmarks | VLDB Survey | NeurIPS BigANN |
  |--------|----------------|-------------|----------------|
  | Scale | Million-scale | Systems | Billion-scale |

  ## Pricing
  Free open-source.
