name: VIBE
description: Vector Index Benchmark for Embeddings - an extensible benchmarking
  suite for approximate nearest neighbor search methods using modern embedding
  datasets. VIBE addresses limitations of traditional ANN benchmarks by focusing
  on contemporary embedding models and datasets.
