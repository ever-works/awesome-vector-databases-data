markdown: >-
  ## Overview


  The Vercel AI SDK is a free, open-source TypeScript toolkit that simplifies
  building AI applications by providing a unified API to interact with various
  large language models. Created by the team behind Next.js.


  ## Features


  - **Unified API**: Single interface for 15+ LLM providers

  - **Provider Support**: OpenAI, Anthropic, Google, Azure OpenAI, Bedrock,
  Cohere, Mistral, Groq, and more

  - **TypeScript-First**: Built for type safety and developer experience

  - **Streaming Support**: Built-in streaming responses

  - **React Integration**: Hooks and components for React applications

  - **AI Gateway**: Vercel AI Gateway for unified access

  - **Reasoning Support**: Claude Opus 4 and Sonnet 4 reasoning capabilities

  - **Web Search**: Provider-defined web search tools


  ## Anthropic Claude Integration


  Supports Claude models with thinking/reasoning features, effort levels
  (high/medium/low), and provider-defined web search tools. Use model strings
  like 'anthropic/claude-opus-4.5'.


  ## Use Cases


  - Next.js AI applications

  - Multi-provider AI applications

  - Streaming chat interfaces

  - AI-powered web applications

  - Production AI products


  ## Integration


  Seamless integration with Next.js, React, and other JavaScript frameworks.
  Works with vector databases for RAG applications.


  ## Pricing


  Free and open-source. Pay only for underlying LLM API usage.
