markdown: >-
  # seekdb


  **Website:** https://github.com/oceanbase/seekdb  

  **Vendor / Brand:** OceanBase  

  **Category:** Vector Database Engines  

  **License:** Apache-2.0


  ## Overview

  seekdb is OceanBase’s experimental vector database component designed for
  high-performance nearest neighbor search over embedding vectors. It is part of
  an AI-native search database engine that unifies vector, text, structured, and
  semi-structured data to enable hybrid search and in-database AI workflows.


  ## Features

  - Experimental vector database component within the OceanBase ecosystem

  - High-performance approximate nearest neighbor (ANN) search over embedding
  vectors

  - AI-native search engine capabilities

  - Unified handling of:
    - Vector data
    - Text data
    - Structured data
    - Semi-structured data
  - Supports hybrid search across multiple data modalities

  - Designed for in-database AI workflows and retrieval tasks

  - Open-source with Apache-2.0 license


  ## Pricing

  - Open-source project under the Apache-2.0 license (no explicit pricing plans
  listed).
