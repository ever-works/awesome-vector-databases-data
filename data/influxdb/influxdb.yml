name: InfluxDB
description: InfluxDB 3 OSS is an open-source, self-hosted time-series database
  with vector data support for AI/ML workloads. Key features include
  high-ingest, vector search, and Apache 2.0 license. Ideal for RAG with
  time-series vectors, free self-hosting vs managed Pinecone for cost savings.
source_url: https://github.com/influxdata/influxdb3
