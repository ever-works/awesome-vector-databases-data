markdown: |-
  ## Overview

  InfluxDB 3 OSS handles time-series and vectors for AI.

  ## Features

  - High-performance ingestion
  - Vector data support
  - Client integrations
  - Monitoring/IoT use cases

  ## Pricing

  Free open-source (Apache 2.0).
