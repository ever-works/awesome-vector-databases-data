name: Vector Bible
description: Vector Bible is a GitHub repository comparing popular vector
  databases across features, performance, and use cases in a structured table.
  It serves as a quick reference for selection by aggregating benchmarks and
  pricing information. It complements ANN-Benchmarks as an essential resource
  for DB evaluation and decision-making, not a tool itself.
