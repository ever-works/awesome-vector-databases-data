markdown: >-
  ## NearestNeighbors.jl


  **Category:** SDKs & Libraries  

  **Tags:** ann, julia, vector-search  

  **Source:** https://github.com/KristofferC/NearestNeighbors.jl


  ### Description

  NearestNeighbors.jl is a Julia package providing high-performance nearest
  neighbor data structures and algorithms for high-dimensional vector data,
  including KDTree and BallTree implementations.


  ### Features

  - High-performance nearest neighbor search for vector data

  - Support for high-dimensional spaces

  - KDTree index structure

  - BallTree index structure

  - Implementations of nearest neighbor search algorithms built on these trees

  - Example scripts and usage patterns (via `examples/` directory)

  - Benchmarking setup for performance evaluation (via `benchmark/` directory)

  - Test suite for reliability and correctness (via `test/` directory)


  ### Technical Details

  - Implemented in Julia

  - Distributed as a Julia package (`Project.toml` based)

  - Open-source with a LICENSE file included in the repository


  ### Pricing

  - Not specified; the project is open-source on GitHub (license details are in
  `LICENSE.md`).
