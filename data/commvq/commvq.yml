name: CommVQ
description: A commutative vector quantization method for KV cache compression
  that reduces FP16 cache size by 87.5% with 2-bit quantization and enables
  1-bit quantization, allowing LLaMA-3.1 8B to run with 128K context on a single
  RTX 4090 GPU.
source_url: https://machinelearning.apple.com/research/commutative-vector-quantization
