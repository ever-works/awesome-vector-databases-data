markdown: >-
  ## Overview


  NVIDIA cuDF is an open-source GPU DataFrame library that provides pandas-like
  APIs for data processing accelerated by NVIDIA GPUs. Built on Apache Arrow, it
  utilizes GPU parallelism and memory bandwidth to accelerate data processing
  and analytics workflows.


  ## Key Capabilities


  - Accelerates popular data engines including Apache Spark, pandas, and Polars

  - Built on Apache Arrow columnar memory format

  - Utilizes GPU parallelism and memory bandwidth for high-throughput processing

  - Native compatibility with DuckDB

  - Serves as the data-processing foundation of the Sirius GPU-accelerated
  database


  ## Use Cases


  - Large-scale data processing and analytics

  - Real-time data transformation pipelines

  - GPU-accelerated SQL query execution

  - Data preprocessing for machine learning and AI workloads


  ## Licensing


  Free and open-source.
