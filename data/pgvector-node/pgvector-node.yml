name: pgvector-node
description: JavaScript/TypeScript SDK/client (Node.js/Deno/Bun) for pgvector
  PostgreSQL extension, enabling async vector storage and similarity queries.
  Supports REST-like ops via pg driver, Prisma integration. For JS app
  integration in RAG/semantic search; official bindings vs. direct SQL or other
  SDKs.
