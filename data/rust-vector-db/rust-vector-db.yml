name: rust-vector-db
description: rust-vector-db is a lightweight, educational vector database
  implemented in Rust, leveraging memory safety, high performance, and SIMD
  instructions for efficient vector storage and retrieval. It supports HNSW
  indexing, product quantization, disk persistence, and distance metrics like
  cosine similarity, Euclidean, and dot product. Perfect for high-perf embedded
  and edge AI applications or learning purposes; more performant and safer than
  Python-based libraries like Chroma.
