name: rust-vector-db
description: rust-vector-db is a Rust-based educational project for
  high-performance vector storage, emphasizing memory safety with HNSW indexing
  and product quantization. It implements key ANN search algorithms using cosine
  similarity, Euclidean distance, and dot product metrics for similarity
  retrieval. Perfect for learning edge AI and embedded use cases; lighter and
  more focused than production Rust peers like Qdrant.
