name: VortexDB
description: Rust-built vector DB with pluggable HNSW/KD-Tree/Flat indexers for
  low-latency on-device similarity search, HTTP/gRPC/TUI clients, RocksDB
  persistence. Suited for edge AI; modular vs monolithic Qdrant.
source_url: https://github.com/sdslabs/VortexDB
category: Embedded & Edge Vector Databases
tags:
