name: VortexDB
description: Vector database built from scratch in Rust for efficient similarity
  search in AI applications. Supports pluggable indexers including Flat,
  KD-Tree, and HNSW, with distance metrics like Euclidean, Manhattan, Hamming,
  and Cosine. Features HTTP/gRPC servers, TUI client, and RocksDB storage
  backend.
