name: MuopDB
description: MuopDB is an open-source, self-hosted vector database for fast
  similarity search with multi-user support and efficient storage. Key features
  include HTTP API, configurable collections, and free license. Great for RAG
  prototypes with user-specific indexes, cost-free self-hosting vs Pinecone.
source_url: https://github.com/hicder/muopdb
category: Open Source Vector Databases
tags:
