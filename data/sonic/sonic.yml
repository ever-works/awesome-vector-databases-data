name: Sonic
description: Fast in-memory backend with HNSW vector support for low-latency
  on-device hybrid full-text + vector search, ideal for edge
  performance-critical apps. Sub-ms ingest/retrieval; lightweight alternative to
  cloud Qdrant.
source_url: https://github.com/valeriansaliou/sonic
category: Embedded & Edge Vector Databases
tags:
  - in-memory-fast
  - lightweight-search
  - open-source
  - Edge AI
featured: false
markdown: |-
  ## Overview
  Sonic enables low-latency edge vector/hybrid search.

  ## Features
  - HNSW vector + full-text
  - In-memory sub-ms ops
  - HTTP/JSON API
  - Multi-threaded

  ## Use Cases
  - IoT real-time AI
  - Edge semantic search
  - CV inference

  ## Comparisons
  - Lightweight on-device vs cloud Qdrant
  - Faster ingest than heavier DBs

  ## Pricing
  Free open-source (MPL 2.0).
