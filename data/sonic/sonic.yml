name: Sonic
description: Sonic is a fast in-memory search backend with vector support via
  HNSW, serving as a lightweight alternative to heavier databases and search
  engines. It features JSON document storage and hybrid full-text plus vector
  search capabilities. Optimized for high-speed ingest and retrieval in memory,
  ideal for performance-critical applications.
