name: Late Interaction Retrieval
description: A retrieval paradigm where query and document encodings are kept
  separate until a late interaction stage, enabling more expressive and
  efficient similarity computations. Pioneered by ColBERT and extended by
  ColPali and ColQwen, this approach maintains fine-grained representations
  while enabling fast retrieval.
source_url: https://weaviate.io/blog/late-interaction-overview
category: Concepts & Definitions
tags:
  - retrieval
