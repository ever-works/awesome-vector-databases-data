name: RuVix
description: RuVix is an operating system kernel designed for AI agents and
  cognitive workloads, replacing file/process thinking with vectors, graphs,
  proofs, and capabilities. Features proof-gated mutations, unforgeable
  capability tokens, io_uring-style IPC, coherence-aware scheduling, and support
  for bare-metal AArch64, multi-core, Raspberry Pi, networking, and distributed
  QEMU swarms.
