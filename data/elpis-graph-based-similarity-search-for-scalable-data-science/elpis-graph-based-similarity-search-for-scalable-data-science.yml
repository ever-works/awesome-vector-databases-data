markdown: >-
  ## Overview


  ELPIS is a graph-based similarity search system designed for scalable data
  science, combining graph-based indexing with optimization techniques for
  large-scale vector search.


  ## Key Contributions


  - Graph-based similarity search optimized for large-scale data science
  workloads

  - Scalable indexing with distributed processing capabilities

  - Effective balance between search accuracy and computational cost

  - Published in VLDB 2023


  ## Publication


  - **Venue**: VLDB 2023

  - **Authors**: Azizi et al.

  - **Abbreviation**: ELPIS


  ## Features


  - Graph-based index construction with optimization for distributed
  environments

  - Efficient search over high-dimensional data at scale

  - Designed for practical data science workloads
