name: ELPIS — Graph-Based Similarity Search for Scalable Data Science
description: VLDB 2023 paper presenting ELPIS, a graph-based similarity search
  approach that combines graph indexing with learning-based techniques for
  scalable data science applications on large datasets.
source_url: https://www.vldb.org/pvldb/vol16/p1548-azizi.pdf
category: Research Papers & Surveys
tags:
