name: SPANN
description: "SPANN is a highly efficient billion-scale ANN search system using
  clustered HNSW indexes with dynamic partitioning for balanced load. Key
  features: disk-based, high recall, low latency on commodity hardware. Use
  cases: web-scale recommendation, image retrieval. Improves on DiskANN with
  better build time; competitive FAISS GPU in CPU perf."
