name: Redis
description: Redis is an in-memory data store with vector search capabilities
  via RediSearch/RedisVL modules, supporting HNSW/Flat indexes, filtering, and
  high-throughput queries. Blazing fast for caching + semantic search in
  real-time apps. Popular for RAG sidecars; combines key-value simplicity with
  vector ops, lower latency than Postgres extensions but lacks persistence by
  default.
