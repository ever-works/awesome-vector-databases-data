name: Redis
description: Redis is a high-performance in-memory key-value store with vector
  search extensions via RediSearch module, supporting HNSW/Flat indexes, modular
  filtering, and real-time ingestion. Excels in caching, session stores, and
  low-latency vector similarity for AI apps; integrates with LangChain, cheaper
  than Pinecone for small-scale but requires clustering for massive scale.
