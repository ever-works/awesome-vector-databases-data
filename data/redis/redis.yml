name: Redis
description: Redis is an in-memory data structure store that serves as a vector
  database via RediSearch module, supporting HNSW/Flat indexes for ANN,
  full-text search hybrid, and secondary indexing. Features JSON support,
  modules ecosystem, and clustering for scalability. Popular for caching +
  vector search in real-time apps; more versatile than dedicated VDBs like
  Qdrant for multi-purpose use.
