name: Redis
description: Redis with Vector Search (RediSearch/RedisStack) enables in-memory
  vector similarity on key-value store, supporting HNSW/Flat indexes, filtering,
  and JSON payloads. High-speed for caching/RAG; more versatile than pure VDBs
  like Chroma for sessions, but memory-limited vs disk-based LanceDB.
source_url: https://redis.io/
