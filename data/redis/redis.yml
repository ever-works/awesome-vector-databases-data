markdown: >-
  ## Overview


  Redis is an in-memory data store that provides vector search capabilities
  through its RediSearch module. It delivers sub-millisecond latency and
  supports hybrid search combining BM25 text search with vector similarity,
  alongside a fully managed Redis Cloud vector database offering.


  ## Key Features


  - **Vector Search**: Native vector indexing and similarity search via
  RediSearch module using HNSW

  - **Sub-Millisecond Latency**: Ultra-fast query response powered by in-memory
  architecture

  - **Hybrid Search**: Combines BM25 text search with vector similarity and
  filtering in a single query

  - **Multiple Data Types**: Supports key-value, documents, streams, geospatial,
  and more alongside vectors

  - **Scalability**: Cluster support with replication and automatic failover

  - **Real-Time Data**: Immediate visibility of updates and inserts


  ## Deployment Options


  ### Redis Community Edition

  - Open source and free

  - Self-hosted


  ### Redis Cloud

  - Fully managed service on AWS, Google Cloud, and Azure

  - Redis Vector Database offering

  - Usage-based pricing with scalable tiers

  - Enterprise-grade SLAs and support


  ### Redis Enterprise

  - On-premises or hybrid deployment

  - Advanced features for production workloads


  ## Use Cases


  - Semantic caching

  - Retrieval-augmented generation (RAG)

  - Real-time recommendation systems

  - Feature stores for ML

  - Session and context management for AI agents


  ## Pricing


  ### Community Edition

  Free and open source.


  ### Redis Cloud

  Usage-based pricing varies by tier and configuration. Pricing details at
  redis.io/pricing.


  ### Redis Enterprise

  Available upon request for on-premises deployments.
