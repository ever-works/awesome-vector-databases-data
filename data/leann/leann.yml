name: LEANN
description: LEANN is a lightweight RAG-focused library for vector search on
  embeddings, achieving 97% storage savings via advanced compression and
  quantization techniques on personal devices. Implemented in Rust/Python, it
  supports efficient ANN indexing without full DB overhead. Ideal for embedded
  apps and private prototyping; far lighter than Milvus, more efficient
  on-device vs hnswlib.
