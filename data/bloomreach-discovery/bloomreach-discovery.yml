markdown: >-
  ## Overview


  Bloomreach Discovery bundles commerce search and recommendations into a single
  platform. Under the hood it uses embeddings and relevance models, but presents
  them as APIs and tools merchandisers can use directly without needing a
  separate vector database.


  ## Features


  - **Commerce search**: optimized search for retail and e-commerce catalogs

  - **Recommendations**: personalized product recommendations powered by
  relevance models

  - **Embedding-based retrieval**: semantic search using vector embeddings under
  the hood

  - **Merchandiser tools**: UI and APIs designed for non-technical merchandising
  teams

  - **Revenue optimization**: features focused on driving sales and conversion
  rates


  ## Best For


  Retailers and e-commerce brands that care most about revenue optimization and
  merchandising workflows.


  ## Pricing


  Enterprise pricing; contact sales for details.
