markdown: >-
  # Zilliz Cloud


  [Zilliz Cloud](https://zilliz.com/) is a fully-managed vector database service
  powered by Milvus, designed for fast, scalable, and high-performance vector
  search applications. It is suitable for a range of AI and machine learning use
  cases that require efficient similarity search across large datasets.


  ## Features

  - **Fully Managed Service**: No infrastructure management required; deploy and
  scale vector databases easily.

  - **Powered by Milvus**: Built on the open-source Milvus vector database,
  optimized for performance and efficiency.

  - **High Performance**: Utilizes the Cardinal search engine for up to 10x
  faster vector retrieval than standard Milvus.

  - **Optimized AUTOINDEX**: Balances recall and performance for efficient
  searches and lower total cost of ownership.

  - **Scalability**: Supports distributed, high-throughput clusters scaling up
  to 500 compute units, capable of serving over 100 billion items.

  - **High Availability**: 99.95% monthly uptime SLA for all cloud products.

  - **Security & Governance**: SOC2 Type II and ISO27001 compliant, with
  Role-Based Access Control (RBAC).

  - **Built-in Embedding Pipelines**: Converts unstructured data into vector
  embeddings, including data preparation, chunking, model selection, and
  transformation.

  - **Multi-Cloud Support**: Deployable on AWS, Azure, and GCP across eight
  global regions.

  - **AI Integrations**: Works with leading AI models and frameworks for
  enhanced data processing and search.

  - **Use Case Support**:
    - Retrieval Augmented Generation (RAG)
    - Recommender Systems
    - Text/Semantic Search
    - Image, Audio, and Video Similarity Search
    - AI Agents
    - Molecular Similarity Search
    - Multimodal Similarity Search
  - **Easy to Use**: Simple setup; establish large-scale vector search services
  in minutes without prior experience.


  ## Pricing

  - **Free Tier**: Get started with no credit card required.

  - **Pay-As-You-Go**: Upgrade to a pay-as-you-go plan when ready to launch
  applications.


  (Specific pricing details are not provided in the content.)
