name: llm-app
description: llm-app is an open-source, self-hosted framework for building LLM
  applications with vector database integration for embedding storage and
  retrieval. Key features include support for various vector stores and free
  licensing. Suitable for RAG prototypes, offering self-hosted cost advantages
  over managed services like Pinecone.
source_url: https://github.com/vllm-project/vllm/issues/893
