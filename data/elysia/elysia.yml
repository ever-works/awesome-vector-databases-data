markdown: >-
  # Elysia


  **Website:** https://elysia.weaviate.io/  

  **Category:** LLM Tools  

  **Brand:** Weaviate


  ## Description

  Elysia is an open-source, decision-tree-based agentic system built on top of
  Weaviate. It orchestrates tools and vector-search workflows to demonstrate how
  to build complex AI agents that use a vector database as a core component.


  ## Features

  - Open-source agentic system

  - Built on top of the Weaviate vector database

  - Decision-tree-based orchestration of agent behavior

  - Tool orchestration for complex workflows

  - Vector-search-based workflows for retrieval and reasoning

  - Designed as a reference/blueprint for building complex AI agents with a
  vector database at the core


