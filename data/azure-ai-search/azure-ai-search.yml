name: Azure AI Search
description: Azure AI Search delivers managed vector storage and semantic search
  for AI applications on Microsoft Azure. It features serverless scaling, hybrid
  keyword-vector search, semantic reranking, and integrations with Azure OpenAI.
  Suited for RAG pipelines and enterprise AI, it provides built-in AI enrichment
  and security advantages over self-hosted databases like Milvus.
