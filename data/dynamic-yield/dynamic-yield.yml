markdown: >-
  ## Overview


  Dynamic Yield (a Mastercard company) is an experience optimization suite that
  provides recommendations, targeting, and testing without requiring teams to
  wire up a vector database. It solves for personalization and experimentation
  at the application level rather than infrastructure level.


  ## Features


  - **Recommendations**: automated product and content recommendations

  - **Targeting**: audience segmentation and personalization rules

  - **Testing & experimentation**: A/B testing and multivariate testing

  - **Minimal engineering**: turnkey personalization requiring minimal setup

  - **Application-level optimization**: focuses on user experience rather than
  infra plumbing


  ## Best For


  Marketing and growth teams that want turnkey personalization with minimal
  engineering overhead.


  ## Pricing


  Enterprise pricing; contact sales for details.
