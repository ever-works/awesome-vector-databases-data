name: Apache Lucene
description: High-performance Java library providing SDK functions for vector
  search with HNSW-based ANN, supporting async indexing via IndexWriter futures,
  batch document ingestion, and configurable dimensions up to 1024+. Ideal for
  Java app integration, LangChain via wrappers, offering finer control and lower
  latency vs native REST APIs of cloud vector DBs.
