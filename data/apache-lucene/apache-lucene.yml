name: Apache Lucene
description: Apache Lucene is a high-performance, full-featured open-source text
  search engine library written in Java. It provides approximate nearest
  neighbor (ANN) vector search capabilities using Hierarchical Navigable Small
  World (HNSW) graphs, enabling semantic search on high-dimensional embedding
  vectors up to 1024 dimensions by default (extendable via custom codecs).
