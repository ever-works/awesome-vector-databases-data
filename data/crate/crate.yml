name: Crate
description: Crate is an open-source, self-hosted distributed SQL database with
  native vector data types and similarity search for AI applications. Key
  features include horizontal scaling, PostgreSQL compatibility, Lucene-based
  indexing, and Apache 2.0 license. Ideal for RAG and real-time analytics,
  providing free self-hosting vs managed vector DBs like Pinecone for cost
  control.
source_url: https://crate.io/
category: Open Source Vector Databases
tags:
  - open-source
  - self-hosted
  - distributed
  - sql
markdown: >-
  ## Overview


  Crate is a distributed SQL database for real-time analytics with vector
  support.


  ## Features


  - Horizontal scaling

  - PostgreSQL wire compatibility

  - Vector data types and search

  - Lucene indexing

  - Standard SQL queries


  ## Pricing


  Free open-source (Apache 2.0).
