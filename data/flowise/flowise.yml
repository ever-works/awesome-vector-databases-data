markdown: >-
  ## Overview


  Flowise AI is an open-source, no-code platform that sits on top of LangChain,
  enabling users to visually build AI workflows using drag-and-drop components.
  It makes LLM app development accessible to both programmers and
  non-programmers.


  ## Key Features


  - **Powered by LangChain**: Built on top of the popular LangChain framework

  - **Drag & Drop UI**: Simple visual interface for building customized LLM apps

  - **Ready-to-Use Templates**: Pre-built app templates to get started quickly

  - **Conversational Agents**: Build agents with memory and context retention

  - **Cloud Deployment**: Seamless deployment on various cloud platforms

  - **Modular Building Blocks**: Create everything from simple workflows to
  autonomous agents


  ## Capabilities


  **Multi-Agent Systems**: Build workflow orchestration distributed across
  multiple coordinated agents


  **Single-Agent Systems**: Create chatbots with tool calling and knowledge
  retrieval (RAG)


  **Data Source Integration**: Connect to various data sources for knowledge
  retrieval


  ## Use Cases


  - Building agentic systems visually

  - Creating RAG-powered chatbots

  - Prototyping LLM applications quickly

  - Multi-agent workflow orchestration

  - Document Q&A systems


  ## Deployment Options


  Available as:

  - Open-source project on GitHub

  - Pre-configured VMs on AWS Marketplace

  - Pre-configured VMs on Azure Marketplace


  ## Learning Resources


  Multiple educational platforms offer courses on mastering Flowise and
  LangChain without coding requirements, making it beginner-friendly.


  ## Pricing


  Free and open-source.
