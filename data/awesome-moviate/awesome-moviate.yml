name: Awesome-Moviate
description: Awesome-Moviate is an open-source, self-hosted demo for hybrid
  vector search using Weaviate, combining BM25 and semantic search for movie
  recommendations. Key features include Docker deployment, hybrid retrieval
  pipeline, and free open-source code. Ideal for RAG-like prototypes in media
  retrieval, self-hosted for cost-effective experimentation vs managed vector
  DBs like Pinecone.
