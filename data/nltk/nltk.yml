name: NLTK
description: The Natural Language Toolkit (NLTK) is a leading Python platform
  for building programs to work with human language data. It provides
  easy-to-use interfaces to lexical resources like WordNet, along with a suite
  of text processing libraries for classification, tokenization, stemming,
  tagging, parsing, and semantic reasoning.
