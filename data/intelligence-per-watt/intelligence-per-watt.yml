markdown: >-
  ## Overview


  Intelligence Per Watt is a research initiative from Stanford's Scaling
  Intelligence Lab that measures the efficiency of AI models by evaluating how
  much computational intelligence can be achieved per unit of energy consumed.


  ## Key Findings


  Stanford's Intelligence Per Watt research showed that local language models
  already handle 88.7% of single-turn chat and reasoning queries, with
  intelligence efficiency improving 5.3× from 2023 to 2025.


  ## Implications


  This research demonstrates that:

  - Local AI is becoming increasingly viable

  - On-device inference can match cloud performance for many tasks

  - Energy efficiency is improving faster than raw performance

  - Privacy-preserving AI is practical


  ## Impact on Design


  The research directly influenced the design of OpenJarvis, Stanford's
  local-first AI agent framework, which prioritizes efficiency alongside task
  quality.


  ## 2026 Relevance


  As AI deployment scales, Intelligence Per Watt is becoming a critical metric
  for sustainable AI development, particularly for edge and mobile deployments.


  ## Pricing


  Research initiative, publicly available findings.
