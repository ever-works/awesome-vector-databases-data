name: Juno — Optimizing ANNS with Sparsity-Aware Algorithm and Ray-Tracing Core
  Mapping
description: ASPLOS 2024 paper introducing Juno, a system that accelerates
  high-dimensional approximate nearest neighbor search using sparsity-aware
  algorithms and GPU ray-tracing (RT) core mapping for hardware-level
  computation acceleration.
source_url: https://dl.acm.org/doi/10.1145/3620666.3651358
category: Research Papers & Surveys
tags:
  - gpu-acceleration
  - hardware-acceleration
  - high-performance
markdown: >-
  ## Overview


  Juno accelerates high-dimensional approximate nearest neighbor search by
  leveraging sparsity in data and mapping distance computations to GPU
  ray-tracing cores.


  ## Key Contributions


  - Sparsity-aware algorithm for efficient distance computation

  - Novel mapping of ANNS operations to GPU RT cores

  - Hardware-level optimization for vector search

  - Published in ASPLOS 2024


  ## Publication


  - **Venue**: ASPLOS 2024

  - **Authors**: Liu et al.

  - **Abbreviation**: Juno


  ## Features


  - Utilizes GPU ray-tracing cores for distance computation

  - Leverages data sparsity for efficiency

  - Significant speedup over traditional GPU implementations
