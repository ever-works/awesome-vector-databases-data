name: NVIDIA cuVS
description: NVIDIA cuVS provides GPU-powered approximate nearest neighbor (ANN)
  search using cuVS/CAGRA indexes for billion-scale datasets. It features NVIDIA
  RAPIDS acceleration for up to 12x faster index building and low-latency
  high-QPS queries versus CPU Milvus. Suited for real-time recommendation
  systems and GenAI retrieval tasks.
