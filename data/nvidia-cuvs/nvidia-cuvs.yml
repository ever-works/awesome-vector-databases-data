name: NVIDIA cuVS
description: NVIDIA cuVS is a GPU-accelerated approximate nearest neighbor
  search library utilizing CUDA for high-performance CAGRA, HNSW, IVF-PQ indexes
  on billion-scale datasets. Supports batch queries for high-throughput
  operations, ideal for large-scale similarity search and real-time
  recommendations. Delivers up to 12x faster index building and 8x lower query
  latency compared to CPU-only implementations like Milvus.
