name: ChromaDB
description: ChromaDB is an open-source embedding database for LLM apps,
  lightweight and embeddable with Python-first API. Supports HNSW indexing,
  persistence, and easy RAG prototyping. Great for local dev and small-scale vs
  production-scale like Milvus; simple alternative to Pinecone for non-managed
  needs.
source_url: https://www.trychroma.com/
