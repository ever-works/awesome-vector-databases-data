markdown: >-
  ## Overview


  Chroma is a Python-native, open-source embedding database designed for LLM
  applications, focusing on simplicity for local prototyping.


  ## Features


  - HNSW indexing for efficient similarity search

  - Metadata filtering

  - Persistent storage options (in-memory or disk)

  - Simple Python API with client-server support


  ## Use Cases


  - Local RAG (Retrieval-Augmented Generation) development

  - Agent memory and state management


  ## Pricing


  Free and open-source under Apache 2.0 license.
