name: ChromaDB
description: Chroma is an AI-native open-source embedding database optimized for
  LLM apps and prototyping. Features persistent storage, easy Python
  integration, and HNSW indexing. Ideal for local RAG development; simpler than
  Weaviate for quick starts but less feature-rich for production scale vs
  Milvus.
