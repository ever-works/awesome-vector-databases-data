name: Chroma
description: Chroma is an AI-native open-source embedding database for LLM apps
  with simple Python API and persistent storage using HNSW. It includes DuckDB
  integration and auto-embedding features. Great for prototyping RAG; vs
  Pinecone easier local dev but less scalable managed.
