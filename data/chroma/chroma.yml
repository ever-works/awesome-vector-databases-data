name: ChromaDB
description: "ChromaDB is an open-source embedding database optimized for LLM
  apps and RAG, supporting local persistence, in-memory storage, and easy
  integration with LangChain/LlamaIndex. Features HNSW indexing, automatic
  batching, multi-modal embeddings, and Python-first API for quick prototyping.
  Use cases: local RAG prototypes, chatbots, document Q&A. Vs pgvector: simpler
  for non-SQL users; vs Pinecone: free local alternative without vendor
  lock-in."
source_url: https://www.trychroma.com/
