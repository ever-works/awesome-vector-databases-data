name: ChromaDB
description: ChromaDB (Chroma) is an open-source, embeddable vector database in
  pure Python using HNSW for local similarity search, ideal for prototyping LLM
  apps and RAG without infrastructure. Features persistent storage,
  auto-embedding integrations, and LangChain compatibility. Lightweight
  alternative to full databases like Weaviate for developer laptops; lacks
  distributed scaling.
source_url: https://www.trychroma.com/
category: Embedded Vector Databases
