name: Chroma
description: Chroma is an open-source embedding database optimized for LLM
  applications, providing in-memory or persistent storage with automatic
  indexing via HNSW. It features easy Python/JS APIs, multi-modal support, and
  integrations with LangChain/LlamaIndex for RAG pipelines. Suited for
  developers building AI prototypes quickly; lighter and more embeddable than
  full databases like Weaviate.
source_url: https://www.trychroma.com/
category: Embedded Vector Libraries
tags:
  - open-source
  - llm-friendly
  - persistent
  - hnsw
featured: false
markdown: |-
  ## Overview

  Chroma is a vector DB for querying high-dimensional vector embeddings.

  ## Features

  - Intuitive API
  - High accuracy and recall rates
  - Embedding-based search
  - Advanced ANN methods
  - Compact storage

  ## Pricing

  Open-source with minimal deployment costs unless scaled heavily.
