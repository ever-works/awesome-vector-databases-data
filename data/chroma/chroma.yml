name: ChromaDB
description: Chroma is an AI-native open-source embedding database tailored for
  LLM apps, providing simple APIs for storing/retrieving embeddings with
  automatic HNSW indexing and full-text search. It supports persistence,
  multi-modal data, and easy integration with LangChain/LlamaIndex for local RAG
  prototypes. Lightweight alternative to Weaviate for developers; lacks
  enterprise scaling but ideal for prototyping.
source_url: https://www.trychroma.com/
