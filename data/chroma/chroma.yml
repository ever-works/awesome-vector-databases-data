name: ChromaDB
description: "ChromaDB (Chroma) is an open-source, AI-native embedding database
  optimized for LLM apps with persistent storage and easy Python integration. It
  supports HNSW indexing, automatic batching, and metadata filtering for local
  RAG prototyping; simple setup vs. Milvus Lite but less scalable for
  production. Use cases: developer tools, local dev."
