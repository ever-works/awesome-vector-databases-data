name: Chroma
description: "Chroma is an open-source, AI-native embedding database focused on
  developer simplicity for local and production LLM apps. It supports
  in-memory/persistent storage with HNSW indexing, automatic embedding via LLMs,
  and easy Python integration. Features: single-binary deploy, collections API,
  multimodal; use cases: prototyping RAG, local agents. Compared to Weaviate,
  Chroma is minimalist and file-based, ideal for quick starts but less suited
  for massive scales."
