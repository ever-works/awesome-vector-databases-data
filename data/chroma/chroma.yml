name: Chroma
description: Chroma is an open-source, embedding database focused on developer
  productivity for LLM apps, offering in-memory or persistent storage with HNSW
  indexing for fast similarity search on text/image embeddings. Features include
  auto-chunking, metadata filtering, multi-modal support, and easy Python/JS
  integration; runs embedded or client-server. Ideal for prototyping RAG,
  chatbots; simpler than Milvus for small-medium scale but lacks distributed
  sharding for production billions, positioning as lightweight alternative to
  Pinecone.
