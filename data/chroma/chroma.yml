name: Chroma
description: Chroma (ChromaDB) is an open-source embedding database for building
  LLM apps locally, with simple Python API and persistent storage. Supports HNSW
  indexing, multi-modal embeddings, and easy integration with
  LangChain/LlamaIndex. Ideal for prototyping RAG; simpler than Qdrant for local
  dev, less scalable than Milvus.
