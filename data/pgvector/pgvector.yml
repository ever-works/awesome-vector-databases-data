  - hnsw-postgres
  - relational-vector
  - postgres-ext
  - sql-hybrid
  - acid-compliant
featured: false
markdown: |-
  ## Features

  - HNSW/IVF indexes for vector similarity search
  - Disk persistence
  - ACID transactions
  - Hybrid search via pg_trgm

  ## Use Cases

  - RAG on relational data

  ## Pricing

  Free and open-source.
