name: PGVector
description: pgvector is an open-source PostgreSQL extension for vector
  similarity search using HNSW and IVFFlat indexes. Integrates seamlessly with
  SQL for hybrid relational-vector queries and scales with Postgres ecosystem.
  Cost-effective alternative to dedicated DBs like Pinecone for existing
  Postgres users; lacks native distributed scaling but excels in ACID
  transactions.
source_url: https://github.com/pgvector/pgvector
