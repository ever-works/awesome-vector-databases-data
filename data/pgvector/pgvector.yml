name: pgvector
description: pgvector is an open-source PostgreSQL extension that adds vector
  similarity search capabilities to Postgres databases. It supports HNSW and
  IVFFlat indexes for efficient approximate nearest neighbor (ANN) searches,
  integrates seamlessly with SQL for hybrid queries, and handles up to thousands
  of dimensions. Perfect for developers already using Postgres wanting to add
  vector capabilities without new infrastructure; compares favorably to
  dedicated DBs like Weaviate for cost-effective, relational vector storage.
source_url: https://github.com/pgvector/pgvector
category: Vector Databases
tags:
  - postgres-extension
  - sql-compatible
