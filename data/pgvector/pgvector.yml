name: pgvector
description: PostgreSQL extension for vector similarity search using HNSW/IVF
  indexes, integrates SQL with ANN. Supports disk persistence, ACID
  transactions, and hybrid search via pg_trgm. Ideal for RAG on relational data;
  leverages existing Postgres infrastructure for cost savings versus dedicated
  VDBs like Pinecone.
source_url: https://github.com/pgvector/pgvector
category: Vector Database Extensions
tags:
  - postgres-extension
  - sql-hybrid
  - disk-persistent
  - acid-compliant
featured: false
markdown: |-
  ## Features

  - HNSW/IVF indexes for vector similarity search
  - Disk persistence
  - ACID transactions
  - Hybrid search via pg_trgm

  ## Use Cases

  - RAG on relational data

  ## Pricing

  Free and open-source.
