name: PGVector
description: PGVector is an open-source PostgreSQL extension adding vector types
  and HNSW/IVFFlat indexes for efficient similarity search within SQL databases.
  Supports cosine/L2 metrics, ideal for hybrid relational-vector setups in local
  RAG and prototyping without new DBs. More seamless Postgres integration than
  standalone like Qdrant/Milvus, but limited horizontal scaling.
source_url: https://github.com/pgvector/pgvector
