name: pgvector
description: "Open-source Postgres extension for vector similarity search with
  HNSW/IVF indexes, SQL integration. Supports exact/approx KNN, L2/cosine/IP
  distance, disk persistence. Use cases: RAG on Postgres data, hybrid SQL+vector
  queries. Comparisons: Simpler than full DBs like Milvus for SQL users; vs
  Lantern: more mature."
source_url: https://github.com/pgvector/pgvector
category: Postgres Vector Extensions
tags:
  - Postgres Extension
  - SQL Vector Search
  - HNSW Postgres
  - Open Source Postgres
featured: true
markdown: >-
  ## Overview


  pgvector brings efficient vector search to PostgreSQL using standard SQL,
  eliminating the need for separate vector databases.


  ## Features


  - **Indexes**: HNSW (high recall, dynamic), IVFFlat (scalable IVF)

  - **Operators**: <-> (L2), <#> (negative inner product), <=> (cosine)

  - **Hybrid SQL**: Full PostgreSQL expressivity - WHERE, JOIN, GROUP BY with
  vectors

  - **Optimizations**: Binary quantization (pgv_512), GPU accel (experimental)


  ## Use Cases


  - **RAG in DB**: Embed/retrieve context alongside app data

  - **Analytics**: Clustering, anomaly detection on embeddings

  - **Search**: Semantic/hybrid in CRM, ecomm


  ## Comparisons


  **vs Weaviate**: Native Postgres ACID/SQL vs GraphQL/REST; no sync latency,
  lower ops cost. Scales via pg_shard or Citus; dedicated DBs better for pure
  vector QPS extremes.


  ## Pricing


  Free open-source (PostgreSQL License).
