markdown: |-
  # PGVector

  PostgreSQL extension for vector search.

  ## Features

  - HNSW/IVFFlat indexes
  - Multiple distance metrics
  - SQL integration
  - Hybrid search with full-text

  ## Pricing

  Free open-source.
