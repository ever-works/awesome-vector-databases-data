name: pgvector
description: pgvector is an open-source Postgres extension adding vector
  similarity search with HNSW, IVFFlat indexes, and distance operators (L2,
  cosine). It enables hybrid SQL+vector queries on existing Postgres setups for
  analytics and RAG, with ACID transactions. Cost-effective vs. dedicated DBs
  like Pinecone; best for relational+vector workloads but CPU-bound for
  billions-scale.
source_url: https://github.com/pgvector/pgvector
category: Vector Database Extensions
tags:
  - postgres-ext
  - sql-hybrid
  - hnsw-postgres
  - acid-compliant
featured: false
markdown: |-
  ## Features

  - HNSW/IVF indexes for vector similarity search
  - Disk persistence
  - ACID transactions
  - Hybrid search via pg_trgm

  ## Use Cases

  - RAG on relational data

  ## Pricing

  Free and open-source.
