name: pgvector
description: "pgvector is a Postgres extension for vector similarity search with
  HNSW/IVFFlat indexes, integrates seamlessly with SQL for hybrid queries.
  Perfect for existing Postgres users in RAG/KB apps; compares to dedicated VDBs
  by leveraging relational ACID. Features: exact KNN, distance ops."
source_url: https://github.com/pgvector/pgvector
category: Postgres Vector Extensions
tags:
