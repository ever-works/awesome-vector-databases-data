name: pgvector
description: "pgvector is an open-source PostgreSQL extension for vector
  similarity search with HNSW/IVFFlat indexes, SQL integration. Enables hybrid
  search in relational DBs; great for apps needing ACID transactions vs
  dedicated VDBs like Pinecone. Use cases: RAG with existing Postgres data."
source_url: https://github.com/pgvector/pgvector
category: Vector Database Extensions
tags:
