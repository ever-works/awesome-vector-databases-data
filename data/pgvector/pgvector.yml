name: pgvector
description: PostgreSQL extension enabling native vector search support. Allows
  similarity searches on high-dimensional vectors within a relational database,
  suitable for small datasets with mixed relational and vector workloads.
source_url: https://github.com/pgvector/pgvector
category: Vector Database
tags:
  - open-source
  - postgres-extension
  - relational
featured: false
markdown: |-
  ## Overview

  pgvector is a PostgreSQL extension for vector search.

  ## Features

  - Native vector similarity search
  - Integrates with PostgreSQL
  - Basic vector search methods

  ## Limitations

  - Lacks advanced indexing
  - Not optimized for high-speed/concurrent queries or large-scale

  ## Pricing

  Free as open-source extension.
