name: PGVector
description: PGVector is a PostgreSQL extension adding vector similarity search
  with HNSW and IVFFlat indexes, enabling hybrid SQL + vector queries on
  existing relational data. Integrates seamlessly with Postgres ecosystem for
  ACID transactions and scalability. Ideal for apps needing relational + vector
  capabilities; cost-effective alternative to managed services like Pinecone
  with full SQL power.
source_url: https://github.com/pgvector/pgvector
category: Vector Database Extensions
