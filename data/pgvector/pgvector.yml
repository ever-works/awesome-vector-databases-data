name: pgvector
description: pgvector is an open-source extension for PostgreSQL that enables
  efficient vector similarity search directly within your Postgres database. It
  supports indexing methods like HNSW and IVFFlat for high-performance
  approximate nearest neighbor (ANN) searches on embeddings, integrates
  seamlessly with SQL queries for hybrid search combining vectors and metadata
  filters. Key features include distance calculations (L2, cosine, inner
  product), GPU acceleration support, and compatibility with popular embedding
  models; ideal for RAG applications, semantic search in relational data, and
  cost-effective alternatives to managed vector DBs like Pinecone without
  leaving Postgres ecosystem. Compared to dedicated vector DBs, pgvector offers
  simplicity and zero extra cost for Postgres users but may require sharding for
  billion-scale datasets.
source_url: https://github.com/pgvector/pgvector
