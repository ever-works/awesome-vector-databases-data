name: pgvector
description: "pgvector is an open-source PostgreSQL extension for vector
  similarity search, enabling efficient ANN with HNSW and IVFFlat indexes
  directly in Postgres. Supports L2, cosine, inner product distances, and
  integrates seamlessly with SQL for hybrid filtering/metadata queries. Key
  features: ACID transactions, replication, no new infra needed. Use cases: RAG
  on relational data, semantic search in apps. Vs dedicated VDBs like Pinecone:
  leverages existing Postgres ecosystem/cost; vs Weaviate: SQL-first
  simplicity."
source_url: https://github.com/pgvector/pgvector
category: Vector Database Extensions
tags:
