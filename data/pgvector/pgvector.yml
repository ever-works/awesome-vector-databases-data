name: pgvector
description: PostgreSQL extension adding HNSW/IVF vector similarity search to
  Postgres, enabling hybrid SQL+vector workloads. Provides ACID transactions,
  disk persistence, and hybrid search with pg_trgm on existing Postgres
  infrastructure. Cost-effective alternative to dedicated vector databases like
  Pinecone for RAG applications on relational data.
source_url: https://github.com/pgvector/pgvector
category: Relational Vector Extensions
tags:
  - sql-hybrid
  - postgres-ext
  - disk-persistent
  - acid-compliant
featured: false
markdown: |-
  ## Features

  - HNSW/IVF indexes for vector similarity search
  - Disk persistence
  - ACID transactions
  - Hybrid search via pg_trgm

  ## Use Cases

  - RAG on relational data

  ## Pricing

  Free and open-source.
