name: PGVector
description: "PGVector is an open-source PostgreSQL extension for vector
  similarity search, enabling efficient ANN with HNSW and IVFFlat indexes
  directly in Postgres. Integrates seamlessly with SQL for hybrid
  vector-relational queries, supporting distance metrics like cosine/L2. Ideal
  for apps needing ACID transactions and existing Postgres infra; vs dedicated
  VDBs like Pinecone, it's cost-free but less scalable for billions. Use cases:
  RAG with metadata, geospatial."
