name: Vald
description: Vald is a distributed vector search engine built for high
  scalability and low latency, using NGram-based filtering and Go
  implementation. It supports sharding and high availability for cloud-native
  deployments. Suited for real-time recommendations; similar to Milvus but
  lighter with focus on NG-Tree indexing vs full feature set.
source_url: https://vald.vdaum.net/
category: Scalable Distributed Vector DBs
tags:
