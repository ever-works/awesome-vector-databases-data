name: Vald
description: Vald is a distributed vector search engine powered by NG+ (Next
  Generation) indexing for high-recall ANN, with auto-scaling and fault
  tolerance via Raft consensus. Supports gRPC/REST, filtering, and
  multi-tenancy. Designed for cloud-native deployments; alternative to Milvus
  with focus on Japanese ecosystem and NG index.
source_url: https://vald.vdaum.net/
category: Vector Databases
