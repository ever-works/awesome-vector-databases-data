name: Vald
description: Cloud-native distributed vector search engine with agent-based
  sharding for high scalability and QPS, using NGT for ANN search. Offers HA
  through index replication/rebalancing, auto-indexing, and Kubernetes-native
  deployment. Suited for production enterprise RAG; lighter Go alternative to
  Milvus with NGT focus vs Milvus/Qdrant's broader indexes.
