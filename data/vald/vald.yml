name: Vald
description: Vald is a distributed vector search engine based on NG+ and NGT,
  designed for high-throughput ANN with fault tolerance via Raft consensus.
  Cloud-native, Kubernetes-friendly with auto-sharding. Suited for global-scale
  search; higher throughput than Qdrant in benchmarks but more complex ops.
