name: Vald
description: Vald is a distributed vector search engine built with Go, using NGT
  for ANN search and NGTD for dynamic indexing. Features auto-scaling, high
  availability via Raft consensus, and REST/gRPC APIs. Suited for cloud-native
  microservices and large-scale search; compares to Milvus in distribution but
  lighter with Go efficiency over Rust-based Qdrant.
