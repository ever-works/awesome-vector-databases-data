name: Amazon S3 Vector Search
description: Leveraging Amazon S3 as a storage layer for vector databases,
  enabling 70-95% cost reduction for certain use cases. S3's low storage costs
  make it attractive for large-scale vector datasets with appropriate access
  patterns.
