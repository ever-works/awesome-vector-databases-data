name: Victor
description: Web-optimized vector database written in Rust. It offers Rust and
  JavaScript APIs with efficient vector storage formats that consume
  significantly less space than JSON, and supports PCA compression for
  low-storage scenarios. Designed for native filesystem, in-memory, and web
  environments via WebAssembly.
