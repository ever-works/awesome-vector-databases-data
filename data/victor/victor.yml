name: Victor
description: Web-optimized Rust vector DB for low-latency on-device
  storage/search via WASM, with efficient formats and PCA compression for
  browsers/edge. Supports JS/Rust APIs; compact vs cloud Qdrant.
source_url: https://github.com/not-pizza/victor
category: Embedded & Edge Vector Databases
tags:
