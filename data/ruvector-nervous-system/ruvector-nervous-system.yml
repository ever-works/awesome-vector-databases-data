markdown: >-
  ## Overview


  Spiking neural networks (SNNs) crate with Behavioral Time-Scale Synaptic
  Plasticity (BTSP) learning and Elastic Weight Consolidation (EWC) plasticity.


  ## Features


  - Spiking Neural Networks (SNNs) for 10-50x energy efficiency over ANNs

  - BTSP for rapid adaptation

  - EWC for plasticity preservation


  ## Pricing


  Free and open-source.
