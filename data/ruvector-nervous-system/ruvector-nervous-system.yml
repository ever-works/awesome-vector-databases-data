name: ruvector-nervous-system
description: Rust crate implementing spiking neural networks with BTSP learning
  and EWC plasticity for neuromorphic and bio-inspired vector processing in AI
  applications. Provides energy-efficient alternatives to traditional ANNs with
  10-50x efficiency gains. Designed for integration into vector databases and
  real-time AI systems.
