name: Annoy
description: Annoy (Approximate Nearest Neighbors Oh Yeah) is a pure ANN index
  library implementing random projection trees for fast approximate nearest
  neighbor search in read-heavy workloads with static indexes. Features
  C++/Python bindings, multi-threading, memory mapping; no quantization or GPU
  support. Ideal for custom vector engines, benchmarks, and low-latency
  recommendations; lightweight building block vs full vector DBs like Qdrant.
source_url: https://github.com/spotify/annoy
