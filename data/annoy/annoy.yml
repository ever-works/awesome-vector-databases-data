name: Annoy
description: Annoy (Approximate Nearest Neighbors Oh Yeah) is a C++ library
  created by Spotify for approximate nearest neighbor search. It is
  memory-efficient and optimized for fast query times, particularly useful for
  large datasets with support for static and dynamic datasets.
source_url: https://github.com/spotify/annoy
category: Vector Databases
tags:
  - open-source
  - approximate-nn
  - memory-efficient
featured: false
markdown: >-
  ## Features


  - Static and dynamic index support

  - Memory-mapped files for sharing indices between processes

  - Custom distance metrics: Euclidean, Manhattan, Angular, and more

  - Python, C++, and other language bindings


  ## Installation and Usage


  Annoy can be installed using pip, and it has an easy-to-use Python API with
  examples and tutorials available on the project's GitHub page.
