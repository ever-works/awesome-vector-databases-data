name: Annoy
description: Annoy (Approximate Nearest Neighbors Oh Yeah) is a lightweight C++
  library with Python bindings for fast ANN search using random projection
  trees, optimized for read-heavy workloads with static indexes. Supports
  multi-threading, memory mapping for large datasets; simple API for
  building/querying. Best for low-latency lookups in recommendations, image
  search; more lightweight than Faiss (no GPU) but lacks dynamic
  updates/filtering, suiting static embedding scenarios over full vector DBs.
