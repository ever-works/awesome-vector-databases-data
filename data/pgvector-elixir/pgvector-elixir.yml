name: pgvector-elixir
description: pgvector-elixir is the Elixir client for pgvector, allowing vector
  similarity search and operations from Elixir/Phoenix apps connected to
  Postgres. Supports Ecto integration for seamless queries with HNSW/IVF indexes
  and distance metrics. Ideal for functional web apps with semantic search;
  extends pgvector ecosystem to Elixir BEAM VM, offering concurrent
  high-throughput vs. single-threaded clients.
