markdown: >-
  ## Overview


  Qwen3-VL-Embedding is part of Alibaba's Qwen3-VL series, specifically
  engineered for multimodal information retrieval and cross-modal understanding.
  It builds on the Qwen3-VL foundation models to provide state-of-the-art
  multimodal embedding capabilities.


  ## Key Capabilities


  - **Multimodal Processing**: Handles text, images, and visual documents in a
  single unified embedding space

  - **Cross-Modal Retrieval**: Enables text-to-image, image-to-text, and
  image-to-image search

  - **Visual Document Understanding**: Processes documents with complex layouts
  including tables and charts

  - **Multilingual Support**: Supports over 100 languages for text processing


  ## Model Family


  Part of the Qwen3 embedding series that achieved:

  - Rank #1 on MTEB multilingual leaderboard (score 70.58 as of June 2025)

  - Over 40% performance improvement compared to predecessors

  - Surpassing Google Gemini Embedding, OpenAI text-embedding-3-large, and
  Microsoft multilingual-e5-large-instruct


  ## Technical Specifications


  - Available in multiple sizes (0.6B, 4B, and 8B parameters)

  - Built on Qwen3-VL foundation models

  - Flexible vector dimensions

  - Support for user-defined instructions

  - Integration with reranking models for enhanced retrieval


  ## Use Cases


  - Multimodal search engines

  - Visual question answering

  - Document image retrieval

  - Cross-lingual visual search

  - E-commerce product search with image and text

  - Medical imaging with text queries


  ## Availability


  Accessible through:

  - Alibaba Cloud Model Studio

  - Hugging Face

  - ModelScope

  - API services via Alibaba Cloud


  ## Pricing


  Pricing through Alibaba Cloud API services on pay-per-use basis. Specific
  rates available through Alibaba Cloud Model Studio.
