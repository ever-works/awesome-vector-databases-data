featured: false
markdown: >-
  ## Overview

  Rivestack provides managed PostgreSQL with pgvector for handling vector
  embeddings in AI applications.


  ## Features

  - Native pgvector support

  - HNSW indexing for efficient similarity search

  - Built-in SQL editor with embedding search

  - Free tier available


  ## Pricing

  Free tier available; paid plans for production workloads.
