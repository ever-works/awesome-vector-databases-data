name: Rivestack
description: Rivestack is a new Rust-based vector database emphasizing
  simplicity and performance for local AI apps, with HNSW indexing and
  lightweight deployment. It focuses on edge computing and developer-friendly
  APIs. Emerging alternative to Chroma for Rust ecosystems; minimal footprint vs
  full-featured like Qdrant.
