name: Leech Lattice Vector Quantization
description: Advanced vector quantization technique that explores the Leech
  lattice's optimal sphere packing properties at 24 dimensions. Delivers
  state-of-the-art LLM quantization performance, outperforming recent methods
  like Quip#, QTIP, and PVQ for extreme vector compression.
