markdown: >-
  ## Overview


  NVIDIA NeMo™ Retriever is a collection of industry-leading Nemotron RAG models
  delivering 50% better accuracy, 15x faster multimodal PDF extraction, and 35x
  better storage efficiency, enabling enterprises to build retrieval-augmented
  generation (RAG) pipelines.


  ## Microservices Architecture


  NeMo Retriever is a collection of microservices that present a single API for
  indexing and querying of user data, using specialized NVIDIA NIM microservices
  to find, contextualize, and extract text, tables, and images for downstream
  generative applications.


  ## Performance Improvements


  - 15x throughput increase in multimodal data extraction

  - 3x better embedding throughput

  - 1.6x better reranking throughput compared to open-source alternatives

  - Capable of processing hundreds of thousands of documents at scale


  ## Enterprise-Ready Capabilities


  NeMo Retriever exhibits a high level of accuracy when retrieving across
  various modalities through enterprise documents. The NVIDIA RAG Blueprint is a
  reference solution and foundational starting point for building
  Retrieval-Augmented Generation (RAG) pipelines with NVIDIA NIM microservices,
  designed to be decomposable and configurable for enterprise needs.


  ## Use Cases


  - AI chatbots

  - Customer service applications

  - Security analysis

  - Supply chain insights


  ## Pricing


  Enterprise pricing available through NVIDIA AI Enterprise.
