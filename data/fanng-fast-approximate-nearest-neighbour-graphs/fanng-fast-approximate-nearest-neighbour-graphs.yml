name: FANNG — Fast Approximate Nearest Neighbour Graphs
description: Paper introducing FANNG, a fast algorithm for constructing
  approximate nearest neighbor graphs. The method builds graphs that enable
  efficient nearest neighbor queries while maintaining high quality
  approximations.
source_url: https://ieeexplore.ieee.org/document/7780805
category: Research Papers & Surveys
