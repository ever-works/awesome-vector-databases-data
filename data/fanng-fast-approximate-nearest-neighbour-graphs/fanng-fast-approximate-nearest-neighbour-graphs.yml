markdown: >-
  ## Overview


  FANNG presents algorithms for fast construction of approximate nearest
  neighbor graphs, improving the efficiency of both index building and query
  time for graph-based search.


  ## Key Contributions


  - Novel approach to approximate kNN graph construction

  - Balances construction speed with graph quality

  - Provides theoretical guarantees on graph connectivity

  - Demonstrated on computer vision benchmarks at CVPR 2016


  ## Publication


  - **Venue**: CVPR 2016

  - **Authors**: Harwood et al.

  - **Abbreviation**: FANNG


  ## Impact


  FANNG contributed to the development of more efficient graph construction
  algorithms that became important building blocks for graph-based vector search
  systems.
