name: Pinecone
description: "Fully managed serverless vector database optimized for high-QPS
  semantic search in AI apps. Features pod/serverless indexing, hybrid
  sparse-dense, metadata filtering, auto-scaling. Use cases: LLM RAG pipelines,
  real-time personalization. Comparisons: Easier than Milvus for cloud-only, but
  no self-host; vs Qdrant: more serverless focus."
