name: EmbeddixDB
description: High-performance vector database designed for LLM memory and RAG
  applications. Provides an MCP (Model Context Protocol) server for seamless
  integration with AI assistants like Claude, and a REST API for traditional
  applications. Supports HNSW and flat indexes with 256x memory compression via
  quantization, flexible storage backends, auto-embedding, and advanced
  analytics.
