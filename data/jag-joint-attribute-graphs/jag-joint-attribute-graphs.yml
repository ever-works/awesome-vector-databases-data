name: JAG
description: Joint Attribute Graphs for Filtered Nearest Neighbor Search, a
  research paper that addresses the challenge of combining vector similarity
  search with attribute filtering. JAG presents a novel index structure that
  efficiently handles filtered ANN queries common in real-world applications.
source_url: https://arxiv.org/abs/2602.10258
category: Research Papers & Surveys
tags:
