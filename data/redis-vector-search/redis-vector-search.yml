name: Redis Vector Search
description: "Redis Vector Search adds k-NN to Redis for real-time vector
  similarity on in-memory data, with HNSW/Flat indexes, filtering. Features:
  sub-ms latency, JSON payloads, modules. Use cases: caching + search, session
  stores. Vs dedicated VDBs: leverages Redis speed/ecosystem."
