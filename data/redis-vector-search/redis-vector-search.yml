markdown: >-
  ## Overview


  Redis Vector Search provides vector similarity capabilities through the Redis
  Stack, supporting fast ANN search in an in-memory environment.


  ## Key Features


  - HNSW indexing

  - Filtering (basic to strong, pattern-dependent)

  - Hybrid search (limited)

  - Integrations: LangChain

  - Low-latency retrieval near applications

  - Supports high QPS workloads


  ## Deployment


  - Managed and self-hosted


  ## Pricing


  - Cloud + self-hosted infrastructure costs
