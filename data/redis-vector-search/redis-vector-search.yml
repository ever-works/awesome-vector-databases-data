name: Redis Vector Search
description: Redis Vector Search (Redis Stack) adds k-NN vector search to Redis
  with RediSearch, supporting HNSW/Flat indexes, filtering, and real-time
  ingestion. Excels as cache+vector hybrid for low-latency apps vs. dedicated
  DBs; use for session-based recs.
