name: Redis Vector Search
description: Redis Vector Search extends Redis with vector similarity
  capabilities using HNSW/Flat indexes, supporting hybrid BM25+vector queries
  and on-disk persistence. Ideal for caching, real-time search, and RAG in
  high-throughput apps; leverages Redis ecosystem for speed but less specialized
  than dedicated VDBs like Qdrant for complex filtering.
