markdown: |-
  ## Overview

  Redis Vector Search enables fast ANN similarity search via Redis Stack.

  ## Key Features

  - HNSW/Flat indexing
  - Hybrid search
  - Metadata filtering
  - LangChain integration
  - High QPS

  ## Deployment

  Managed/self-hosted

  ## Pricing

  Infrastructure-based.
