name: Redis Vector Search
description: "Redis Vector Search, part of Redis Stack, adds HNSW/Flat indexing
  for vector similarity on in-memory Redis with sub-ms latency, hybrid
  BM25+vector, and metadata filtering. Supports real-time updates, modular
  deployment; ideal for caching-heavy RAG, recommendations. Vs. dedicated like
  Pinecone: lower cost/latency for hot data but evicts cold vectors; scales via
  Redis Cluster."
