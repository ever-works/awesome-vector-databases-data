name: Redis Vector Search
description: Redis Vector Search (part of Redis Stack) enables vector similarity
  search on Redis with HNSW indexing, hybrid BM25+vector, and metadata
  filtering. It leverages Redis caching for low-latency real-time apps like
  semantic search. Vs dedicated DBs like Pinecone, Redis offers multi-model
  (JSON/KV + vectors) but requires more config for scale.
