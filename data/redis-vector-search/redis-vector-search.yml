name: Redis Vector Search
description: "Redis Vector Search, powered by RediSearch module, enables vector
  similarity search on Redis with HNSW/Flat indexes, supporting hybrid
  BM25+vector queries and on-disk persistence. It leverages Redis' speed for
  real-time apps with filtering on JSON payloads. Use cases: caching embeddings
  for chatbots, fraud detection; faster than Postgres for low-latency but less
  scalable than distributed like Milvus without clustering."
