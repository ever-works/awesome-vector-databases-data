markdown: >-
  ## Overview


  LlamaParse is LlamaIndex's advanced document parsing service that uses LLMs to
  extract and structure content from complex documents while preserving layout
  and relationships.


  ## Key Features


  **LLM-Powered Parsing**:

  - Understands document structure

  - Preserves tables and formatting

  - Handles complex layouts

  - Maintains semantic relationships


  **Format Support**:

  - PDF (including scanned)

  - PowerPoint

  - Word documents

  - Images with OCR


  **Output**:

  - Structured markdown

  - Preserved tables

  - Image references

  - Metadata extraction


  ## Advantages


  - Better than traditional OCR

  - Maintains document structure

  - Handles complex formatting

  - Optimized for RAG


  ## Use Cases


  - Enterprise document processing

  - Research paper parsing

  - Financial document analysis

  - Technical documentation


  ## Pricing


  Free tier + usage-based pricing


  ## Availability


  API service from LlamaIndex
