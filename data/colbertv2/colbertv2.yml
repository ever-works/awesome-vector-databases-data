markdown: >-
  ## Overview


  ColBERTv2 is the second generation of the ColBERT late interaction
  architecture, published in TACL'21. It provides effective and efficient
  retrieval via lightweight late interaction while maintaining the strong
  generalization properties of the original model.


  ## Key Improvements Over ColBERT


  - Lightweight architecture for improved efficiency

  - Maintains strong out-of-domain generalization

  - Optimized for production deployments

  - Improved balance between effectiveness and efficiency


  ## Late Interaction Benefits


  Like the original ColBERT, ColBERTv2:

  - Operates at token level with fine-grained representations

  - Uses maxsim operator for document-query similarity

  - Encodes queries and documents independently

  - Delivers strong performance in out-of-domain settings


  ## PLAID Indexing


  ColBERTv2 works with PLAID (Product-quantized Late Interaction Approximate
  nearest neighbor for Distillation), which has become the de facto standard
  indexing method for multi-vector retrieval.


  ## Research Impact


  Publications:

  - SIGIR'20: Original ColBERT

  - TACL'21: ColBERTv2

  - NeurIPS'21, NAACL'22, CIKM'22, ACL'23, EMNLP'23: Follow-up work


  ## Applications


  - Passage retrieval

  - Question answering

  - Cross-modality retrieval

  - Reasoning-based search

  - RAG systems requiring high-quality retrieval


  ## Workshop


  The First Workshop on Late Interaction and Multi Vector Retrieval is scheduled
  for ECIR 2026, with Omar Khattab (ColBERT's creator) from MIT as keynote
  speaker.


  ## Trade-offs


  While ColBERTv2 provides superior retrieval quality, the multi-vector approach
  requires more storage than single-vector methods, posing challenges for very
  large-scale deployments.
