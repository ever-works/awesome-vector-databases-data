name: ColBERTv2
description: Advanced multi-vector retrieval model creating token-level
  embeddings with late interaction mechanism, featuring denoised supervision and
  improved memory efficiency over original ColBERT.
source_url: https://arxiv.org/abs/2112.01488
category: Machine Learning Models
tags:
