name: NanoDB
description: NanoDB is a CUDA-optimized multimodal vector database supporting
  text and image vectors via CLIP embeddings for similarity search. Features
  multi-modal indexing in shared embedding space for text-to-image queries. Use
  cases include CV+text search and edge multimedia recommendations;
  GPU-accelerated alternative to text-only pgvector for vision-language tasks.
source_url: https://github.com/dusty-nv/NanoDB
