  ### VLDB – New Trends in High-D Vector Similarity Search (Tutorial)


  **Category:** Curated Resource Lists  

  **Source:** [VLDB Conference](https://vldb.org)  

  **Brand:** VLDB Endowment


  #### Overview

  A VLDB conference tutorial covering recent advances in high-dimensional vector
  similarity search, with a focus on the algorithms and system designs that
  power modern vector databases and large-scale approximate nearest neighbor
  (ANN) search.


  #### Features

  - **Focus on high-dimensional similarity search**
    - Emphasis on methods for efficient similarity search in high-dimensional vector spaces.
  - **Coverage of core algorithms**
    - Fundamental algorithmic techniques used in vector similarity search and ANN.
  - **System design perspectives**
    - Discussion of system architectures and design patterns underlying modern vector databases.
  - **Large-scale ANN search**
    - Techniques and considerations for approximate nearest neighbor search at large scale.
  - **Relevance to modern vector databases**
    - Connects algorithmic foundations to practical systems used for vector data management and retrieval.

  #### Pricing

  - Not applicable (conference tutorial; no specific pricing details provided in
  the source content).
