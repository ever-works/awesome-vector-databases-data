featured: false
markdown: |-
  ## Overview

  Implements eBPF programs for efficient packet processing in RVF environments.

  ## Features

  - XDP/TC/socket eBPF programs
  - Optimized for vector data
  - Integration with RVF kernel

  ## Pricing

  Open source under MIT license.
