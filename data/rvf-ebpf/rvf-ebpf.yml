name: rvf-ebpf
description: eBPF-based kernel-level networking filters (XDP, TC) with
  encryption enforcement and access controls for secure vector data flows.
  Enables enterprise data privacy in RuVector deployments with compliance
  monitoring. More efficient than open-source eBPF tools with vector-optimized
  filtering.
source_url: https://crates.io/crates/rvf-ebpf
category: Security & Governance
tags:
