name: brinicle
description: Lightweight Rust-based vector index inspired by Meilisearch,
  implementing disk-backed HNSW for fast ANN search in resource-constrained
  settings. Focuses on embeddability and minimalism for local applications with
  high query performance. Suitable for edge RAG and prototyping; simpler than
  Milvus for single-node use, lighter alternative to Qdrant.
source_url: https://github.com/meilisearch/brinicle
