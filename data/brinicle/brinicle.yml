name: brinicle
description: Brinicle is a lightweight C++ library for approximate nearest
  neighbor (ANN) vector search on embeddings, optimized for low-RAM environments
  rather than full vector databases. It features efficient graph-based indexing
  (HNSW-like), supports quantization for further memory reduction, and excels in
  languages like C++. Ideal for rapid prototyping of ML prototypes and embedded
  applications; lighter and more memory-efficient than Milvus, with better
  low-resource performance vs hnswlib.
