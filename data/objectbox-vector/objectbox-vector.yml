markdown: >-
  ## Overview


  ObjectBox is an on-device Database with Vector Search and out-of-the-box Data
  Sync, designed for resource-efficiency on mobile, IoT, and other embedded
  devices. It offers the very first on-device offline vector search powering
  on-device AI, with cloud being optional.


  ## Key Features


  ### On-Device AI


  The new on-device vector database enables advanced AI applications on small
  restricted devices:

  - Mobile phones

  - Raspberry Pis

  - Medical equipment

  - IoT gadgets


  ### Offline-First Architecture


  It is the missing piece to a fully local AI stack and the key technology to
  enable AI language models to interact with user specific data without an
  Internet connection.


  ### Resource Efficiency


  Optimized for devices with limited computational resources, enabling vector
  search operations that would typically require cloud infrastructure.


  ## Edge AI Applications


  Edge AI apps work independently from an internet connection, offline as well
  as online. So, they are ideal for low, intermittent, or no connectivity
  scenarios.


  ## Data Synchronization


  Comes with out-of-the-box data sync capabilities, allowing synchronization
  when connectivity is available while maintaining full functionality offline.


  ## Use Cases


  - Field service applications with on-device vector search and sync

  - Medical devices requiring local AI processing

  - Industrial IoT with intermittent connectivity

  - Mobile apps requiring offline semantic search

  - Edge computing scenarios


  ## Pricing


  Commercial product with developer-friendly pricing tiers.
