name: Sentence Transformers v3.0
description: Major update to the Sentence Transformers library introducing a new
  SentenceTransformerTrainer for easier fine-tuning, multi-GPU support, improved
  loss logging, and access to 15,000+ pre-trained models on HuggingFace.
