markdown: >-
  ## Overview


  voyage-4-nano is the first open-weight model from Voyage AI, freely available
  on Hugging Face under the Apache 2.0 license. It's part of the Voyage 4 series
  announced in January 2026.


  ## Key Features


  - **Shared Embedding Space**: All Voyage 4 models produce compatible
  embeddings, allowing customers to mix and match models for query and document
  embedding based on specific accuracy, latency, and cost requirements

  - **Open Weight**: Freely available under Apache 2.0 license for local
  development and prototyping

  - **Lightweight**: Significantly fewer parameters than larger Voyage 4 models
  while maintaining quality

  - **Production-Ready**: Can be used alongside other Voyage 4 models for
  flexible deployment strategies


  ## Use Cases


  - Local development and prototyping

  - Cost-effective embedding generation

  - Edge deployment scenarios

  - RAG applications requiring high-quality embeddings


  ## Model Architecture


  voyage-4-nano is part of the Voyage 4 family which leverages a
  mixture-of-experts (MoE) architecture in the larger models, though specific
  architectural details for the nano variant are optimized for efficiency.


  ## Pricing


  Free and open-source under the Apache 2.0 license.
