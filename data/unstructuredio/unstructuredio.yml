markdown: >-
  ## Overview


  Unstructured.io provides deep document parsing with strong OCR capabilities,
  excelling at extracting structured data from complex layouts including
  multi-column PDFs, scanned documents, and forms.


  ## Key Capabilities


  ### Document Processing

  - Multi-column PDF extraction

  - Scanned document OCR

  - Form recognition and extraction

  - Table detection and parsing

  - Complex layout understanding


  ### Format Support

  - PDF documents

  - Images (JPEG, PNG, TIFF)

  - Microsoft Office files

  - HTML and markdown

  - Email formats

  - And many more


  ## Technical Features


  - Advanced OCR engine

  - Layout analysis

  - Table structure recognition

  - Hierarchical document parsing

  - Metadata extraction

  - Batch processing support


  ## Integration


  - LlamaHub connector

  - LangChain compatibility

  - API access

  - Python library

  - REST endpoints


  ## Use Cases


  - Document digitization

  - Legacy document processing

  - Form automation

  - Knowledge base construction

  - RAG pipeline data preparation

  - Complex document extraction


  ## Advantages Over Standard Loaders


  - Superior handling of complex layouts

  - Accurate OCR for scanned documents

  - Preserves document structure

  - Table extraction capabilities

  - Production-grade quality


  ## Deployment Options


  - Cloud API

  - Self-hosted deployment

  - Open-source library

  - Enterprise solutions


  ## Performance


  - Handles complex document structures

  - Scalable batch processing

  - High accuracy OCR

  - Efficient processing pipelines


  ## Pricing


  Open-source library available, cloud API and enterprise pricing tiers
