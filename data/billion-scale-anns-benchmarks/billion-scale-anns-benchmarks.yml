name: Billion-scale ANNS Benchmarks
description: Provides QPS/latency/recall benchmarks for ANNS algorithms on
  billion-point datasets via NeurIPS tools for dataset prep and evaluation.
  Features scalable testing for extreme throughput and visualization. Key for
  production vector DBs at scale; extends ANN-Benchmarks with billion-scale
  tools unlike full-system DB benchmarks.
