markdown: >-
  ## Overview


  Google Vector Search is a fully managed service for high-scale vector
  similarity searches using Approximate Nearest Neighbor (ANN) powered by ScaNN
  technology.


  ## Features


  - Matches queries against billions of vectors

  - Integrated with Vertex AI Matching Engine

  - Supports filtering and metadata


  ## Pricing


  Usage-based pricing through Google Cloud.
