name: ViDoRe Benchmark
description: Visual Document Retrieval benchmark designed to evaluate embedding
  models and retrieval systems on visually rich documents containing tables,
  charts, diagrams, and complex layouts. The standard benchmark for assessing
  multi-modal document understanding and retrieval performance.
