name: Learning to Route in Similarity Graphs
description: ICML 2019 paper introducing a learned routing approach for
  similarity graphs, using machine learning to guide greedy search traversal in
  graph-based approximate nearest neighbor search.
source_url: https://proceedings.mlr.press/v97/baranchuk19a.html
category: Research Papers & Surveys
tags:
  - graph-index
  - learning-based
  - ann
markdown: >-
  ## Overview


  This paper applies machine learning to improve routing decisions during graph
  traversal for approximate nearest neighbor search.


  ## Key Contributions


  - Learned routing function replaces heuristic graph traversal

  - Improves search quality through data-driven navigation

  - Compatible with existing graph-based indexes

  - Published in ICML 2019


  ## Publication


  - **Venue**: ICML 2019

  - **Authors**: Baranchuk et al.
