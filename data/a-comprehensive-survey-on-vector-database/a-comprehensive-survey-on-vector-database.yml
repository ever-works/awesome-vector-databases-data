name: A Comprehensive Survey on Vector Database
description: ArXiv 2023 survey categorizing ANN algorithms
  (hash/tree/graph/quantization) for vector databases,
  architecture/storage/retrieval techniques, LLM integration. Details
  theory/practice gaps in ANNS accuracy-scalability trade-offs. Use cases
  include academic selection of ANN methods; compares algorithmic depth with
  VLDB system surveys and NeurIPS benchmarks.
source_url: https://arxiv.org/abs/2310.11703
category: Research Papers Surveys
tags:
  - ANN Theory
  - Index Survey
  - Academic Review
featured: true
markdown: >-
  ## Overview


  Comprehensive review of vector database technologies focusing on core ANN
  search algorithms.


  ## Features


  - ANNS categorization: hash/tree/graph/quantization-based

  - Vector DB architecture and storage models

  - Retrieval techniques and LLM integration

  - Challenges in high-dimensional search


  ## Theory/Practice Gaps


  - Optimal theoretical indexes vs real-world filtering support

  - Static batch indexing vs online/dynamic updates

  - Exact NN theory vs approximate practical deployments


  ## Use Cases


  - Academic reviews of ANN literature

  - Selecting index types for research prototypes

  - Understanding LLM-vector DB synergies


  ## Comparisons


  | Aspect | This Survey | VLDB VDBMS | NeurIPS BigANN |

  |--------|-------------|-------------|----------------|

  | Scope | Algorithms + systems | Full systems | Algorithms only |

  | ANN Coverage | Broad categories | Indexing subset | Billion-scale perf |


  ## Publication


  ArXiv:2310.11703 (2023)
