markdown: >-
  ## Overview


  AtlasDB is a distributed, transactional key-value store developed by Palantir
  Technologies. While not specifically a vector search engine, it is often
  mentioned in comparison with vector databases for its high performance and
  scalability when dealing with large-scale data.


  ## Key Features


  - **Distributed and transactional**: Allows for horizontal scaling across
  multiple nodes while ensuring data consistency through ACID transactions.

  - **High performance**: Provides low-latency reads and writes even when
  dealing with large-scale data.

  - **Language support**: Supports Java and Python libraries for easy
  integration with various applications and programming languages.

  - **General-purpose storage**: Designed for broad data storage use cases
  beyond specialized vector similarity search.


  ## Use Cases


  - General-purpose distributed data storage requiring strong consistency

  - Applications needing ACID-compliant transactions at scale

  - Systems requiring horizontal scalability across multiple nodes


  ## Pricing


  Open-source and available on GitHub under the Apache 2.0 license.
