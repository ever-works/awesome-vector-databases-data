name: PQk-means
description: An efficient clustering method for billion-scale feature vectors
  that compresses input vectors into short product-quantized (PQ) codes to
  achieve fast and memory-efficient clustering. PQk-means can cluster one
  billion 128D SIFT features in 14 hours using just 32 GB of memory.
source_url: https://yusukematsui.me/project/pqkmeans/pqkmeans.html
category: SDKs & Libraries
tags:
