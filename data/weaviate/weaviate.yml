name: Weaviate
description: "Weaviate is an open-source, AI-native vector database that stores
  data objects and vectors, enabling semantic search with structured filtering
  and graph-like connections. Features include modular search operators (vector,
  hybrid, BM25), auto-vectorization via integrated models (OpenAI, HuggingFace),
  GraphQL/REST/gRPC APIs, and cloud-native scalability. Ideal for knowledge
  graphs, Q&A systems, agentic AI. Vs Milvus: stronger on schema-aware search
  and ML integrations; vs Pinecone: open-source with local dev support."
source_url: https://weaviate.io/
