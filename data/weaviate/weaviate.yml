name: Weaviate
description: Weaviate is an open-source vector database that combines vector
  search with structured data filtering using GraphQL. Key features include
  modular storage, hybrid search (vector + keyword), and built-in modules for
  embeddings and LLM integration. Suited for knowledge graphs and semantic
  search; more developer-friendly than Milvus with easier GraphQL API, but less
  optimized for ultra-high throughput.
source_url: https://weaviate.io/
category: Vector Database Engines
tags:
