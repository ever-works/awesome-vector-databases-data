name: Weaviate
description: Weaviate is an open-source, cloud-native vector database that
  combines vector search with structured data querying via GraphQL. Features
  include modular vectorization modules, hybrid search (vector + keyword), and
  multi-tenancy support. Suited for knowledge graphs, semantic search, and LLM
  apps; stands out from Qdrant with stronger GraphQL integration and easier
  hybrid filtering.
source_url: https://weaviate.io/
category: Multimodal Vector DBs
tags:
