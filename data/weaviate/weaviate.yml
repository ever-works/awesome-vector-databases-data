name: Weaviate
description: Weaviate is an open-source vector database that combines vector
  search with structured data filtering and GraphQL API. It supports multimodal
  data, hybrid search (vector + keyword), and modules for integrations like
  OpenAI and custom ML models. Use cases include knowledge graphs and enterprise
  RAG; differentiates from Pinecone by being self-hosted with strong hybrid
  capabilities.
source_url: https://weaviate.io/
