name: Weaviate
description: "Weaviate is an open-source vector database with built-in ML
  modules for vectorization, combining vector search with structured data
  querying via GraphQL. Features: modular plugins (e.g., OpenAI, Cohere
  embeddings), hybrid search, multi-tenancy, and cloud-native deployment. Use
  cases: knowledge graphs, Q&A systems, multimodal search. Compared to Qdrant
  (Rust-based performance focus), Weaviate excels in schema-aware and generative
  search; more feature-rich than Chroma for production."
source_url: https://weaviate.io/
category: Open Source Vector Databases
