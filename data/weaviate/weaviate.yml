name: Weaviate
description: Weaviate is an open-source, cloud-native vector database with
  GraphQL API, combining vector search with structured filtering and knowledge
  graphs. Features modules for auto-embedding, hybrid search, and multi-tenancy.
  Ideal for enterprise RAG and semantic apps; more feature-rich than Chroma for
  complex queries vs Qdrant's speed focus.
