name: Weaviate
description: Weaviate is an open-source vector database with semantic and hybrid
  search capabilities, using HNSW indexing for fast ANN on embeddings and
  supporting GraphQL queries with modules for auto-vectorization. Implemented
  primarily in Go, it excels in knowledge graphs, semantic apps, local RAG
  prototyping, and LLM integrations. Offers richer ML modules than Chroma for
  prototyping but trails Qdrant in raw Rust performance and Milvus in
  distributed scale.
source_url: https://weaviate.io/
category: Open Source Vector Databases
tags:
