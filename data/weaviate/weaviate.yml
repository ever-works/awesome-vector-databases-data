name: Weaviate
description: Weaviate is an open-source, cloud-native vector database with
  GraphQL API, supporting hybrid search (vector+keyword), modules for ML
  integrations. It features HNSW indexing and auto-vectorization. Excels in
  knowledge graphs and multimodal RAG; vs Qdrant more schema-aware and modular.
