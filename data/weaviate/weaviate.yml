featured: false
markdown: >-
  ## Overview


  Open-source AI-native vector database designed for scalable semantic search
  and knowledge graphs, with GraphQL API and modular extensions.


  ## Features


  - GraphQL API for querying

  - Hybrid search: vector similarity + keyword (BM25)

  - Modules ecosystem for ML integrations (e.g., text2vec, auto-classification)

  - Multi-tenancy support

  - Deployment flexibility: self-hosted, cloud (Weaviate Cloud),
  embedded/serverless

  - HNSW indexing, structured filtering


  ## Use Cases


  - Semantic search applications

  - Knowledge graphs and RAG pipelines

  - Multimodal data retrieval


  ## Pricing


  Free and open-source (BSD-3-Clause license). Enterprise support via Weaviate
  Cloud.
