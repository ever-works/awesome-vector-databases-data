name: Weaviate
description: Weaviate is an open-source vector database that combines vector
  search with structured data filtering, supporting hybrid search (vector +
  keyword) and multimodal data. It offers GraphQL/REST APIs, modular plugins for
  embeddings and modules like transformers, and cloud-hosted options. Use cases
  include knowledge graphs, Q&A systems, and agentic AI; compares favorably to
  Qdrant for graph capabilities and Pinecone for open-source flexibility.
source_url: https://weaviate.io/
category: Vector Database Engines
tags:
