name: Weaviate
description: "Weaviate is an open-source, AI-native vector database that
  combines vector search with structured filtering, GraphQL API, and modular ML
  integrations for semantic search and knowledge graphs. It supports HNSW
  indexing, hybrid search (vector + keyword), multi-tenancy, and auto-embedding
  modules (e.g., OpenAI, HuggingFace); deployable on-prem, cloud, or serverless.
  Key use cases: RAG, question-answering, personalization; excels in multimodal
  data vs. pure vector DBs like Pinecone by adding schema and modules, but less
  specialized for ultra-high scale without clustering."
source_url: https://weaviate.io/
