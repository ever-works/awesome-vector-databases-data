name: Weaviate
description: Weaviate is a cloud-native, open-source vector database that
  enables semantic search with hybrid capabilities including vector, keyword,
  and graph search. It stores objects with rich metadata, supports modules for
  integrations like transformers and Q&A, and scales horizontally for production
  AI use cases like knowledge graphs and chatbots. Unlike pure vector stores, it
  provides GraphQL API and multi-tenancy; superior for multimodal data vs.
  simpler embeddings stores.
