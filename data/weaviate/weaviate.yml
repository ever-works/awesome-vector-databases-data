name: Weaviate
description: "Weaviate is an open-source vector database that combines vector
  search with structured filtering, knowledge graphs, and modular plugins for
  LLMs/modules. Key features: HNSW indexing, hybrid search (vector+keyword),
  GraphQL API, auto-schema, multi-tenancy, and cloud-native scaling. Suited for
  semantic search, RAG, and agentic AI; vs Qdrant, more modular with stronger
  graph capabilities; vs Pinecone, open-source alternative with self-hosting."
source_url: https://weaviate.io/
category: Vector Database Engines
tags:
