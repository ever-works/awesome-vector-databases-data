name: Weaviate
description: Weaviate is an open-source, AI-native vector database that stores
  data objects and vectors with modular plugins for embeddings, search modules
  (e.g., BM25 hybrid), and ML integrations. It supports GraphQL/REST APIs,
  multi-tenancy, and replication for scalability. Suited for knowledge graphs,
  semantic search, and generative AI workflows; differentiates from Qdrant with
  built-in ML modules and schema-based data modeling.
source_url: https://weaviate.io/
category: Vector Databases
