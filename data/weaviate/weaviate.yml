name: Weaviate
description: "Open-source vector DB with GraphQL API, hybrid search
  (vector+keyword), modules for ML integrations. Features: multi-tenancy,
  auto-classification, cloud/embedded. Use cases: Knowledge graphs, semantic
  search. Vs Milvus: more schema-aware; vs pgvector: full DB not extension."
