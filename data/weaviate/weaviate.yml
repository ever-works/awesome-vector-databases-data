featured: false
markdown: >-
  ## Overview


  Weaviate is an open-source, cloud-native vector database for AI-native
  applications.


  ## Features


  - Hybrid Search: Vector + keyword

  - Modular Extensions: Embeddings, classification

  - RAG and Generative AI support

  - GraphQL API

  - Fast Vector Similarity Search


  ## Pricing


  Free open-source.
