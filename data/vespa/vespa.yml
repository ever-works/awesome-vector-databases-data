markdown: >-
  ## Overview


  Vespa is an open-source big data serving engine originally built at Yahoo. It
  enables vector search, tensor computations, text search, and structured data
  queries within a single unified platform, designed for billion-scale retrieval
  workloads.


  ## Key Features


  - **Vector Search**: Approximate nearest neighbor (ANN) algorithms with
  multiple distance metrics

  - **Tensor Computations**: First-class support for tensor operations at query
  time

  - **Text Search**: Traditional keyword and phrase-based text search

  - **Structured Data Queries**: Filtering and querying of structured metadata

  - **Unified Platform**: All search capabilities integrated in one engine

  - **Real-Time**: Immediate visibility of new and updated data

  - **Scalable**: Proven at billion-scale with major enterprises


  ## Performance


  - **Scale**: Billions of documents and vectors

  - **Latency**: Sub-100ms response times

  - **Throughput**: Thousands of queries per second

  - **High Concurrency**: Designed for large-scale serving


  ## Deployment Options


  ### Open Source (Apache 2.0)

  - Self-hosted deployment

  - Full feature set

  - Community support


  ### Vespa Cloud

  - Fully managed service

  - Auto-scaling and optimization

  - Enterprise support and SLA


  ## Use Cases


  - Semantic search at scale

  - Recommendation engines

  - Personalized content delivery

  - Enterprise knowledge search

  - Real-time analytics


  ## Machine Learning Integration


  - Deploy ML models directly in Vespa

  - ONNX model support

  - Feature computation at query time

  - A/B testing capabilities


  ## Pricing


  ### Open Source

  Free under Apache 2.0 license.


  ### Vespa Cloud

  Usage-based pricing with free tier for small projects. Scales with resource
  usage. Enterprise plans with SLA available.
