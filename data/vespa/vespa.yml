name: Vespa
description: Vespa is a big data serving engine with built-in vector search,
  tensor computations, and real-time ML serving. Supports HNSW/ANN, phased
  ranking, and multi-phase retrieval for complex queries. Suited for large-scale
  search apps like recommendations; more feature-rich than Qdrant with native
  tensor ops but steeper learning curve.
source_url: https://vespa.ai/
category: Vector Databases
tags:
