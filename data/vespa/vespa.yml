name: Vespa
description: Vespa is a big data serving engine with built-in vector search (ANN
  with HNSW), real-time updates, and hybrid ranking (ML models + vectors). Used
  by Yahoo for search ads; supports tensors and ranking phases. Differentiates
  from Weaviate by stronger ML serving and tensor compute vs GraphQL focus.
