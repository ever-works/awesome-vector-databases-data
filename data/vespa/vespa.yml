name: Vespa
description: "Vespa is an open-source big data serving engine for low-latency
  search/recommendation on structured + vector data, with hybrid ANN + lexical
  search, tensor computations, and real-time ML models. Features: multi-phase
  ranking, SQL-like YQL, Kubernetes deployment. Use cases: e-commerce search,
  news personalization. Vs Elasticsearch: native vectors/tensors; vs Pinecone:
  full-text + vectors."
