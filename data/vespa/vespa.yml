name: Vespa
description: "Vespa is a big data serving engine with built-in vector search
  (ANN/HNSW), real-time ML serving, hybrid ranking (vector+lexical). Suited for
  search engines/apps like recommendations; vs Elasticsearch more ML-focused.
  Features: tensor compute, autoscaling."
