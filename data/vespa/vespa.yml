name: Vespa
description: Vespa is an open-source big data serving engine from Yahoo,
  combining vector search, lexical search, and ML inference with real-time
  updates and ranking. Supports HNSW indexing, tensor computations, and cloud
  deployment. Excels in e-commerce search and recommendations; more feature-rich
  than pure vector DBs like Qdrant with built-in ML serving.
