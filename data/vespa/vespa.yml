name: Vespa
description: Vespa is an open-source big data serving engine in C++/Java for
  low-latency vector search using HNSW-like ANN, hybrid ranking, and tensor
  computations on embeddings. Supports real-time updates and multi-phase
  retrieval for production search. Ideal for large-scale semantic search and
  recommendations; more comprehensive ranking than Weaviate, comparable to
  Milvus for scale but with steeper setup vs Qdrant.
source_url: https://vespa.ai/
