name: Vespa
description: Vespa is an open-source big data serving engine combining vector
  search, lexical search, and ML models in real-time with SQL-like queries.
  Supports tensor computations, ranking, and horizontal scaling. For large-scale
  recommendation systems and semantic search; more feature-rich than Qdrant with
  built-in ranking.
source_url: https://vespa.ai/
category: Vector Databases
tags:
  - real-time
  - ranking
  - tensor
  - open-source
featured: false
markdown: >-
  ## Overview


  Vespa is a platform for hybrid search including vectors.


  ## Features


  - High accuracy for hybrid use cases

  - Optimized indexing for structured/unstructured data

  - Custom ranking algorithms

  - Support for mixed workloads


  ## Pricing


  Cost-effective for self-hosting as open-source; resource-intensive for large
  clusters.
