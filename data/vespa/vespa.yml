name: Vespa
description: Vespa is an open-source platform for scalable ML serving, vector
  search, and recommendations, combining HNSW ANN indexing with real-time tensor
  computations, ranking models, and structured data queries. Supports billions
  of vectors, phased ranking, multi-phase retrieval, and deployments on
  cloud/K8s; features built-in grouping/aggregation. Ideal for e-commerce
  search, news personalization; differentiates from Weaviate with stronger
  ranking/ML inference and from Pinecone via open-source extensibility but
  requires more setup.
source_url: https://vespa.ai/
category: Vector Databases
