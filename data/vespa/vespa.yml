name: Vespa
description: Vespa is an open-source big data serving engine with advanced
  vector search, ranking, and ML integration for real-time apps. Supports HNSW,
  ANN, and tensor computations with SQL-like YQL. Powers Yahoo-scale search;
  more feature-rich for ranking than pure vector DBs like Qdrant.
