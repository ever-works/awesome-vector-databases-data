markdown: >-
  ## Overview


  Inference delivers OpenAI-compatible serverless inference APIs for top
  open-source LLM models, offering developers the highest performance at the
  lowest cost in the market.


  ## Features


  - **OpenAI-Compatible APIs**: Drop-in replacement for OpenAI APIs, supporting
  top open-source LLM models

  - **Serverless Inference**: No infrastructure management required; pay for
  what you use

  - **Batch Processing**: Specialized batch processing for large-scale async AI
  workloads

  - **Document Extraction**: Built-in document extraction capabilities designed
  explicitly for RAG applications

  - **Cost-Efficient**: State-of-the-art language models that balance
  cost-efficiency with high performance

  - **Free Tier**: Start building with $10 in free API credits


  ## Pricing


  Pay-as-you-go with serverless pricing model. New users receive $10 in free API
  credits to get started.
