markdown: >-
  ## Overview


  NVIDIA NIM is a set of accelerated inference microservices that allow
  organizations to run AI models on NVIDIA GPUs anywhere—in the cloud, data
  center, workstations, and PCs.


  ## Key Features


  NIM microservices come with everything AI teams need—the latest AI foundation
  models, optimized inference engines, industry-standard APIs, and runtime
  dependencies—prepackaged in enterprise-grade software containers ready to
  deploy and scale anywhere.


  NIM microservices expose industry-standard APIs for simple integration into AI
  applications, development frameworks, and workflows and optimize response
  latency and throughput for each combination of foundation model and GPU.


  ## Recent 2026 Developments


  NVIDIA announced NIM microservices for AI models that can generate OpenUSD
  language to answer user queries, generate OpenUSD Python code, apply materials
  to 3D objects, and understand 3D space and physics to help accelerate digital
  twin development. This announcement was made in January 2026.


  The new USD-focused NIM microservices include:

  - USD Code NIM microservice — answers general knowledge OpenUSD questions and
  automatically generates OpenUSD-Python code based on text prompts

  - USD Search NIM microservice — enables developers to search through massive
  libraries of OpenUSD, 3D and image data using natural language or image inputs

  - USD Layout, USD SmartMaterial, and various fVDB (physics and rendering)
  microservices


  ## Enterprise Adoption


  Foxconn, a global manufacturing leader with more than 170 factories worldwide,
  is already benefiting from NVIDIA's computing platform, using NIM
  microservices and Omniverse for their operations.


  ## Pricing


  Enterprise licensing, contact NVIDIA for details.
