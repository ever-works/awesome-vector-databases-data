name: ruvector-onnx-embeddings
description: Production-ready ONNX embedding generation in pure Rust using ONNX
  Runtime, no Python required. Supports 8+ pretrained models including
  all-MiniLM-L6-v2, BGE, E5, GTE with pooling strategies and GPU acceleration
  (CUDA, TensorRT, CoreML, WebGPU). Enables direct integration with RuVector
  indices for RAG pipelines and semantic similarity computation.
