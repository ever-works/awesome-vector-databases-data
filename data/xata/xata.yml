markdown: >-
  ## Overview


  Xata is a serverless data platform based on PostgreSQL that provides
  comprehensive database functionality for modern applications. It offers an
  intuitive and scalable relational database with a powerful real-time search
  engine, vector database, and ChatGPT integration built right in.


  ## Vector Search Capabilities


  Xata has a native vector type that can be added to any table and supports
  similarity search. The platform integrates seamlessly with LangChain,
  inserting vectors directly to Xata and querying for the nearest neighbors of a
  given vector, enabling use of all LangChain Embeddings integrations.


  ## Key Features


  - **Native Vector Type**: Built-in support for vector columns with similarity
  search

  - **Full-Text Search**: Typo-tolerant search engine integrated with vector
  capabilities

  - **Database Branching**: GitHub-style branching for database schemas and
  migrations

  - **Type-Safe SDKs**: TypeScript, JavaScript, and Python SDKs with code
  generation

  - **File Attachments**: Native support for file storage alongside structured
  data

  - **Preview Branches**: Each pull request creates a data-filled preview branch
  that integrates with Vercel deployment previews


  ## Developer Experience


  Provides a UI for managing data and a type-safe TypeScript/JavaScript SDK for
  interacting with your database. Seamless integration with Vercel and Netlify
  platforms for modern web applications.


  ## Integration Support


  - LangChain vector store integration

  - LlamaIndex support

  - Vercel and Netlify integrations

  - GitHub-based workflow for migrations


  ## Use Cases


  - RAG (Retrieval-Augmented Generation) applications

  - Semantic search engines

  - Modern web applications requiring both relational and vector data

  - AI-powered chatbots and assistants


  ## Pricing


  Serverless pricing model with pay-as-you-go options. Free tier available for
  development and small projects.
