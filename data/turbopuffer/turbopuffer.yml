name: Turbopuffer
description: Turbopuffer is a serverless, cloud-hosted vector database with
  managed paged storage, auto-scaling HNSW indexes, deterministic pay-per-use
  pricing, metadata filtering, and backups. Optimized for enterprise RAG and
  production AI apps with long-term, cost-efficient storage at scale. More
  economical operations than self-hosted Milvus or Zilliz Cloud for massive
  indexes.
