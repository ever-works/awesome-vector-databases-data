name: Turbopuffer
description: Turbopuffer is a serverless vector database built on object
  storage, separating compute from storage for cost-efficient high performance
  using chunk compression and lazy loading. It supports scalability to billions
  of vectors with pay-per-use pricing. Suited for RAG and recommendation
  systems; significantly cheaper than Pinecone for large datasets while
  maintaining low latency.
source_url: https://turbopuffer.com/
