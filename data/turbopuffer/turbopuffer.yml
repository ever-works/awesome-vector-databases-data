markdown: >-
  ## Overview


  Turbopuffer is a managed serverless vector database designed for multi-tenant
  SaaS products.


  ## Key Features


  - No enforced namespace limits

  - Cheapest managed option

  - Usage-based pricing


  ## Pricing


  Usage-based, $64/mo minimum. No free tier.
