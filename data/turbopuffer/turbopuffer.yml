name: Turbopuffer
description: Turbopuffer is a serverless vector database focused on
  cost-efficiency with deterministic pricing, paged storage, and HNSW indexes
  without cold starts. Supports metadata filtering and backups. Optimized for
  long-term storage; cheaper than Pinecone for large indexes.
