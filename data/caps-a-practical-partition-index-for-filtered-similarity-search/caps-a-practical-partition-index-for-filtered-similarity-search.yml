name: "CAPS: A Practical Partition Index for Filtered Similarity Search"
description: Research paper introducing CAPS, a practical partition index
  designed for filtered similarity search. Published as an arXiv preprint in
  2023 by Gaurav Gupta et al., it addresses the challenge of combining attribute
  filtering with approximate nearest neighbor search efficiently.
