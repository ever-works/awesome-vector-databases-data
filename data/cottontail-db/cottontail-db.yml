name: Cottontail DB
description: Cottontail DB is a column store aimed at multimedia retrieval,
  allowing classical boolean as well as vector-space retrieval (nearest
  neighbour search) using a unified data and query model.
source_url: https://cottontaildb.com/
category: Vector Databases
tags:
  - open-source
  - column-store
  - multimedia
featured: false
markdown: |-
  ## Features

  - Indexing methods: VAF, PQ, LSH, and more
  - Large range of distance functions
  - Arithmetic vector operations
  - Free-text search
  - Relational data entities for metadata
  - gRPC interface with pre-built clients for Java/Kotlin and Python
