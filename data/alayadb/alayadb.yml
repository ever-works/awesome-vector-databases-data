name: AlayaDB
description: Hybrid database-inference engine that converts documents to tensors
  via LLM forward pass, storing in a KV cache for optimized retrieval. Features
  integrated storage and inference with advanced indexing for fast context
  retrieval in RAG pipelines. Suited for LLM applications and semantic search;
  differs from Milvus by embedding inference, more specialized than Qdrant's
  pure vector storage.
