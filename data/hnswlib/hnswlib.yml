name: HNSWLIB
description: HNSWLIB is a pure ANN index library implementing Hierarchical
  Navigable Small World (HNSW) graphs for high-performance approximate nearest
  neighbor search. Features L2/cosine metrics, multi-threading, low memory,
  C++/Python bindings. Ideal for custom vector engines, benchmarks on millions
  of vectors; core building block for DBs like Qdrant/Chroma vs complete
  solutions.
source_url: https://github.com/nmslib/hnswlib
category: ANN Indexing Libraries
tags:
  - Pure ANN
  - Index Only
  - Benchmark Tool
featured: false
markdown: >-
  ## Features


  - Fast query performance

  - Support for multi-core parallelism

  - Custom distance metrics: Euclidean, Cosine, L1, and more

  - Python and C++ interfaces


  ## Installation and Usage


  HNSWLIB can be installed using pip, and its API is easy to use with Python and
  C++ examples provided in the official repository.
