name: HNSWLIB
description: HNSWLIB is an open-source C++ library for approximate nearest
  neighbor search implementing the Hierarchical Navigable Small World (HNSW)
  algorithm. It is designed for high-performance similarity search in
  large-scale datasets with various distance metrics.
source_url: https://github.com/nmslib/hnswlib
category: Vector Databases
tags:
  - open-source
  - hnsw
  - high-performance
featured: false
markdown: >-
  ## Features


  - Fast query performance

  - Support for multi-core parallelism

  - Custom distance metrics: Euclidean, Cosine, L1, and more

  - Python and C++ interfaces


  ## Installation and Usage


  HNSWLIB can be installed using pip, and its API is easy to use with Python and
  C++ examples provided in the official repository.
