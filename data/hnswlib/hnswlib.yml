name: HNSWLIB
description: HNSWLIB is a high-performance hierarchical navigable small world
  graph library for approximate nearest neighbor search, implementing
  state-of-the-art HNSW algorithm in C++ for speed and low memory use. Supports
  L2, cosine, and inner product metrics; pure library with Python bindings.
  Foundation for many vector DBs like Qdrant/Chroma; ideal for embedded apps
  needing sub-ms queries on millions of vectors, outperforming brute-force by
  orders of magnitude.
source_url: https://github.com/nmslib/hnswlib
category: Libraries
tags:
  - HNSW
