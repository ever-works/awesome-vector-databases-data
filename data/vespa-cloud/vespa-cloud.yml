markdown: >-
  ## Overview


  Vespa Cloud is a fully managed service providing enterprise-scale search and
  AI capabilities. It addresses performance and scale challenges at the
  architectural level with native hybrid search and advanced ranking.


  ## Features


  - **Unified Engine**: Single platform for all search and AI needs

  - **Tensor Support**: Advanced tensor operations for ML models

  - **Multi-Phase Ranking**: Sophisticated ranking pipelines

  - **Hybrid Retrieval**: Blends semantic, textual, and structured signals

  - **Seamless Scaling**: Automatic resource scaling

  - **Real-Time Updates**: Live document updates

  - **Advanced Queries**: Complex query capabilities beyond simple similarity


  ## Performance


  In benchmarks with 50M vectors, Vespa achieved P50 latency of 16ms vs 140ms
  for Milvus at identical infrastructure cost. Consistently ranked top in vector
  database evaluations.


  ## Why Vespa?


  Marqo, a vector search company, chose Vespa as their underlying database after
  benchmarking against Milvus, OpenSearch, Weaviate, Redis, and Qdrant.


  ## Use Cases


  - Enterprise search applications

  - Hybrid search systems

  - Large-scale recommendation engines

  - Production AI applications requiring advanced ranking

  - Multi-modal search


  ## Integration


  Provides APIs and SDKs for multiple languages. Supports ColBERT and other
  advanced retrieval models.


  ## Pricing


  Managed cloud service with usage-based pricing. Free tier available for
  development.
