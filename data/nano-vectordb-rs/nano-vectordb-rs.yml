name: nano-vectordb-rs
description: Minimal Rust library for fast on-device cosine similarity search
  with Rayon parallelism and embedded persistence, ideal for low-latency
  prototyping on edge hardware. Supports quick inserts/queries for real-time AI;
  lighter than full DBs like Qdrant edge.
