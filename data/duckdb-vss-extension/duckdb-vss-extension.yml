name: DuckDB VSS Extension
description: DuckDB extension adding HNSW vector similarity search to analytical
  SQL engine, enabling hybrid queries with ACID-like features on embedded SQL
  infra. Efficient for local analytics+vector vs dedicated VDBs.
source_url: https://duckdb.org/docs/stable/core_extensions/vss
category: Relational Vector Extensions
tags:
