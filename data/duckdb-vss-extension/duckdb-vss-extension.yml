featured: false
markdown: >-
  ## Overview


  Experimental extension adding HNSW indexing for vector similarity using ARRAY
  type.


  ## Key Features


  - HNSW indexes

  - Distance metrics: l2sq, cosine, inner_product


  ## Use Cases


  - AI on analytical data

  - Local RAG


  ## Comparisons


  Embedded SQL vs separate VDB; disk-persistent.


  ## Pricing


  Free OSS.
