name: hnswlib-node
description: "hnswlib-node is the Node.js bindings for HNSWLib, providing fast
  ANN vector search in JavaScript environments with V8 integration for
  high-performance similarity matching. Supports build/query on dense vectors,
  multi-threading; npm installable. Use cases: web apps, serverless JS RAG;
  extends HNSW to Node vs. Python bindings, lighter than full DBs like Chroma
  for JS stacks."
source_url: https://github.com/yoshoku/hnswlib-node
category: Vector Clients & SDKs
