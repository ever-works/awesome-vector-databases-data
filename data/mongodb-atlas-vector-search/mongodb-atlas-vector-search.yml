markdown: |-
  ## Overview

  MongoDB Atlas Vector Search extends MongoDB for vector workloads.

  ## Features

  - Seamless integration in MongoDB ecosystem
  - Works for light vector workloads with traditional DB needs
  - Managed service via Atlas

  ## Limitations

  - Not optimized for high-scale vector workloads
  - Lags in ANN flexibility and vector-specific features

  ## Pricing

  Managed services can be costly for large datasets.
