name: pgvectorscale
description: Timescale extension for pgvector introducing StreamingDiskANN for
  disk-optimized, high-recall ANN search (28x lower p95 latency vs Pinecone),
  with hybrid SQL+vector capabilities. Supports binary quantization, filtered
  queries; scales RAG/analytics to billions on existing Postgres without
  sharding.
