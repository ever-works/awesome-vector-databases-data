name: ruvector-graph
description: Rust crate implementing a hypergraph database with Neo4j-compatible
  Cypher queries and W3C SPARQL support for vector-enhanced knowledge graphs.
  Enables semantic queries combining vector search with graph traversal. Used in
  recommendations, RAG, and multi-hop reasoning applications.
source_url: https://crates.io/crates/ruvector-graph
category: graph-database
tags:
