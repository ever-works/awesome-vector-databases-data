description: "vectordb-from-scratch is a Rust-based learning project
  implementing a vector database from basics, focusing on HNSW indexing
  internals and database fundamentals. Demonstrates core concepts like vector
  storage, ANN search, and persistence. Educational for understanding VDB
  architecture; not production-ready, contrasts full DBs like Qdrant. Use cases:
  tutorials, prototyping indexes."
