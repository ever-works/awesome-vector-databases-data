name: BBQ Binary Quantization
description: Elasticsearch and Lucene's implementation of RaBitQ algorithm for
  1-bit vector quantization, renamed as BBQ. Provides 32x compression with
  asymptotically optimal error bounds, enabling efficient vector search at
  massive scale with minimal accuracy loss.
