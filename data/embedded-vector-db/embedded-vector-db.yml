name: embedded-vector-db
description: Lightweight npm package providing an embedded vector database for
  Node.js applications. Offers vector similarity search with HNSW, BM25
  full-text search, hybrid search using weighted fusion or Reciprocal Rank
  Fusion (RRF), multi-namespace support, CRUD operations, metadata filtering,
  concurrency safety, and persistent storage to disk. Designed for RAG pipelines
  and semantic search use cases.
