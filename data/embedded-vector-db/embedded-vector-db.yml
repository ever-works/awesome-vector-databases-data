name: embedded-vector-db
description: Lightweight Node.js library for low-latency on-device vector
  similarity search using HNSW and BM25 hybrid, with CRUD, metadata filtering,
  and persistence for edge RAG pipelines. Enables real-time semantic search
  without servers; more lightweight than cloud Qdrant.
source_url: https://github.com/pguso/embedded-vector-db
category: Embedded & Edge Vector Databases
