name: RediSearch
description: "Redis Stack with vector search via RediSearch module, HNSW/Flat
  indexes on in-memory store. Features: Hybrid BM25+vector, real-time cache,
  multi-tenancy. Use cases: Caching LLM responses, high-throughput RAG.
  Comparisons: Faster than disk DBs for hot data; vs Memgraph: simpler
  key-value."
source_url: https://github.com/RediSearch/RediSearch
category: In-Memory Hybrid Vector Stores
