name: RediSearch
description: "Redis module for full-text, vector k-NN (HNSW), hybrid search with
  BM25 fusion, geospatial. Lucene-inspired for enterprise real-time apps.
  Integrated vs standalone vector DBs: versatile multi-model but memory-bound."
