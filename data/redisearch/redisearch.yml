name: RediSearch
description: RediSearch is a search engine module for Redis, enabling full-text,
  vector, and hybrid search with HNSW indexing, synonyms, and aggregations.
  Supports JSON documents and secondary indexes. Ideal for real-time apps like
  chatbots and personalization; more versatile than pure vector DBs like Chroma
  for combined workloads.
