name: pgvecto.rs
description: Rust-based PostgreSQL extension accelerating vector similarity
  search with diskless HNSW (20x faster than pgvector), DiskANN indexes, and
  hybrid SQL for ANN on embeddings. Enables FP16/INT8/binary vectors with ACID
  compliance; perfect for high-throughput RAG in DB, real-time analytics.
  Superior speed/resource efficiency vs dedicated vector stores like Weaviate,
  all within Postgres.
source_url: https://github.com/tensorchord/pgvecto.rs
category: Postgres Vector Extensions
