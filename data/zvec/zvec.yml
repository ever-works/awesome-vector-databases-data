markdown: >-
  ## Overview


  Zvec is a lightweight embedded vector database designed for RAG systems. It is
  useful in edge environments where applications run directly on devices such as
  laptops, embedded systems, or IoT devices.


  ## Key Features


  ### Local Execution


  Since everything runs locally, vector search can be performed:

  - Without network latency

  - Without cloud dependencies

  - Allowing the system to function even when offline


  ### Lightweight Design


  Optimized to run on resource-constrained devices while maintaining good
  performance for vector similarity search operations.


  ### RAG System Integration


  Specifically designed to support Retrieval-Augmented Generation (RAG) systems
  in edge computing scenarios.


  ## Edge Environment Benefits


  - **No Cloud Required**: Complete functionality without internet connection

  - **Low Latency**: All operations happen locally

  - **Privacy**: Data never leaves the device

  - **Cost Effective**: No cloud infrastructure costs


  ## Use Cases


  - Edge AI applications requiring local RAG

  - Laptop-based AI assistants

  - Embedded systems with AI capabilities

  - IoT devices with semantic search

  - Development and testing of RAG systems offline


  ## Pricing


  Free and open-source.
