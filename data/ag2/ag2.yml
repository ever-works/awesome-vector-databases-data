markdown: >-
  ## Overview


  AG2 evolved from Microsoft's AutoGen and is an open-source programming
  framework for building AI agents and facilitating cooperation among multiple
  agents to solve tasks. AG2 is basically AutoGen 0.2.34 continuing under a new
  name, now at version 0.3.2.


  ## The Split


  The earliest contributors and creators of AutoGen moved away from the official
  Microsoft repo and rebranded their version as AG2. A new organization AG2AI
  was created to host the development of AG2 and related projects with open
  governance, while Microsoft announced AutoGen v0.4—a significant milestone
  that represents a complete redesign of the AutoGen library.


  ## Current State in 2026


  The v0.4 rewrite, now called AG2, rearchitected with an event-driven core,
  async-first execution, and pluggable orchestration strategies. AG2 started as
  Microsoft's AutoGen — one of the earliest and most influential multi-agent
  frameworks — and then got spun out as an independent open-source project.


  AutoGen/AG2 is at medium production readiness as the AG2 rewrite is maturing,
  though AG2 is not production-ready for most enterprise use cases, with no
  first-party observability platform.


  ## Microsoft's Direction


  In October 2025, Microsoft merged AutoGen and Semantic Kernel into a unified
  Microsoft Agent Framework, bringing native Azure Active Directory identity,
  role-based access control, SOC 2 and HIPAA compliance, production SLAs, and
  multi-language support.


  ## Pricing


  Open-source under Apache 2.0 license.
