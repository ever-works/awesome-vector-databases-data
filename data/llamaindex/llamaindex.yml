name: LlamaIndex
description: LlamaIndex is a Python data framework library for vector search and
  embedding retrieval, integrating various ANN indexes like HNSW and FAISS
  without full database dependencies. Supports quantization, multi-modal
  embeddings, and advanced query engines in Python/Rust backends. Great for
  prototyping LLM apps and embedded RAG; more developer-friendly and lighter
  than Milvus, composable vs hnswlib.
