markdown: >-
  ## Overview


  LlamaIndex provides tools for connecting LLMs with data sources using vector
  embeddings and retrieval.


  ## Features


  - Multiple vector store integrations

  - Data connectors

  - Query engines for RAG


  ## Pricing


  Free and open-source.
