name: JVector
description: Java-based graph index for approximate nearest neighbor search that
  combines HNSW hierarchical structure with Vamana from DiskANN. Supports
  disk-based storage, two-pass searches with quantization (PQ, BQ, NVQ),
  non-blocking concurrency, and larger-than-memory index construction. Designed
  for high-dimensional vector similarity search in AI applications.
