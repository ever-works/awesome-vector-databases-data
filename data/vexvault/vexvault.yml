name: Vexvault
description: Vexvault is a 100% browser-based document storage system designed
  to make files and data accessible to AI applications like ChatGPT while
  ensuring user privacy and security. It aims to be easy to integrate and use.
source_url: https://github.com/vexvault/vexvault
category: Vector Databases
tags:
  - open-source
  - browser-based
  - privacy-focused
featured: false
markdown: |-
  ## Features

  - 100% browser based
  - Based on HNSWlib + indexeddb
  - Zero-cost
  - Scalability by pushing embedding calculation to the edge
  - Fast, because it can omit the network
  - Large amount of storage through use of indexeddb
