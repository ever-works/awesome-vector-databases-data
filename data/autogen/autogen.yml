name: AutoGen
description: Microsoft's open-source framework for multi-agent conversations
  with tool use, memory persistence, and vector retrieval integration for
  collaborative LLM agents and chat systems.
source_url: https://github.com/microsoft/autogen
category: LLM Frameworks
tags:
  - LLM Vector Store
  - Agentic AI
  - Tool Integration
markdown: >-
  ## Overview


  AutoGen enables multi-agent systems where agents converse, use tools, and
  retrieve from vector stores.


  ## Vector Integration


  Supports retrieval from vector DBs via tool calling and custom functions,
  e.g., Qdrant retrievers in agent loops.


  ## Features


  - **Tool Calling**: Code execution, API calls, custom functions

  - **Memory**: Conversation history, group chat memory

  - **Agents**: Customizable agents with LLM backends


  ## Use Cases


  - Group chat agents for complex problem-solving

  - Tool-using chatbots

  - Collaborative task agents


  ## Comparisons


  AutoGen emphasizes conversational multi-agent vs LangChain's structured
  chains.


  ## Pricing


  Open-source (Apache 2.0).
