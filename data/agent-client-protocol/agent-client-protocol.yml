markdown: >-
  ## Overview


  The Agent Client Protocol (ACP) is a standardized protocol that allows AI
  coding assistants to integrate with various integrated development
  environments (IDEs).


  ## Cursor Integration (March 2026)


  In March 2026, Cursor joined the ACP Registry and became available in IntelliJ
  IDEA, PyCharm, WebStorm, and other JetBrains IDEs. This allows developers who
  rely on JetBrains for Java and multilanguage support to use any frontier model
  from OpenAI, Anthropic, Google, and Cursor for agent-driven development.


  ## Benefits


  - **IDE Flexibility**: Use preferred AI assistants across different IDEs

  - **Model Choice**: Access to multiple frontier models

  - **Workflow Continuity**: Maintain existing development workflows

  - **Ecosystem Growth**: Standardized protocol enables more integrations


  ## Technical Details


  ACP provides a standardized interface for:

  - Code completion

  - Code generation

  - Refactoring assistance

  - Documentation generation

  - Error detection and fixing


  ## Industry Impact


  ACP is helping standardize AI coding assistant integration, similar to how the
  Language Server Protocol (LSP) standardized language tooling.


  ## Pricing


  Open protocol, free to implement.
