markdown: >-
  ## Overview


  Langtrace is an open-source observability software that lets you capture,
  debug and analyze traces and metrics from all your applications, automatically
  capturing traces from LLM APIs/inferences, Vector Databases, and LLM-based
  Frameworks.


  ## OpenTelemetry Integration


  Langtrace leverages OpenTelemetry standard traces across the most popular
  frameworks, LLMs, and vector databases to better understand the pathways and
  transformations within your LLM applications.


  ## Key Features


  - Built with OpenTelemetry standards, avoiding vendor lock-in

  - Integration with any observability platform: Signoz, Grafana, Datadog,
  Splunk, Logz

  - Native tracing for over 30 popular providers

  - Open source SDKs for capturing OpenTelemetry traces from LLM frameworks,
  vectorDBs and LLM providers

  - End-to-end observability for LLM-powered applications

  - Data privacy protection through self-hosting capability


  ## Semantic Conventions


  Actively developing semantic conventions for:

  - LLM clients

  - Vector databases

  - Agentic frameworks


  ## Recent Contributions


  First official OpenAI instrumentation package that is part of the official
  OpenTelemetry contrib repository is live, contributed by Langtrace.


  ## Enterprise Features


  Fully open sourced, enterprises can self-host and leverage Langtrace for
  end-to-end observability while protecting data privacy and ensuring effective
  use of underlying LLMs.
