markdown: >-
  ## Overview


  TruLens is a comprehensive evaluation and observability platform for LLM
  applications, with strong support for RAG system assessment and debugging.


  ## Core Features


  **Evaluation**:

  - Context relevance scoring

  - Groundedness detection

  - Answer relevance metrics

  - Custom feedback functions


  **Observability**:

  - Trace all components

  - Track retrieval paths

  - Monitor LLM calls

  - Visualize data flow


  **Guardrails**:

  - Detect hallucinations

  - Filter inappropriate content

  - Enforce quality thresholds


  ## RAG-Specific Features


  - Retrieval quality assessment

  - Context utilization tracking

  - Chunk relevance scoring

  - Multi-hop reasoning evaluation


  ## Integration


  Works with:

  - LangChain

  - LlamaIndex

  - OpenAI

  - Anthropic

  - HuggingFace


  ## Use Cases


  - Production RAG monitoring

  - Development debugging

  - Quality assurance

  - Performance optimization


  ## Availability


  Open-source with managed service option
