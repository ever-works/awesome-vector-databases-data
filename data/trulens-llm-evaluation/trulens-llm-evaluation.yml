name: TruLens
description: An evaluation framework for LLM applications including RAG systems,
  providing observability, debugging, and guardrails. TruLens tracks retrieval
  quality, LLM performance, and hallucinations with detailed tracing.
source_url: https://www.trulens.org/
category: Tools
