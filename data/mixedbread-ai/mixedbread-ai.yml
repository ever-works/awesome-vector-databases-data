markdown: >-
  ## Overview


  Mixedbread AI is an AI startup that provides open-source as well as in-house
  embedding and reranking models, allowing developers to choose from various
  foundation models best suited for their use cases.


  ## Products


  ### Embeddings API

  - Access to state-of-the-art models for vector generation

  - Multiple foundation model options

  - Optimized for different domains and languages

  - High-performance inference


  ### Reranking Models

  - Advanced reranking capabilities

  - Improved search accuracy

  - Integration with embedding pipelines

  - Production-ready performance


  ## Model Selection


  - Open-source models available

  - Proprietary in-house models

  - Domain-specific optimizations

  - Flexible model selection for use case fit


  ## Integrations


  - AI SDK community provider

  - LangChain support

  - LlamaIndex compatibility

  - Haystack integration

  - Standard API interfaces


  ## Use Cases


  - Semantic search applications

  - RAG pipeline optimization

  - Document retrieval systems

  - Multi-language applications

  - Production AI systems


  ## Technical Features


  - REST API access

  - Multiple language support

  - Scalable infrastructure

  - Low-latency inference

  - Flexible deployment options


  ## Pricing


  API-based pricing model, check mixedbread.com for current rates
