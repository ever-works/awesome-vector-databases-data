name: Late Interaction Workshop
description: Community workshop dedicated to late interaction techniques in
  information retrieval, a retrieval approach where fine-grained similarity is
  computed between query and document token-level representations rather than
  single global embeddings. Addresses research in ColBERT, ColPali, MUVERA, and
  related methods.
