name: Elasticsearch
description: Elasticsearch is a distributed search and analytics engine with
  dense vector search capabilities via kNN plugin, supporting hybrid
  lexical+vector queries, approximate search with HNSW, and integrations with
  ELSER for sparse vectors. Scales horizontally with Lucene segments. Ideal for
  log analytics + semantic search; more mature ecosystem than Vespa for
  enterprise logs.
