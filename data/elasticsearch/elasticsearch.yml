name: Elasticsearch
description: Elasticsearch provides vector search via kNN plugin with HNSW/IVF,
  hybrid lexical+vector (BM25+ANN), and Lucene-based dense retrieval. Ideal for
  enterprise search with aggregations and security. Outperforms Vespa in
  ecosystem integrations but heavier than lightweight DBs like Qdrant.
