name: Elasticsearch
description: Elasticsearch provides dense vector search via kNN plugin,
  integrating with Lucene for hybrid lexical + semantic search on massive
  scales. Features approximate kNN, scripting, and ecosystem for logs/search.
  Enterprise choice for observability + AI search; more mature ecosystem than
  Weaviate but heavier footprint.
