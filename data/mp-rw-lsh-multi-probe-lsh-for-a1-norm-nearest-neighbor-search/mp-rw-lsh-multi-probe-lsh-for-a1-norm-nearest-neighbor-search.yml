name: MP-RW-LSH — Multi-probe LSH for A1-Norm Nearest Neighbor Search
description: VLDB 2021 paper introducing MP-RW-LSH, an efficient multi-probe
  locality-sensitive hashing solution for A1-norm (Manhattan distance)
  approximate nearest neighbor search.
source_url: https://www.vldb.org/pvldb/vol14/p1756-wang.pdf
category: Research Papers & Surveys
tags:
  - hash-based
  - locality-sensitive
  - multi-probe
markdown: >-
  ## Overview


  MP-RW-LSH provides an efficient multi-probe LSH approach for A1-norm
  (Manhattan distance) nearest neighbor search.


  ## Key Contributions


  - Multi-probe strategy for LSH under A1-norm

  - Efficient hash function design

  - Improved retrieval accuracy for L1 distance

  - Published in VLDB 2021


  ## Publication


  - **Venue**: VLDB 2021

  - **Authors**: Wang et al.

  - **Abbreviation**: MP-RW-LSH
