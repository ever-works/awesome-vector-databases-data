name: Accelerating ANNS in Hierarchical Graphs via Shortcuts
description: VLDB 2025 paper proposing efficient level navigation with shortcuts
  for accelerating approximate nearest neighbor search in hierarchical graph
  indexes, improving traversal speed across multi-layer graph structures.
source_url: https://www.vldb.org/pvldb/vol18/
category: Research Papers & Surveys
tags:
