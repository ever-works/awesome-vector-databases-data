markdown: >-
  ## Overview


  Proposes shortcut-based level navigation for faster traversal of hierarchical
  graph indexes.


  ## Key Contributions


  - Shortcut edges for hierarchical graph traversal

  - Efficient level navigation strategy

  - Improves search speed on HNSW-like indexes

  - Published in VLDB 2025


  ## Publication


  - **Venue**: VLDB 2025

  - **Authors**: Gong et al.
