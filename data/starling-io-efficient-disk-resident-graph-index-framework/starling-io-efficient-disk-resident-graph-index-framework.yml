name: Starling — I/O-Efficient Disk-Resident Graph Index Framework
description: SIGMOD 2024 paper introducing Starling, an I/O-efficient
  disk-resident graph index framework for high-dimensional vector similarity
  search on data segments, optimizing disk access patterns for billion-scale
  datasets.
