name: LanceDB
description: LanceDB is an open-source vector database built on Apache
  Arrow/Lance format for multimodal data, supporting embedded SQL queries and
  disk-optimized IVF_PQ indexes. Features zero-copy reads, schema evolution, and
  cloud sync; great for computer vision/ML pipelines vs. Chroma for better
  columnar perf.
