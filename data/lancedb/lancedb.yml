name: LanceDB
description: LanceDB is an embedded, columnar vector database built on Apache
  Arrow and Lance format for multimodal data. Enables SQL queries over vectors,
  zero-copy reads, and disk persistence without servers. Excels in local ML
  workflows; faster ingestion than Chroma for large datasets and Arrow
  integration beats Faiss for analytics.
source_url: https://lancedb.com/
category: Multimodal Vector Stores
tags:
  - arrow-native
  - sql-queries
  - multimodal-storage
markdown: |-
  # LanceDB

  Open-source columnar vector DB for AI.

  ## Features

  - Arrow/Lance format
  - SQL queries
  - Multimodal support
  - Hybrid search, filters

  ## Pricing

  Free open-source.
