name: LanceDB
description: LanceDB is an open-source, serverless vector database built on the
  Lance columnar format, supporting multimodal data (images, video) with fast
  SQL-like queries and zero-copy reads. Features embedded mode, cloud hosting,
  and disk-optimized indexes like IVF-PQ. Ideal for AI lakehouses and RAG;
  differentiates from Chroma with Arrow integration and production scale.
source_url: https://lancedb.com/
category: Embedded & Edge Vector Databases
tags:
  - serverless
  - multimodal
  - apache-arrow
  - rust
markdown: |-
  # LanceDB

  Open-source columnar vector DB for AI.

  ## Features

  - Arrow/Lance format
  - SQL queries
  - Multimodal support
  - Hybrid search, filters

  ## Pricing

  Free open-source.
