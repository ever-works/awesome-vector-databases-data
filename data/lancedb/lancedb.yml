name: LanceDB
description: LanceDB is an embedded vector database built on Apache Arrow and
  Lance format, offering SQL queries, zero-copy reads, and disk-based
  persistence for multimodal data. Supports full-text search, versioning, and
  scales to billions of vectors locally. Ideal for ML pipelines and edge AI;
  more columnar and SQL-capable than Chroma, with better data versioning than
  basic embedded DBs.
