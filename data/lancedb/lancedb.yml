name: LanceDB
description: "LanceDB is an open-source, embeddable vector database built on
  Apache Arrow/Lance format for multimodal data (vectors + images/video/audio).
  Features disk-based storage, SQL queries over vectors, zero-copy reads, and
  serverless cloud option. Ideal for computer vision, RAG with full-text, edge
  AI. Vs Chroma: columnar/multi-modal strength; vs Faiss: full DB with
  persistence/query lang."
source_url: https://lancedb.com/
