name: LanceDB
description: "LanceDB is an open-source embeddable vector DB using Apache
  Arrow/Lance format for multimodal data, zero-copy queries, SQL support. Suited
  for edge/ML pipelines; more columnar/analytical than Chroma, integrates with
  DuckDB. Use cases: computer vision, local AI."
source_url: https://lancedb.com/
category: Multimodal & Hybrid Vector Stores
tags:
