name: LanceDB
description: LanceDB is a lightweight, embeddable database providing on-device
  vector similarity search without servers, ensuring low-latency performance for
  edge computing scenarios. Key features include Apache Arrow columnar storage
  for multimodal data, zero-copy reads, full SQL support, and disk persistence.
  It excels in mobile AI, IoT devices, and local RAG applications, offering
  superior scalability over cloud databases or pure in-memory stores for
  decentralized deployments.
