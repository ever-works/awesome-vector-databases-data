name: LanceDB
description: LanceDB is an open-source multimodal vector database built on Rust
  and Apache Arrow/Lance format, with disk-optimized indexes like IVF-PQ for
  efficient storage/search of embeddings. Supports SQL queries and zero-copy
  reads for prototyping and analytics. Great for local RAG/CV workloads; more
  analytical than Chroma (in-memory), similar embedded ease to PGVector but
  columnar vs relational.
source_url: https://lancedb.com/
category: Open Source Vector Databases
tags:
  - Free OSS
  - Self-Hosted
  - Community Driven
markdown: |-
  # LanceDB

  Open-source columnar vector DB for AI.

  ## Features

  - Arrow/Lance format
  - SQL queries
  - Multimodal support
  - Hybrid search, filters

  ## Pricing

  Free open-source.
