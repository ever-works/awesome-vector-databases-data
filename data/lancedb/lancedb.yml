name: LanceDB
description: LanceDB is an open-source embedding database built on Apache
  Arrow/Lance format for multimodal data (text, images, video) with serverless
  querying and zero-copy reads. It supports SQL-like queries, real-time updates,
  and disk-optimized storage for ML pipelines. Differentiates from Chroma with
  columnar efficiency and cloud-native scaling; great for analytics vs. pure
  search DBs.
