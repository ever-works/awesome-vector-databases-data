name: LanceDB
description: "LanceDB is an open-source embedded vector database leveraging the
  Lance columnar format for efficient storage and querying of multimodal
  embeddings (text, images, video) directly from disk with zero-copy access. It
  supports SQL-based hybrid search, IVF-PQ indexing for ANN, automatic data
  versioning, and integrations with LangChain/LlamaIndex; runs locally or in
  cloud without servers. Key use cases: offline RAG, computer vision pipelines,
  edge AI; stands out from Chroma with full SQL expressiveness and better
  large-scale disk efficiency vs. in-memory options like Faiss."
