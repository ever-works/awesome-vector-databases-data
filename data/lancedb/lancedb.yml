name: LanceDB
description: LanceDB is an embedded vector database using Apache Arrow and Lance
  format for zero-copy access and multimodal data. Supports SQL queries,
  versioned tables, full-text search, and disk-based persistence without
  indexing overhead. Ideal for local AI apps, computer vision, and RAG;
  differentiates from Chroma with columnar storage and from pgvector with
  embeddability and Arrow integration.
