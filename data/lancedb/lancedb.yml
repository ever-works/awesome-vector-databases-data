name: LanceDB
description: Lightweight, in-process vector database for multimodal embeddings
  (text/images/video), with zero deps, disk-based persistence via Lance format,
  SQL queries, and Python/Rust support. No server required; perfect for
  mobile/edge AI, prototyping; faster startup than Qdrant client, more
  SQL-expressive than Chroma.
source_url: https://lancedb.com/
category: Embedded Vector Libraries
