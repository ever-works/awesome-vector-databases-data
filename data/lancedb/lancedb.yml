name: LanceDB
description: LanceDB is an open-source vector database built on the Lance
  columnar data format, enabling fast vector search on disk without loading
  everything into memory. Features disk-based indexing (IVF-PQ), SQL queries,
  and multimodal support. Great for embedded RAG and large datasets; more
  storage-efficient than Chroma for persistent local use, integrates well with
  DuckDB/Polars.
source_url: https://lancedb.com/
category: RAG-Optimized Vector DBs
tags:
