name: LanceDB
description: Embedded columnar DB for multimodal vectors (images/text),
  Arrow-based. Supports zero-copy reads, SQL queries, and cloud sync. Ideal for
  computer vision search and large-scale analytics. Differentiates from Chroma
  via columnar/multimodal design; from Faiss as a full DB.
