name: LanceDB
description: LanceDB is an embedded, columnar vector database built on Apache
  Arrow, supporting SQL queries, zero-copy reads, and disk-persistent indexes
  like IVF-PQ. It excels in multimodal data (images/text) and versioning for ML
  workflows. Compared to Chroma, offers better analytics integration and full
  SQL vs simple API.
