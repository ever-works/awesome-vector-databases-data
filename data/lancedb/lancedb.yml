markdown: >-
  ## Overview


  LanceDB is an open-source, serverless vector database that stores data in a
  persistent disk format. It is designed to run on edge devices or within
  serverless functions without requiring an always-on server.


  ## Best For


  - Mobile apps

  - Edge computing

  - Cost-efficient data lakes


  ## Key Edge


  - Blazing fast zero-copy reads directly from cloud storage or local disk.
