markdown: >-
  # LanceDB


  [LanceDB](https://lancedb.com/) is an open source, developer-friendly columnar
  vector database optimized for real-time AI use cases and analytics workloads.
  It is designed to efficiently store vectors and provide fast similarity
  search, making it suitable for multimodal AI applications.


  ## Features

  - **Open Source & Developer Friendly**: Easily integrates into existing data
  and AI toolchains.

  - **Embedded Database**: Can be installed in seconds and deployed anywhere,
  similar to SQLite or DuckDB.

  - **Native Object Storage Integration**: Supports native integration with
  object storage for scalable data handling.

  - **Scalable to Zero**: Efficiently scales down when not in use to save
  resources.

  - **Blazing Fast Performance**: Capable of searching billions of vectors in
  real-time, even on a laptop.

  - **Cost Effective Scalability**: Scales to billions of vectors and petabytes
  of multimodal data (text, images, video) at a low cost.

  - **Multimodal Support**: Handles various data types for AI, such as text,
  images, and videos.

  - **Advanced Retrieval**: Supports hybrid vector and full-text search, rich
  metadata filters, and custom reranking.

  - **Streaming Training Data**: Enables direct streaming of training data from
  object storage to maximize GPU utilization.

  - **Rich Ecosystem Integration**: Compatible with data processing frameworks
  like Spark and Ray for large-scale data ingestion.

  - **Powered by Lance Format**: Uses a new columnar format optimized for AI
  workloads, offering up to 100x speed improvement over Parquet for certain
  tasks.

  - **Security & Compliance**: LanceDB Cloud is SOC2 Type II and HIPAA
  certified.


  ## Pricing

  - **LanceDB Cloud**: Currently in private beta. Pricing details are not
  disclosed; early access can be requested.

  - **LanceDB Open Source**: Available for free as open source software.
