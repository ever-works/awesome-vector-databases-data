name: LanceDB
description: LanceDB is an open-source vector database built on the Lance
  columnar format, enabling 100% vector search with SQL queries, zero-copy
  access, and disk-based persistence without index staleness. Integrates with
  Pandas/Polars for dataframes and supports multimodal data. Great for analytics
  + AI workflows; differentiates from Chroma with SQL and columnar efficiency.
