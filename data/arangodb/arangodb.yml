featured: false
markdown: |-
  ## Overview

  Multi-model DB with graph + vector search.

  ## Features
  - AQL queries
  - Hybrid search

  ## Use Cases
  - Knowledge graphs
  - KG-RAG pipelines
  - Multi-hop retrieval

  ## Comparisons
  Vs pure vector DBs: Native graph traversal and relationships.

  ## Pricing
  Community free (100GB limit), Enterprise.
