markdown: >-
  ## Overview


  ScyllaDB launched vector search and storage capabilities in January 2026,
  enabling organizations to store vector embeddings alongside structured data
  attributes in the same ScyllaDB table.


  ## Features


  - Vector search underpinned by USearch library

  - Shard-per-core architecture for optimized resource allocation

  - Unified storage of vectors and structured data

  - High-performance distributed NoSQL foundation

  - Scalable vector search capabilities

  - Self-managed and cloud deployment options


  ## Technical Architecture


  - Built on ScyllaDB's shard-per-core architecture

  - USearch integration via Rust extension

  - Optimized for ScyllaDB's distributed design

  - Combines NoSQL benefits with vector search


  ## Deployment Options


  - ScyllaDB Cloud with managed vector search

  - Self-managed database deployment

  - Multi-cloud support


  ## Use Cases


  - Applications requiring both structured and vector data

  - High-performance semantic search

  - Real-time recommendation systems

  - Unified data platform for AI applications


  ## Pricing


  Based on ScyllaDB Cloud or self-managed deployment costs
