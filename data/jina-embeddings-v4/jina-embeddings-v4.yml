name: Jina Embeddings v4
description: Universal multimodal embedding model from Jina AI supporting text
  and images through unified pathway. Built on Qwen2.5-VL-3B-Instruct,
  outperforms proprietary models on visually rich document retrieval. This is a
  commercial API with free tier, though OSS weights available.
