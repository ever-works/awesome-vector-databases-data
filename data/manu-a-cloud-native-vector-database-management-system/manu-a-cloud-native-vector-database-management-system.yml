markdown: >-
  ## Overview


  Manu is a cloud-native vector database management system that separates
  storage and compute for scalable approximate nearest neighbor search in cloud
  environments.


  ## Architecture


  - Cloud-native design with storage-compute separation

  - Distributed architecture for horizontal scaling

  - Handles billion-scale vector datasets

  - Optimized for cloud deployment


  ## Publication


  - **Venue**: VLDB 2022

  - **Authors**: Guo et al.


  ## Key Features


  - Storage-compute separation for cost efficiency

  - Distributed indexing across nodes

  - Elastic scaling capabilities
