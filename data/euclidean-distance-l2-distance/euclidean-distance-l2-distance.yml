name: Euclidean Distance (L2 Distance)
description: Distance metric measuring straight-line distance between vectors in
  multi-dimensional space. Lower values indicate higher similarity, with 0
  meaning identical vectors.
source_url: https://weaviate.io/blog/distance-metrics-in-vector-search
