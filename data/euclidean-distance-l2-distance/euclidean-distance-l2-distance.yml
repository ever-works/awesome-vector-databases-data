markdown: >-
  ## Overview


  Euclidean distance (L2 distance) measures the straight-line distance between
  two points in multi-dimensional space, commonly used in vector databases.


  ## Formula


  L2 distance = √(Σ(Ai - Bi)²)


  ## Characteristics


  - **Range**: 0 to infinity

  - **0**: Identical vectors

  - **Higher values**: Less similar vectors

  - **Magnitude Sensitive**: Considers vector length


  ## When to Use


  - When magnitude matters

  - Spatial data

  - When smaller differences are important

  - Image embeddings (sometimes)


  ## Supported By


  - Weaviate

  - Milvus  

  - Qdrant

  - FAISS

  - pgvector


  ## Pricing


  Algorithm, no licensing costs.
